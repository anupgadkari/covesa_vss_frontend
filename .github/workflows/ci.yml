name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path vss-bridge/Cargo.toml --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vss-bridge
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
      - run: cargo clippy --manifest-path vss-bridge/Cargo.toml --all-targets -- -D warnings

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vss-bridge
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
      - run: cargo test --manifest-path vss-bridge/Cargo.toml --lib
        name: Unit tests (85 tests)

  test-e2e:
    name: E2E Cucumber (Tier 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vss-bridge
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
      - run: cargo test --manifest-path vss-bridge/Cargo.toml --test e2e
        name: Cucumber scenarios (19 scenarios)

  test-ws:
    name: WS Integration (Tier 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vss-bridge
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
      - name: Build release binary
        run: cargo build --manifest-path vss-bridge/Cargo.toml --release
      - run: cargo test --manifest-path vss-bridge/Cargo.toml --test ws_integration -- --test-threads=1
        name: WebSocket integration (4 tests)
