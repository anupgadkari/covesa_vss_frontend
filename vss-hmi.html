<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSS Body HMI · COVESA v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080F;--s1:#080E18;--s2:#0C1420;--s3:#111B28;--s4:#18243A;
  --bdr:#1A2540;--bdr2:#243055;
  --amber:#F59E0B;--amber2:rgba(245,158,11,.15);--amber3:rgba(245,158,11,.07);
  --teal:#0DC8C8;--teal2:rgba(13,200,200,.13);
  --green:#10D98A;--green2:rgba(16,217,138,.12);
  --red:#F04040;--red2:rgba(240,64,64,.12);
  --blue:#4A9EF5;--blue2:rgba(74,158,245,.12);
  --violet:#9B6DFF;--violet2:rgba(155,109,255,.12);
  --white:#DCE8F5;--dim:#6B7E99;--muted:#2E3E55;
  --fd:'Orbitron',monospace;--fm:'Share Tech Mono',monospace;--fu:'Inter',sans-serif;
  --r4:4px;--r6:6px;--r8:8px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--fu)}
.hdr{height:44px;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:14px;flex-shrink:0;position:relative;z-index:10}
.logo{font-family:var(--fd);font-size:13px;font-weight:900;letter-spacing:.22em;color:var(--amber);white-space:nowrap}
.logo span{color:var(--muted);font-weight:400}
.hdiv{width:1px;height:22px;background:var(--bdr2)}
.hchip{display:flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--bdr2);background:var(--s2);color:var(--dim);white-space:nowrap}
.hchip .dot{width:5px;height:5px;border-radius:50%}
.dot-mock{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.dot-ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.hright{margin-left:auto;display:flex;align-items:center;gap:12px}
.clk{font-family:var(--fm);font-size:12px;color:var(--dim)}
.sigcount{font-family:var(--fm);font-size:10px;color:var(--teal);padding:3px 8px;border:1px solid var(--teal2);border-radius:3px;background:var(--teal2)}
.layout{display:flex;height:calc(100vh - 44px)}
.sb{width:80px;background:var(--s1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0}
.vbtn{width:64px;height:56px;border-radius:var(--r6);border:1.5px solid transparent;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--dim);font-family:var(--fm);font-size:9px;letter-spacing:.06em;transition:all .15s;font-weight:500}
.vbtn:hover{background:var(--s2);color:var(--white)}
.vbtn.active{background:var(--amber2);border-color:rgba(245,158,11,.35);color:var(--amber)}
.vbtn svg{width:20px;height:20px;stroke-width:1.5}
.sbsep{width:40px;height:1px;background:var(--bdr);margin:8px 0}
.sbi{width:64px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0}
.sbd{width:8px;height:8px;border-radius:50%;transition:all .25s}
.sbl{font-family:var(--fm);font-size:9px;color:var(--muted);transition:color .25s;font-weight:600}
.canvas{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.ctbar{height:32px;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.ctlabel{font-family:var(--fd);font-size:11px;letter-spacing:.14em;color:var(--white);font-weight:500}
.ctlabel b{color:var(--amber)}
.ctright{margin-left:auto;font-family:var(--fm);font-size:10px;color:var(--dim)}
.svgwrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px}
.cp{width:340px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.cphdr{height:32px;display:flex;align-items:center;padding:0 12px;gap:7px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.cptitle{font-family:var(--fd);font-size:10px;letter-spacing:.18em;color:var(--white);font-weight:500}
.cpscroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent}
.cpscroll::-webkit-scrollbar{width:3px}
.cpscroll::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.sg{border-bottom:1px solid var(--bdr)}
.sghdr{padding:8px 12px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;font-size:11px;font-weight:600;color:var(--white);text-transform:uppercase;letter-spacing:.09em;transition:color .13s}
.sghdr:hover{color:var(--amber)}
.sghdr.lit{color:var(--amber)}
.vsstag{font-family:var(--fm);font-size:8px;color:var(--dim);background:var(--s2);padding:2px 6px;border-radius:2px;margin-left:auto;border:1px solid var(--bdr)}
.chv{color:var(--muted);transition:transform .13s;font-size:12px;margin-left:4px}
.chv.o{transform:rotate(90deg)}
.sgbody{padding:6px 12px 10px;display:flex;flex-direction:column;gap:6px}
.cr{display:flex;align-items:center;gap:6px;min-height:28px}
.cn{font-family:var(--fm);font-size:11px;color:var(--dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .13s}
.cn.on{color:var(--white)}
.tog{width:42px;height:22px;border-radius:11px;border:1.5px solid var(--bdr2);background:var(--s3);cursor:pointer;position:relative;transition:all .16s;flex-shrink:0}
.tog.on{border-color:var(--green)}.tog.on.a{border-color:var(--amber)}.tog.on.r{border-color:var(--red)}.tog.on.b{border-color:var(--blue)}.tog.on.t{border-color:var(--teal)}.tog.on.v{border-color:var(--violet)}
.tog.on{background:var(--green2)}.tog.on.a{background:var(--amber2)}.tog.on.r{background:var(--red2)}.tog.on.b{background:var(--blue2)}.tog.on.t{background:var(--teal2)}.tog.on.v{background:var(--violet2)}
.knob{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--dim);top:3px;left:3px;transition:transform .16s,background .16s}
.tog.on .knob{transform:translateX(20px);background:var(--green)}
.tog.on.a .knob{background:var(--amber)}.tog.on.r .knob{background:var(--red)}.tog.on.b .knob{background:var(--blue)}.tog.on.t .knob{background:var(--teal)}.tog.on.v .knob{background:var(--violet)}
.slrow{display:flex;flex-direction:column;gap:4px}
.slhdr{display:flex;justify-content:space-between;align-items:center}
.slr{flex:1;height:6px;-webkit-appearance:none;background:var(--s4);border-radius:4px;outline:none;cursor:pointer;margin-top:4px}
.slr::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--amber);cursor:pointer;box-shadow:0 0 6px rgba(245,158,11,.7)}
.sv{font-family:var(--fm);font-size:11px;color:var(--amber);min-width:35px;text-align:right;font-weight:500}
.sel{flex:1;background:var(--s3);border:1px solid var(--bdr2);border-radius:var(--r4);color:var(--white);font-family:var(--fm);font-size:10px;padding:4px 6px;outline:none;cursor:pointer}
.sel:focus{border-color:var(--amber)}
.dcgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dcard{background:var(--s2);border-radius:var(--r6);padding:8px 10px;border:1px solid var(--bdr);display:flex;flex-direction:column;gap:4px}
.dctitle{font-family:var(--fm);font-size:10px;color:var(--amber);margin-bottom:2px;font-weight:600}
.dcr{display:flex;align-items:center;justify-content:space-between;gap:4px}
.dcl{font-family:var(--fm);font-size:10px;color:var(--dim)}
.hdiv2{height:1px;background:var(--bdr);margin:3px 0}
.ebrow{display:flex;gap:4px;flex-wrap:wrap}
.eb{padding:4px 8px;border-radius:4px;font-family:var(--fm);font-size:9px;border:1px solid var(--bdr2);background:var(--s3);color:var(--dim);cursor:pointer;transition:all .13s}
.eb:hover{color:var(--white);border-color:var(--white)}
.eb.on{background:var(--amber2);border-color:rgba(245,158,11,.4);color:var(--amber)}
.stbar{height:24px;background:var(--s1);border-top:1px solid var(--bdr);display:flex;align-items:center;padding:0 12px;gap:16px;flex-shrink:0}
.sti{display:flex;align-items:center;gap:4px;font-family:var(--fm);font-size:10px;color:var(--muted)}
.stid{width:6px;height:6px;border-radius:50%}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.1}}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:.7}}
.blink{animation:blink .7s infinite}
.blinks{animation:blink 1.4s infinite}
.pulse{animation:pulse .5s infinite}
.peps-card{background:var(--s2);border-radius:var(--r6);padding:8px 10px;border:1px solid var(--bdr);display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.peps-card.intruder{border-color:rgba(240,64,64,.4);background:var(--red2)}
.peps-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:8px;padding:2px 6px;border-radius:3px;font-weight:600}
.peps-badge.paired{background:var(--green2);color:var(--green);border:1px solid rgba(16,217,138,.3)}
.peps-badge.unpaired{background:var(--red2);color:var(--red);border:1px solid rgba(240,64,64,.3)}
.peps-title{font-family:var(--fm);font-size:10px;color:var(--amber);font-weight:600;display:flex;align-items:center;gap:6px}
.peps-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.peps-label{font-family:var(--fm);font-size:10px;color:var(--dim)}
.peps-btnrow{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.peps-btn{padding:3px 7px;border-radius:3px;font-family:var(--fm);font-size:8px;border:1px solid var(--bdr2);background:var(--s3);color:var(--dim);cursor:pointer;transition:all .13s;font-weight:600}
.peps-btn:hover{color:var(--white);border-color:var(--white)}
.peps-section{font-family:var(--fd);font-size:9px;letter-spacing:.14em;color:var(--dim);padding:8px 12px 4px;font-weight:500}
</style>
</head>

/* ══════ UTILITY COMPONENTS ══════ */
function Tog({val,on,c=''}){
  return <div className={`tog ${val?'on '+c:''}`} onClick={on}><div className="knob"/></div>;
}
function BR({label,k,s,set,c=''}){
  return <div className="cr">
    <span className={`cn ${s[k]?'on':''}`}>{label}</span>
    <Tog val={s[k]} on={()=>set(k,!s[k])} c={c}/>
  </div>;
}
function SlR({label,k,s,set,min=0,max=100,step=1,unit='%'}){
  const v=s[k]??min;
  return <div className="slrow">
    <div className="slhdr">
      <span className={`cn ${v!==min?'on':''}`}>{label}</span>
      <span className="sv">{typeof v==='number'&&v%1!==0?v.toFixed(1):v}{unit}</span>
    </div>
    <input type="range" className="slr" min={min} max={max} step={step} value={v}
      onChange={e=>set(k,parseFloat(e.target.value))}/>
  </div>;
}
function EnumR({label,k,s,set,opts}){
  return <div style={{display:'flex',flexDirection:'column',gap:3}}>
    <span className="cn">{label}</span>
    <div className="ebrow">
      {opts.map(o=><button key={o} className={`eb ${s[k]===o?'on':''}`} onClick={()=>set(k,o)}>{o}</button>)}
    </div>
  </div>;
}
function SG({title,vss,children,def=false,lit=false}){
  const [open,setOpen]=useState(def);
  return <div className="sg">
    <div className={`sghdr ${lit?'lit':''}`} onClick={()=>setOpen(o=>!o)}>
      <span>{title}</span>
      <span className="vsstag">{vss}</span>
      <span className={`chv ${open?'o':''}`}>›</span>
    </div>
    {open&&<div className="sgbody">{children}</div>}
  </div>;
}
function DoorCard({label,pfx,s,set}){
  const p=pfx;
  return <div className="dcard">
    <div className="dctitle">{label}</div>
    <div className="dcr"><span className="dcl">Open</span><Tog val={s[`${p}.IsOpen`]} on={()=>set(`${p}.IsOpen`,!s[`${p}.IsOpen`])} c="a"/></div>
    <div className="dcr"><span className="dcl">Soldier</span><Tog val={s[`${p}.IsLocked`]} on={()=>set(`${p}.Soldier.IsUnlocked`,s[`${p}.IsLocked`])} c="r"/></div>
    <div className="dcr"><span className="dcl">DblLock</span><Tog val={s[`${p}.IsDoubleLocked`]} on={()=>set('Body.Doors.CentralLock.Command',s[`${p}.IsDoubleLocked`]?'release_double':'lock_double')} c="r"/></div>
    <div className="dcr"><span className="dcl">Latched</span><Tog val={s[`${p}.Latch.IsLatched`]} c="v"/></div>
    <div className="dcr"><span className="dcl">ChildLk</span><Tog val={s[`${p}.IsChildLockActive`]} on={()=>set(`${p}.IsChildLockActive`,!s[`${p}.IsChildLockActive`])} c="v"/></div>
    <div style={{marginTop:2}}>
      <div className="slhdr"><span className="dcl">Win</span><span className="sv">{s[`${p}.Window.Position`]??0}%</span></div>
      <input type="range" className="slr" min={0} max={100} value={s[`${p}.Window.Position`]??0}
        onChange={e=>set(`${p}.Window.Position`,parseInt(e.target.value))}/>
    </div>
    <div className="ebrow" style={{marginTop:3}}>
      {['UNLATCHED','HALF_LATCHED','FULL_LATCHED'].map(v=>(
        <button key={v} className={`eb ${s[`${p}.LatchStatus`]===v?'on':''}`}
          onClick={()=>set(`${p}.LatchStatus`,v)}>{v.replace('_LATCHED','').replace('UN','UN-')}</button>
      ))}
    </div>
  </div>;
}

/* ══════ COMBINED TOP + PEPS VIEW ══════ */
// Vehicle body center (in the existing top-view coordinate space)
const VCX=180, VCY=350;

function getDevicePos(zone, idx, total){
  const sp=26, off=(idx-(total-1)/2)*sp;
  switch(zone){
    case 'RfRange':{
      const a=(idx/Math.max(total,1))*2*Math.PI-Math.PI/2;
      return {x:VCX+290*Math.cos(a), y:VCY+360*Math.sin(a)};
    }
    case 'Approach':{
      const a=(idx/Math.max(total,1))*2*Math.PI-Math.PI/2;
      return {x:VCX+205*Math.cos(a), y:VCY+255*Math.sin(a)};
    }
    case 'DriverDoor':   return {x:VCX-105, y:VCY-30+idx*30};
    case 'PassengerDoor':return {x:VCX+105, y:VCY-30+idx*30};
    case 'Hood':         return {x:VCX+off,  y:VCY-185};
    case 'Trunk':        return {x:VCX+off,  y:VCY+165};
    case 'TrunkInside':  return {x:VCX+off,  y:VCY+90};
    case 'Cabin':        return {x:VCX+off,  y:VCY};
    case 'OutOfRange':   return {x:-150+idx*52, y:-40};
    default:             return {x:-150+idx*52, y:-40};
  }
}

function hitTestZone(x,y){
  // Inside vehicle body bounds (60–300 x, 80–580 y)
  if(x>=60&&x<=300&&y>=80&&y<=580){
    if(y<=140) return 'Hood';
    if(y>=495) return y>=545?'TrunkInside':'Trunk';
    if(x<=112) return 'DriverDoor';
    if(x>=248) return 'PassengerDoor';
    return 'Cabin';
  }
  const dA=(x-VCX)**2/205**2+(y-VCY)**2/255**2;
  const dR=(x-VCX)**2/290**2+(y-VCY)**2/360**2;
  if(dA<=1) return 'Approach';
  if(dR<=1) return 'RfRange';
  return 'OutOfRange';
}

function DeviceChip({device, pos, dimmed, onPointerDown}){
  const {type,label,color,paired}=device;
  const {x,y}=pos;
  const op=dimmed?0.22:0.92;
  const shape=type==='fob'
    ?<rect x={x-11} y={y-7} width={22} height={14} rx={3} fill={color} opacity={op}/>
    :type==='phone'
    ?<rect x={x-6} y={y-10} width={12} height={20} rx={2} fill={color} opacity={op}/>
    :<circle cx={x} cy={y} r={9} fill={color} opacity={op}/>;
  return <g style={{cursor:onPointerDown&&!dimmed?'grab':'default'}}
    onPointerDown={onPointerDown&&!dimmed?onPointerDown:undefined}>
    {!dimmed&&<circle cx={x} cy={y} r={20} fill={color} opacity={0.06}/>}
    {shape}
    <text x={x} y={y+4} textAnchor="middle" fill="#000" fontSize="8" fontFamily="Share Tech Mono" fontWeight="700">{label}</text>
    {!paired&&<text x={x+13} y={y-9} fill="#F04040" fontSize="13" fontWeight="bold">!</text>}
  </g>;
}

function CombinedView({s,set}){
  const svgRef=useRef(null);
  const [drag,setDrag]=useState(null);
  // drag={key,type,label,color,paired,isNfc,x,y,ox,oy}

  // Build device list
  const allDevices=[];
  for(let i=1;i<=6;i++){
    allDevices.push({key:`Body.PEPS.Plant.KeyFob.${i}.Zone`,type:'fob',label:`F${i}`,
      zone:s[`Body.PEPS.Plant.KeyFob.${i}.Zone`]||'OutOfRange',
      paired:i<=4,color:i<=4?'#F59E0B':'#F04040'});
  }
  for(let i=1;i<=2;i++){
    allDevices.push({key:`Body.PEPS.Plant.BlePhone.${i}.Zone`,type:'phone',label:`P${i}`,
      zone:s[`Body.PEPS.Plant.BlePhone.${i}.Zone`]||'OutOfRange',paired:true,color:'#4A9EF5'});
  }
  for(let i=1;i<=2;i++){
    const pos=s[`Body.PEPS.Plant.NfcCard.${i}.Position`]||'NotPresent';
    const zone=pos==='DriverHandle'?'DriverDoor':pos==='PushButton'?'Cabin':'OutOfRange';
    allDevices.push({key:`Body.PEPS.Plant.NfcCard.${i}.Position`,type:'nfc',label:`N${i}`,
      zone,paired:true,color:'#0DC8C8',isNfc:true,nfcPos:pos});
  }

  // Group by zone for position indexing
  const byZone={};
  allDevices.forEach(d=>{
    if(!byZone[d.zone])byZone[d.zone]=[];
    byZone[d.zone].push(d);
  });

  function svgCoords(e){
    const svg=svgRef.current;
    if(!svg)return{x:0,y:0};
    const ctm=svg.getScreenCTM();
    if(!ctm)return{x:0,y:0};
    const pt=svg.createSVGPoint();
    pt.x=e.clientX;pt.y=e.clientY;
    const r=pt.matrixTransform(ctm.inverse());
    return{x:r.x,y:r.y};
  }

  function startDrag(e,device){
    e.preventDefault();
    const {x,y}=svgCoords(e);
    setDrag({...device,x,y,ox:x,oy:y});
  }

  function onMove(e){
    if(!drag)return;
    const {x,y}=svgCoords(e);
    setDrag(d=>({...d,x,y}));
  }

  function onDrop(e){
    if(!drag)return;
    const {x,y}=svgCoords(e);
    const zone=hitTestZone(x,y);
    if(drag.isNfc){
      const nfcPos=zone==='DriverDoor'?'DriverHandle':zone==='Cabin'?'PushButton':'NotPresent';
      set(drag.key,nfcPos);
    } else {
      set(drag.key,zone);
    }

  }

  const dropZone=drag?hitTestZone(drag.x,drag.y):null;

  // Existing top-view signals
  const lo=s['Body.Lights.Beam.Low.IsOn'],hi=s['Body.Lights.Beam.High.IsOn'];

  const brake=s['Body.Lights.Brake.IsActive'],back=s['Body.Lights.Backup.IsActive'];
  const lp=s['Body.Lights.LicensePlate.IsOn'];

  const rLamp=s['Body.Lights.DirectionIndicator.Right.Lamp.Front.IsOn'];

  const hlo=hi?.95:lo?.85:drl?.45:park?.2:.04;
  const tlc=brake?'#FF2222':lo||hi||park?'#EF4444':'#1A0808';

    {s['Body.Mirrors.Right.IsHeatingOn']&&<circle cx="310" cy="200" r="7" fill="none" stroke="#FF4040" strokeWidth="1" opacity=".6" className="pulse"/>}

    <text x="180" y="22"  textAnchor="middle" fill="#1E2C3C" fontSize="8" fontFamily="Share Tech Mono" fontWeight="bold">▲ FRONT</text>
    <text x="180" y="755" textAnchor="middle" fill="#1E2C3C" fontSize="8" fontFamily="Share Tech Mono" fontWeight="bold">REAR ▼</text>

    {/* ── PEPS Device icons ── */}
    {allDevices.map(device=>{
      const group=byZone[device.zone]||[];
      const idx=group.indexOf(device);
      const pos=getDevicePos(device.zone,idx,group.length);
      const isDragging=drag&&drag.key===device.key;
      return <g key={device.key}>
        {/* Icon at zone position — dimmed while dragging */}
        <DeviceChip device={device} pos={pos} dimmed={!!isDragging}
          onPointerDown={(e)=>startDrag(e,device)}/>
      </g>;
    })}

    {/* Drag ghost follows pointer */}
    {drag&&<DeviceChip device={drag} pos={{x:drag.x,y:drag.y}} dimmed={false}/>}

    {/* Legend */}
    <g transform="translate(-175,760)">
      <rect x={0} y={-4} width={18} height={11} rx={3} fill="#F59E0B" opacity={.85}/>

      <rect x={210} y={-4} width={18} height={11} rx={3} fill="#F04040" opacity={.85}/>
      <text x={212} y={1} fill="#000" fontSize="8" fontWeight="bold">!</text>
      <text x={232} y={5} fill="#F04040" fontSize="9" fontFamily="Share Tech Mono">Unpaired</text>
      <text x={330} y={5} fill="#2E3E55" fontSize="9" fontFamily="Share Tech Mono">— drag fobs/phones/NFC to zones</text>
    </g>
  </svg>;
}

    <rect x="630" y="240" width="200" height="160" fill="#070E18" stroke={trunk?'#F59E0B':'#182030'} strokeWidth={trunk?2:1.2} rx="3"/>
    {trunk&&<text x="860" y="300" textAnchor="middle" fill="#F59E0B" fontSize="8" fontWeight="bold">TRUNK</text>}

  </svg>;
}

/* ══════ CONTROL PANEL ══════ */
const PEPS_BTN_OPTS=[
  {val:'LOCK',label:'LOCK'},{val:'UNLOCK',label:'UNLOCK'},
  {val:'TRUNK_RELEASE',label:'TRUNK'},{val:'REMOTE_START',label:'START'},{val:'PANIC_ALARM',label:'PANIC'},
];

function ControlPanel({s,set}){
  const anyDoor=['Row1.Left','Row1.Right','Row2.Left','Row2.Right'].some(d=>s[`Body.Doors.${d}.IsOpen`]);
  const anyLight=Object.keys(s).some(k=>k.startsWith('Body.Lights')&&s[k]===true);
  const lux=s['Body.Lights.AmbientLightSensor.Illuminance']??10000;

  return <div className="cp">
    <div className="cphdr">
      <div style={{width:7,height:7,borderRadius:2,background:'var(--amber)',opacity:.5}}/>
      <span className="cptitle">VSS SIGNAL CONTROL</span>
    </div>
    <div className="cpscroll">

      <SG title="Vehicle Power" vss="Vehicle" def={true}>
        <EnumR label="Power Mode" k="Vehicle.LowVoltageSystemState" s={s} set={set}
          opts={['OFF','LOCK','ACC','ON','START']}/>
        <EnumR label="Powertrain" k="Vehicle.Powertrain.Type" s={s} set={set}
          opts={['COMBUSTION','HYBRID','ELECTRIC']}/>
      </SG>

      <SG title="Light Control" vss="Body.Lights" lit={anyLight}>
        <EnumR label="Mode" k="Body.Lights.LightSwitch" s={s} set={set}
          opts={['OFF','POSITION','DRL','AUTO','BEAM']}/>
        <div style={{marginTop:4,padding:'8px',background:'var(--s2)',borderRadius:'var(--r4)',border:'1px solid var(--bdr)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
            <span style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--white)'}}>Ambient Lux</span>
            <span style={{fontFamily:'var(--fm)',fontSize:'10px',color:'#F59E0B',fontWeight:700}}>
              {lux} &nbsp;
              <span style={{fontSize:'9px',color:lux<200?'#F59E0B':'#6B7E99'}}>
                {lux<50?'🌙 Night':lux<200?'🌆 Dusk':lux<500?'🌇 Twilight':lux<10000?'☁ Overcast':'☀ Daylight'}
              </span>
            </span>
          </div>
          <input type="range" className="slr" min={0} max={100000} step={500}
            value={lux} style={{marginTop:0,marginBottom:6}}
            onChange={e=>set('Body.Lights.AmbientLightSensor.Illuminance',parseInt(e.target.value))}/>
          <div className="ebrow">
            {[{l:'Night',v:5},{l:'Tunnel',v:50},{l:'Dusk',v:100},{l:'Twilight',v:300},{l:'Overcast',v:2000},{l:'Day',v:25000}].map(p=>(
              <button key={p.l} className={`eb ${lux===p.v?'on':''}`} onClick={()=>set('Body.Lights.AmbientLightSensor.Illuminance',p.v)}>{p.l}</button>
            ))}
          </div>
        </div>
        <div className="cr" style={{marginTop:4}}>
          <span className="cn">Front Fog</span>
          <Tog val={s['Body.Switches.Fog.Front.IsEngaged']} on={()=>set('Body.Switches.Fog.Front.IsEngaged',!s['Body.Switches.Fog.Front.IsEngaged'])} c="b"/>
        </div>
        <div className="cr">
          <span className="cn">Rear Fog</span>
          <Tog val={s['Body.Switches.Fog.Rear.IsEngaged']} on={()=>set('Body.Switches.Fog.Rear.IsEngaged',!s['Body.Switches.Fog.Rear.IsEngaged'])} c="r"/>
        </div>
        <div className="cr">
          <span className="cn">High Beam Stalk</span>
          <Tog val={s['Body.Switches.HighBeam.IsEngaged']} on={()=>set('Body.Switches.HighBeam.IsEngaged',!s['Body.Switches.HighBeam.IsEngaged'])} c="b"/>
        </div>
      </SG>

      <SG title="Turn & Hazard" vss="Body.Switches">
        <div className="cr">
          <span className="cn">Hazard</span>
          <Tog val={s['Body.Switches.Hazard.IsEngaged']} on={()=>set('Body.Switches.Hazard.IsEngaged',!s['Body.Switches.Hazard.IsEngaged'])} c="a"/>
        </div>
        <EnumR label="Turn Stalk" k="Body.Switches.TurnIndicator.Direction" s={s} set={set} opts={['OFF','LEFT','RIGHT']}/>
      </SG>

      <SG title="Braking & Transmission" vss="Chassis">
        <SlR label="Brake Pedal" k="Chassis.Brake.PedalPosition" s={s} set={set} min={0} max={100} step={1} unit="%"/>
        <div className="cr">
          <span className="cn">Parking Brake</span>
          <Tog val={s['Chassis.ParkingBrake.IsEngaged']} on={()=>set('Chassis.ParkingBrake.IsEngaged',!s['Chassis.ParkingBrake.IsEngaged'])} c="r"/>
        </div>
        <EnumR label="Gear" k="Powertrain.Transmission.CurrentGear" s={s} set={set}
          opts={[-2,-1,0,1,2,3,4,5,6].map(String)}/>
      </SG>

      <SG title="ADAS" vss="Vehicle.ADAS">
        <div className="cr">
          <span className="cn" style={{flex:1}}>Oncoming Vehicle</span>
          <button className={`eb ${s['Vehicle.ADAS.HighBeam.OncomingVehicleDetected']?'on':''}`}
            style={s['Vehicle.ADAS.HighBeam.OncomingVehicleDetected']?{background:'#EF4444',borderColor:'#EF4444',color:'#fff'}:{}}
            onClick={()=>set('Vehicle.ADAS.HighBeam.OncomingVehicleDetected',!s['Vehicle.ADAS.HighBeam.OncomingVehicleDetected'])}>
            {s['Vehicle.ADAS.HighBeam.OncomingVehicleDetected']?'DETECTED':'Clear'}
          </button>
        </div>
      </SG>

      <SG title="Door Lock Sources" vss="Body.PEPS">
        <div className="cr"><span className="cn">PEPS Key</span><Tog val={s['Body.PEPS.KeyPresent']} on={()=>set('Body.PEPS.KeyPresent',!s['Body.PEPS.KeyPresent'])} c="t"/></div>
        <EnumR label="Keyfob RKE" k="Body.Switches.Keyfob.LockButton" s={s} set={set} opts={['IDLE','LOCK','UNLOCK','DOUBLE_LOCK']}/>
        {[['Trim FL','Body.Switches.DoorTrim.Row1.Left.LockButton'],['Trim FR','Body.Switches.DoorTrim.Row1.Right.LockButton'],
          ['Trim RL','Body.Switches.DoorTrim.Row2.Left.LockButton'],['Trim RR','Body.Switches.DoorTrim.Row2.Right.LockButton']].map(([l,k])=>(
          <EnumR key={k} label={l} k={k} s={s} set={set} opts={['IDLE','LOCK','UNLOCK']}/>
        ))}
        <EnumR label="Phone App" k="Body.Connectivity.RemoteLock" s={s} set={set} opts={['IDLE','LOCK','UNLOCK']}/>
        <EnumR label="BLE Key" k="Body.Connectivity.BleLock" s={s} set={set} opts={['IDLE','LOCK','UNLOCK']}/>
        <div className="cr"><span className="cn">NFC Card</span><Tog val={s['Body.Connectivity.NfcCardPresent']} on={()=>set('Body.Connectivity.NfcCardPresent',!s['Body.Connectivity.NfcCardPresent'])} c="v"/></div>
        <div className="cr"><span className="cn">NFC Phone</span><Tog val={s['Body.Connectivity.NfcPhonePresent']} on={()=>set('Body.Connectivity.NfcPhonePresent',!s['Body.Connectivity.NfcPhonePresent'])} c="v"/></div>
      </SG>

      <SG title="Safety" vss="Vehicle.Safety">
        <div className="cr"><span className="cn">Crash Detected</span><Tog val={s['Vehicle.Safety.CrashDetected']} on={()=>set('Vehicle.Safety.CrashDetected',!s['Vehicle.Safety.CrashDetected'])} c="r"/></div>
      </SG>

      <SG title="PEPS Devices" vss="Body.PEPS.Plant">
        <div className="peps-section" style={{padding:'0 0 4px',fontFamily:'var(--fm)',fontSize:'9px',color:'var(--dim)'}}>KEY FOBS — button press</div>
        {[1,2,3,4].map(i=>{
          const pfx=`Body.PEPS.Plant.KeyFob.${i}`;
          const zone=s[`${pfx}.Zone`]||'OutOfRange';
          const rssi=s[`${pfx}.RssiResponse`]||'';
          return <div key={i} className="peps-card">
            <div className="peps-title">FOB {i} <span className="peps-badge paired">PAIRED</span>
              <span style={{marginLeft:'auto',fontFamily:'var(--fm)',fontSize:'9px',color:'var(--dim)'}}>{zone}</span>
            </div>
            {rssi&&<div style={{fontFamily:'var(--fm)',fontSize:'8px',color:'var(--dim)',wordBreak:'break-all'}}>{rssi.slice(0,60)}</div>}
            <div className="peps-btnrow">
              {PEPS_BTN_OPTS.map(b=>(
                <button key={b.val} className="peps-btn" onClick={()=>set(`${pfx}.ButtonPress`,b.val)}>{b.label}</button>
              ))}
            </div>
          </div>;
        })}
        {[5,6].map(i=>{
          const pfx=`Body.PEPS.Plant.KeyFob.${i}`;
          const zone=s[`${pfx}.Zone`]||'OutOfRange';
          return <div key={i} className="peps-card intruder">
            <div className="peps-title">FOB {i} <span className="peps-badge unpaired">INTRUDER</span>
              <span style={{marginLeft:'auto',fontFamily:'var(--fm)',fontSize:'9px',color:'var(--dim)'}}>{zone}</span>
            </div>
          </div>;
        })}
      </SG>

      <SG title="Doors" vss="Body.Doors" def={true} lit={anyDoor}>
        <div className="dcgrid">
          <DoorCard label="ROW1 · LEFT"  pfx="Body.Doors.Row1.Left"  s={s} set={set}/>
          <DoorCard label="ROW1 · RIGHT" pfx="Body.Doors.Row1.Right" s={s} set={set}/>
          <DoorCard label="ROW2 · LEFT"  pfx="Body.Doors.Row2.Left"  s={s} set={set}/>
          <DoorCard label="ROW2 · RIGHT" pfx="Body.Doors.Row2.Right" s={s} set={set}/>
        </div>
      </SG>

      <SG title="Body" vss="Body">
        <BR label="Hood open"        k="Body.Hood.IsOpen"       s={s} set={set} c="a"/>
        <BR label="Trunk open"       k="Body.Trunk.IsOpen"      s={s} set={set} c="a"/>
        <BR label="Trunk locked"     k="Body.Trunk.IsLocked"    s={s} set={set} c="r"/>
        <BR label="Fuel lid open"    k="Body.FuelLid.IsOpen"    s={s} set={set} c="a"/>
        <BR label="Charge lid open"  k="Body.ChargeLid.IsOpen"  s={s} set={set} c="t"/>
        <BR label="Horn active"      k="Body.Horn.IsActive"     s={s} set={set} c="r"/>
      </SG>

      <SG title="Wipers & Washers" vss="Body.Windshield">
        <EnumR label="Front mode" k="Body.Windshield.Front.Wiping.Mode" s={s} set={set} opts={['OFF','SLOW','MEDIUM','FAST','INTERVAL']}/>
        <SlR label="Front intensity" k="Body.Windshield.Front.Wiping.Intensity" s={s} set={set} min={0} max={5} step={1} unit="/5"/>
        <BR label="Front washer" k="Body.Windshield.Front.Washing.IsActive" s={s} set={set} c="b"/>
        <div className="hdiv2"/>
        <EnumR label="Rear mode" k="Body.Windshield.Rear.Wiping.Mode" s={s} set={set} opts={['OFF','SLOW','MEDIUM','FAST']}/>
        <BR label="Rear washer" k="Body.Windshield.Rear.Washing.IsActive" s={s} set={set} c="b"/>
      </SG>

      <SG title="Mirrors" vss="Body.Mirrors">
        <div style={{display:'flex',gap:6}}>
          {[['Left','Body.Mirrors.Left'],['Right','Body.Mirrors.Right']].map(([side,pfx])=>(
            <div key={side} style={{flex:1,background:'var(--s2)',borderRadius:'var(--r6)',padding:'6px 8px',border:'1px solid var(--bdr)',display:'flex',flexDirection:'column',gap:3}}>
              <div className="dctitle">{side.toUpperCase()}</div>
              <div className="dcr"><span className="dcl">Fold</span><Tog val={s[`${pfx}.IsFolded`]} on={()=>set(`${pfx}.IsFolded`,!s[`${pfx}.IsFolded`])} c="a"/></div>
              <div className="dcr"><span className="dcl">Heat</span><Tog val={s[`${pfx}.IsHeatingOn`]} on={()=>set(`${pfx}.IsHeatingOn`,!s[`${pfx}.IsHeatingOn`])} c="r"/></div>
              <SlR label="Tilt" k={`${pfx}.Tilt`} s={s} set={set} min={-10} max={10} step={1} unit="°"/>
              <SlR label="Pan"  k={`${pfx}.Pan`}  s={s} set={set} min={-10} max={10} step={1} unit="°"/>
            </div>
          ))}
        </div>
      </SG>

      <SG title="Sunroof" vss="Body.Sunroof">
        <SlR label="Roof position"  k="Body.Sunroof.Position"       s={s} set={set} min={0} max={100} step={5} unit="%"/>
        <SlR label="Shade position" k="Body.Sunroof.Shade.Position"  s={s} set={set} min={0} max={100} step={5} unit="%"/>
      </SG>

      <SG title="Cabin Lighting" vss="Cabin.Lights">
        <BR label="Dome light"     k="Cabin.Lights.IsDomeOn"         s={s} set={set} c="a"/>
        <BR label="Glovebox light" k="Cabin.Lights.IsGloveBoxOn"     s={s} set={set} c="a"/>
        <SlR label="Ambient intensity" k="Cabin.Lights.Ambient.Intensity" s={s} set={set} min={0} max={100} step={5} unit="%"/>
        <div className="cr">
          <span className="cn">Ambient color</span>
          <input type="color" value={s['Cabin.Lights.Ambient.Color']||'#3B82F6'}
            onChange={e=>set('Cabin.Lights.Ambient.Color',e.target.value)}
            style={{width:32,height:20,border:'1px solid var(--bdr2)',borderRadius:3,background:'transparent',cursor:'pointer',padding:1}}/>
        </div>
      </SG>

      <SG title="HVAC" vss="Cabin.HVAC">
        <BR label="A/C active"       k="Cabin.HVAC.IsAirConditioningActive" s={s} set={set} c="b"/>
        <BR label="Recirculation"    k="Cabin.HVAC.IsRecirculationActive"   s={s} set={set} c="t"/>
        <BR label="Front defroster"  k="Cabin.HVAC.IsFrontDefrosterActive"  s={s} set={set} c="b"/>
        <BR label="Rear defroster"   k="Cabin.HVAC.IsRearDefrosterActive"   s={s} set={set} c="b"/>
        <div className="hdiv2"/>
        <SlR label="Driver temp"   k="Cabin.HVAC.Station.Row1.Left.Temperature"  s={s} set={set} min={16} max={30} step={0.5} unit="°C"/>
        <SlR label="Driver fan"    k="Cabin.HVAC.Station.Row1.Left.FanSpeed"     s={s} set={set} min={0} max={7} step={1} unit="/7"/>
        <EnumR label="Driver vent" k="Cabin.HVAC.Station.Row1.Left.AirDistribution" s={s} set={set} opts={['DASHBOARD','FLOOR','DEFROST','COMBINED']}/>
        <div className="hdiv2"/>
        <SlR label="Pass temp"    k="Cabin.HVAC.Station.Row1.Right.Temperature"  s={s} set={set} min={16} max={30} step={0.5} unit="°C"/>
        <SlR label="Pass fan"     k="Cabin.HVAC.Station.Row1.Right.FanSpeed"     s={s} set={set} min={0} max={7} step={1} unit="/7"/>
        <EnumR label="Pass vent"  k="Cabin.HVAC.Station.Row1.Right.AirDistribution" s={s} set={set} opts={['DASHBOARD','FLOOR','DEFROST','COMBINED']}/>
      </SG>

      <SG title="Seats" vss="Cabin.Seat">
        {[['Driver','Cabin.Seat.Row1.Left'],['Passenger','Cabin.Seat.Row1.Right']].map(([label,pfx])=>(
          <div key={pfx} style={{background:'var(--s2)',borderRadius:'var(--r6)',padding:'8px 10px',border:'1px solid var(--bdr)',display:'flex',flexDirection:'column',gap:4,marginBottom:4}}>
            <div className="dctitle">{label.toUpperCase()}</div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span className="dcl" style={{flex:1}}>Heating</span>
              <button style={{background:s[`${pfx}.HeatingLevel`]>0?'#8B2E2E':'#1A2838',border:'1px solid #3A4D5C',borderRadius:4,color:s[`${pfx}.HeatingLevel`]>0?'#FF6B35':'#666',cursor:'pointer',padding:'4px 12px',fontSize:'11px',fontWeight:'600',fontFamily:'Orbitron'}}
                onClick={()=>set(`${pfx}.HeatingLevel`,[3,0,1,2][s[`${pfx}.HeatingLevel`]||0])}>
                {s[`${pfx}.HeatingLevel`]||0}
              </button>
            </div>
            <div className="dcr"><span className="dcl">Ventilation</span><Tog val={s[`${pfx}.IsVentilationOn`]} on={()=>set(`${pfx}.IsVentilationOn`,!s[`${pfx}.IsVentilationOn`])} c="b"/></div>
          </div>
        ))}
      </SG>

    </div>
  </div>;
}

/* ══════ APP ══════ */
const VIEWS=[
  {id:'top',    label:'TOP / PEPS', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="3" width="14" height="18" rx="3"/><line x1="5" y1="9" x2="19" y2="9"/><line x1="5" y1="15" x2="19" y2="15"/></svg>},
  {id:'side',   label:'SIDE',       icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3,16 L6,8 L8,5 L18,5 L21,8 L21,16 Z"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>},
  {id:'cockpit',label:'COCKPIT',    icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/><circle cx="12" cy="12" r="2"/></svg>},
];

function App(){
  const [s,setS]=useState(INIT_STATE);
  const [view,setView]=useState('top');
  const [time,setTime]=useState(new Date());
  const [wsConnected,setWsConnected]=useState(false);
  const wsRef=useRef(null);
  const reconnRef=useRef(null);
  const attemptsRef=useRef(0);

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);

  useEffect(()=>{
    function connect(){
      try{
        const ws=new WebSocket(`ws://${window.location.hostname||'localhost'}:8080`);
        ws.onopen=()=>{setWsConnected(true);attemptsRef.current=0;
          setS(INIT_STATE); // request fresh state
        };
        ws.onmessage=(e)=>{
          try{
            const msg=JSON.parse(e.data);
            if(msg.state) setS(prev=>({...prev,...msg.state}));
            else if(msg.path!==undefined) setS(prev=>({...prev,[msg.path]:msg.value}));
          }catch(err){}
        };
        ws.onerror=()=>{};
        ws.onclose=()=>{
          setWsConnected(false);
          const delay=Math.min(1000*2**Math.min(attemptsRef.current,5),30000);
          attemptsRef.current++;
          reconnRef.current=setTimeout(connect,delay);
        };
        wsRef.current=ws;
      }catch(e){}
    }
    connect();
    return()=>{clearTimeout(reconnRef.current);wsRef.current?.close()};
  },[]);

  const set=(k,v)=>{
    setS(prev=>({...prev,[k]:v}));
    if(wsRef.current?.readyState===WebSocket.OPEN){
      wsRef.current.send(JSON.stringify({type:'sensor',path:k,value:v}));
    }
  };

  const lo=s['Body.Lights.Beam.Low.IsOn'],hi=s['Body.Lights.Beam.High.IsOn'];
  const ffog=s['Body.Lights.Fog.Front.IsOn'],rfog=s['Body.Lights.Fog.Rear.IsOn'];
  const activeCount=Object.values(s).filter(v=>v===true).length;
  const viewLabel=VIEWS.find(v=>v.id===view)?.label||'';

  return <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
    <div className="hdr">
      <span className="logo">BODY<span>CTRL</span></span>
      <div className="hdiv"/>
      <span className="hchip"><span className={`dot ${wsConnected?'dot-ok':'dot-mock'}`}/>{wsConnected?'LIVE':'MOCK'}</span>
      <span className="hchip"><span className="dot dot-ok"/>COVESA VSS v4.0</span>
      <span className="hchip">VIN: <b style={{color:'var(--teal)',marginLeft:4}}>1FTFW1ET0EKF08206</b></span>
      <div className="hright">
        <span className="sigcount">{activeCount} ACTIVE</span>
        <span className="clk">{time.toTimeString().slice(0,8)}</span>
      </div>
    </div>

    <div className="layout">
      {/* Sidebar */}
      <div className="sb">
        {VIEWS.map(v=>(
          <button key={v.id} className={`vbtn ${view===v.id?'active':''}`} onClick={()=>setView(v.id)}>
            {v.icon}{v.label.split(' ')[0]}
          </button>
        ))}
        <div className="sbsep"/>
        {[
          {k:'Body.Lights.Hazard.IsSignaling',  c:'var(--amber)',l:'HAZ'},
          {k:'Body.Lights.Parking.IsOn',        c:'var(--amber)',l:'PARK'},
          {k:'Body.Lights.Beam.Low.IsOn',       c:'var(--amber)',l:'LO'},
          {k:'Body.Lights.Beam.High.IsOn',      c:'var(--blue)',  l:'HI'},
          {k:'Body.Lights.Fog.Front.IsOn',      c:'#BAD6FE',      l:'FFG'},
          {k:'Body.Lights.Fog.Rear.IsOn',       c:'var(--red)',   l:'RFG'},
          {k:'Body.Lights.Brake.IsActive',      c:'var(--red)',   l:'BRK'},
          {k:'Body.Lights.Backup.IsActive',     c:'#E0E0E0',      l:'REV'},
          {k:'Body.Lights.LicensePlate.IsOn',   c:'#E0E0E0',      l:'LP'},
          {k:'Body.Horn.IsActive',              c:'var(--red)',   l:'HRN'},
        ].map(({k,c,l})=>(
          <div key={k} className="sbi">
            <div className="sbd" style={{background:s[k]?c:'var(--muted)',boxShadow:s[k]?`0 0 8px ${c}`:''}}/>
            <span className="sbl" style={{color:s[k]?c:''}}>{l}</span>
          </div>
        ))}
      </div>

      {/* Canvas */}
      <div className="canvas">
        <div className="ctbar">
          <span className="ctlabel"><b>VSS</b> · {viewLabel}</span>
          <span className="ctright">NXP S32G2 · BODY DOMAIN · QM+ASIL-B</span>
        </div>
        <div className="svgwrap">
          {view==='top'     &&<CombinedView s={s} set={set}/>}
          {view==='side'    &&<SideView s={s}/>}
          {view==='cockpit' &&<CockpitView s={s} set={set}/>}
        </div>
        <div className="stbar">
          {[
            {label:'LIGHTS', active:Object.keys(s).some(k=>k.startsWith('Body.Lights')&&s[k]===true),c:'var(--amber)'},
            {label:'DOORS',  active:['Row1.Left','Row1.Right','Row2.Left','Row2.Right'].some(d=>s[`Body.Doors.${d}.IsOpen`]),c:'var(--amber)'},
            {label:'WIPERS', active:s['Body.Windshield.Front.Wiping.Mode']!=='OFF',c:'var(--blue)'},
            {label:'HVAC',   active:s['Cabin.HVAC.IsAirConditioningActive'],c:'var(--teal)'},
            {label:'HORN',   active:s['Body.Horn.IsActive'],c:'var(--red)'},
            {label:'PEPS',   active:[1,2,3,4,5,6].some(i=>s[`Body.PEPS.Plant.KeyFob.${i}.Zone`]&&s[`Body.PEPS.Plant.KeyFob.${i}.Zone`]!=='OutOfRange')||[1,2].some(i=>s[`Body.PEPS.Plant.BlePhone.${i}.Zone`]&&s[`Body.PEPS.Plant.BlePhone.${i}.Zone`]!=='OutOfRange'),c:'var(--teal)'},
          ].map(({label,active,c})=>(
            <div key={label} className="sti">
              <div className="stid" style={{background:active?c:'var(--muted)',boxShadow:active?`0 0 6px ${c}`:''}}/>
              <span style={{color:active?c:''}}>{label}</span>
            </div>
          ))}
          <div style={{marginLeft:'auto',fontFamily:'var(--fm)',fontSize:'10px',color:'var(--muted)'}}>
            {Object.keys(INIT_STATE).length} signals
          </div>
        </div>
      </div>

      <ControlPanel s={s} set={set}/>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
