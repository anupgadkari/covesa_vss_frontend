  {id:'cockpit',label:'COCKPIT',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/><circle cx="12" cy="12" r="2"/></svg>},
  {id:'config', label:'CONFIG', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>},
];

function App(){
  const [s,setS]=useState(INIT_STATE);
  const [cfg,setCfg]=useState(INIT_CONFIG);
  // Staged Tier 2 / Tier 3 cal edits — persisted to disk and applied
  // by the bridge boot loop on click of the "Apply & Reboot" button
  // in the Config view.  Empty objects = no pending edits.
  const [cfgStaged,setCfgStaged]=useState({vehicle_line:{},variant:{}});
  // True from the moment the user clicks "Apply & Reboot" until the
  // WS reconnects with a fresh boot snapshot.  Drives the rebooting
  // overlay so the user sees feedback during the ~100 ms blackout.
  const [rebooting,setRebooting]=useState(false);
  const [view,setView]=useState('top');
  const [time,setTime]=useState(new Date());
  const [wsConnected,setWsConnected]=useState(false);
  // wsHydrated — flips TRUE the first time the bridge's WS snapshot
  // arrives.  Visuals that depend on bridge-owned signals (door locks,
  // trunk, horn, alarm-active flag, AutoRelock status, …) gate on this
  // and render a dimmed "loading" placeholder until the snapshot lands.
  // Reset to FALSE on every reconnect (ws.onclose) so the gating kicks
  // back in during bridge restarts.  See
  // docs/signal-ownership-and-state-hydration.md §4.
  const [wsHydrated,setWsHydrated]=useState(false);
  const [selDev,setSelDev]=useState({type:'fob',index:1}); // selected auth device
  // AutoRelock countdown — captures wall-clock at the moment IsArmed went TRUE.
  // The banner derives remaining seconds = timeoutSecs - (now - armedAt) and
  // ticks once a second while armed.
  const [relockArmedAt,setRelockArmedAt]=useState(null);
  // PerimeterAlarm pre-arm + chime countdowns.  Both are wall-clock
  // stamps captured the instant the corresponding phase begins; the
  // banner derives "remaining = duration - elapsed" client-side.
  // Mirrors the cabin-state rules in
  // `vss-bridge/src/features/perimeter_alarm.rs`:
  //   • prearmStartedAt — set when Cabin.LockStatus enters
  //     LOCKED / DOUBLE_LOCKED from any non-armable state, cleared
  //     when it returns to UNLOCKED / DRIVER_UNLOCKED.
  //   • chimeStartedAt  — set on the first Body.Chime.IsActive=TRUE
  //     edge of a sequence, cleared when Vehicle.Body.Alarm.IsActive
  //     escalates to TRUE or the cabin unlocks (silent disarm).
  const [prearmStartedAt,setPrearmStartedAt]=useState(null);
  const [chimeStartedAt,setChimeStartedAt]=useState(null);
  const [tickNow,setTickNow]=useState(Date.now());
  const wsRef=useRef(null);
  const reconnRef=useRef(null);
  const attemptsRef=useRef(0);
  // Tracks the wall-clock of the most recent CHIME=true edge so the
  // banner watchdog below can tell when the chime has actually stopped
  // pulsing (e.g. ignition-cancel mid-chime, where Cabin.LockStatus is
  // still LOCKED and Vehicle.Body.Alarm.IsActive is still FALSE — none
  // of the other "clear" conditions fire).
  const chimeLastTrueRef=useRef(null);

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);

  // AutoRelock countdown banner.  `IsArmed` controls visibility.
  // For RESET-on-press behaviour we replicate the same filter
  // AutoRelock applies internally — watch `Cabin.LockStatus.EventNum`
  // and re-stamp `relockArmedAt` whenever an event matches the
  // "external unlock" rule.  Mirror of
  // `auto_relock.rs::EXTERNAL_UNLOCK_REQUESTORS` and `UNLOCK_STATES`;
  // keep these two lists in sync if either one changes.
  const RELOCK_EXT_REQUESTORS = ['KeyfobRke','KeyfobPeps','PassiveEntry',
                                 'PhoneApp','PhoneBle','NfcCard','NfcPhone'];
  const RELOCK_UNLOCK_STATES = ['UNLOCKED','DRIVER_UNLOCKED'];
  const relockArmed = !!s['Body.Doors.AutoRelock.IsArmed'];
  const lockEventNum  = s['Cabin.LockStatus.EventNum']      ?? 0;
  const lockStatus    = s['Cabin.LockStatus']               ?? '';
  const lockRequestor = s['Cabin.LockStatus.LastRequestor'] ?? '';
  const isQualifyingArmEvent =
        RELOCK_UNLOCK_STATES.includes(lockStatus) &&
        RELOCK_EXT_REQUESTORS.includes(lockRequestor);
  useEffect(()=>{
    if(!relockArmed){
      setRelockArmedAt(null);
      return;
    }
    // IsArmed=true.  Re-stamp on every qualifying lock event so a
    // second/third RKE press during the running countdown restarts
    // the visible timer in lockstep with the backend.  When IsArmed
    // *just* flipped true the dependency list re-runs the effect and
    // the same logic stamps the initial start.
    if(isQualifyingArmEvent){
      setRelockArmedAt(Date.now());
    }
  },[relockArmed, lockEventNum]);

  // PerimeterAlarm pre-arm window stamp.  The 20 s grace period starts
  // the instant the cabin transitions into an armable lock state; we
  // mirror that here by stamping on the first render that sees
  // LOCKED/DOUBLE_LOCKED, and clearing on any non-armable state.
  // LOCKED ↔ DOUBLE_LOCKED transitions deliberately do NOT restamp —
  // the bridge feature behaves the same way (REQ-PERI-002).
  const isCabinArmable =
        lockStatus === 'LOCKED' || lockStatus === 'DOUBLE_LOCKED';
  useEffect(()=>{
    if(isCabinArmable){
      setPrearmStartedAt(prev=>prev ?? Date.now());
    } else {
      setPrearmStartedAt(null);
    }
  },[isCabinArmable]);

  // PerimeterAlarm chime window stamp.  Stamp on the first observed
  // CHIME=true while no alarm is active; clear when the alarm
  // escalates (ALARM_STATUS=true) or the cabin returns to unlocked
  // (silent disarm during chime — REQ-PERI-012).
  const chimeActive  = !!s['Body.Chime.IsActive'];
  const alarmActive  = !!s['Vehicle.Body.Alarm.IsActive'];
  // Authoritative perimeter-alarm state from the bridge.  Gating the
  // banners on this string (rather than the HMI's lock-status guess)
  // prevents the "ARMING IN" banner from restarting after a chime is
  // silently cancelled (e.g. ignition disarm) — the bridge knows the
  // alarm went straight back to ARMED, the HMI just renders that.
  // Possible values: 'DISARMED' | 'PRE_ARMED' | 'ARMED' | 'ACTIVATED'.
  // Until the WS snapshot lands the field is undefined; treat as
  // 'DISARMED' so we don't paint stale banners.
  const alarmState = s['Vehicle.Body.Alarm.State'] || 'DISARMED';
  useEffect(()=>{
    if(alarmActive || !isCabinArmable){
      setChimeStartedAt(null);
      chimeLastTrueRef.current=null;
      return;
    }
    if(chimeActive){
      chimeLastTrueRef.current=Date.now();
      setChimeStartedAt(prev=>prev ?? Date.now());
    }
  },[chimeActive, alarmActive, isCabinArmable]);

  // Chime-stopped watchdog.  The chime alternates ON/OFF every ~1 s
  // while pulsing; if we go more than 1.5 s without a fresh CHIME=true
  // edge, the bridge has aborted the chime (ignition disarm, panic
  // press without an unlock, etc.) and the banner should disappear
  // immediately rather than counting down to 0 on its own.
  useEffect(()=>{
    if(!chimeStartedAt) return;
    const t=setInterval(()=>{
      const last=chimeLastTrueRef.current;
      if(last && Date.now()-last>1500){
        setChimeStartedAt(null);
        chimeLastTrueRef.current=null;
      }
    },250);
    return()=>clearInterval(t);
  },[chimeStartedAt]);

  // Seconds-tick driver — runs whenever any of the three countdown
  // banners is visible (auto-relock, perimeter pre-arm, perimeter
  // chime).  Idle the rest of the time so the rest of the app stays
  // at a slow heartbeat.
  const anyCountdownVisible = relockArmed || !!prearmStartedAt || !!chimeStartedAt;
  useEffect(()=>{
    if(!anyCountdownVisible) return;
    const t=setInterval(()=>setTickNow(Date.now()),250);
    return()=>clearInterval(t);
  },[anyCountdownVisible]);

  useEffect(()=>{
    function connect(){
      try{
        const ws=new WebSocket(`ws://${window.location.hostname||'localhost'}:8080`);
        ws.onopen=()=>{setWsConnected(true);attemptsRef.current=0;setRebooting(false);
          // Reset HMI-owned defaults (e.g. fob-zone OUT, switches off);
          // bridge-owned signals come in the snapshot below.  wsHydrated
          // stays FALSE until that snapshot arrives.
          setS(INIT_STATE);
          setWsHydrated(false);
        };
        ws.onmessage=(e)=>{
          try{
            const msg=JSON.parse(e.data);
            if(msg.config){
              setCfg(prev=>({
                dealer:    {...prev.dealer,   ...(msg.config.dealer||{})},
                variant:   {...prev.variant,  ...(msg.config.variant||{})},
                vehicle_line:{...prev.vehicle_line,...(msg.config.vehicle_line||{})},
              }));
            } else if(msg.state) {
              setS(prev=>({...prev,...msg.state}));
              // The first state snapshot from the bridge marks hydration
              // complete — every owned signal now has its authoritative
              // value and visuals can drop the dimmed placeholder.
              setWsHydrated(true);
            }
            else if(msg.path!==undefined) setS(prev=>({...prev,[msg.path]:msg.value}));
          }catch(err){}
        };
        ws.onerror=()=>{};
        ws.onclose=()=>{
          setWsConnected(false);
          // Disconnect → the values we hold may now be stale.  Force
          // re-hydration via the dim placeholder until reconnect lands
          // a fresh snapshot.
          setWsHydrated(false);
          const delay=Math.min(1000*2**Math.min(attemptsRef.current,5),30000);
          attemptsRef.current++;
          reconnRef.current=setTimeout(connect,delay);
        };
        wsRef.current=ws;
      }catch(e){}
    }
    connect();
    return()=>{clearTimeout(reconnRef.current);wsRef.current?.close()};
  },[]);

  const set=(k,v)=>{
    setS(prev=>({...prev,[k]:v}));
    if(wsRef.current?.readyState===WebSocket.OPEN){
      wsRef.current.send(JSON.stringify({type:'sensor',path:k,value:v}));
    }
  };

  const setCfgKey=(key,value)=>{
    // key is e.g. "dealer.auto_relock_enabled" — split into tier + field
    const dot=key.indexOf('.');
    const tier=key.slice(0,dot);
    const field=key.slice(dot+1);
    setCfg(prev=>({...prev,[tier]:{...prev[tier],[field]:value}}));
    if(wsRef.current?.readyState===WebSocket.OPEN){
      wsRef.current.send(JSON.stringify({type:'config_set',key,value}));
    }
  };

  // Apply staged Tier 2 / Tier 3 cal edits and trigger an in-process
  // bridge reboot.  Builds a single `{type:"reboot", ...}` message
  // carrying the merged (current + staged) cal sections; the bridge
  // persists them to disk via PlatformConfig::save_* and then bumps
  // its boot loop.  WS connection drops, HMI auto-reconnects, the
  // rebooting overlay clears when the fresh snapshot lands.
  // Sending with no staged changes is also valid — it's a power-cycle
  // simulation (NVM persists, all RAM state drops).
  const applyAndReboot=()=>{
    const msg={type:'reboot'};
    const stagedVL=cfgStaged.vehicle_line||{};
    const stagedV=cfgStaged.variant||{};
    if(Object.keys(stagedVL).length>0){
      msg.vehicle_line={...cfg.vehicle_line,...stagedVL};
    }
    if(Object.keys(stagedV).length>0){
      msg.variant={...cfg.variant,...stagedV};
    }
    if(wsRef.current?.readyState===WebSocket.OPEN){
      wsRef.current.send(JSON.stringify(msg));
    }
    setCfgStaged({vehicle_line:{},variant:{}});
    setRebooting(true);
  };

  const lo=s['Body.Lights.Beam.Low.IsOn'],hi=s['Body.Lights.Beam.High.IsOn'];
  const ffog=s['Body.Lights.Fog.Front.IsOn'],rfog=s['Body.Lights.Fog.Rear.IsOn'];
  const activeCount=Object.values(s).filter(v=>v===true).length;
  const viewLabel=VIEWS.find(v=>v.id===view)?.label||'';

  return <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
    <div className="hdr">
      <span className="logo">BODY<span>CTRL</span></span>
      <div className="hdiv"/>
      <span className="hchip"><span className={`dot ${wsConnected?'dot-ok':'dot-mock'}`}/>{wsConnected?'LIVE':'MOCK'}</span>
      <span className="hchip"><span className="dot dot-ok"/>COVESA VSS v4.0</span>
      <span className="hchip">VIN: <b style={{color:'var(--teal)',marginLeft:4}}>1FTFW1ET0EKF08206</b></span>
      <div className="hright">
        <span className="sigcount">{activeCount} ACTIVE</span>
        <span className="clk">{time.toTimeString().slice(0,8)}</span>
      </div>
    </div>

    <div className="layout">
      {/* Sidebar */}
      <div className="sb">
        {VIEWS.map(v=>(
          <button key={v.id} className={`vbtn ${view===v.id?'active':''}`} onClick={()=>setView(v.id)}>
            {v.icon}{v.label}
          </button>
        ))}
      </div>

      {/* Canvas */}
      <div className="canvas">
        {/* Hydration overlay — covers the canvas while the WS snapshot
            of bridge-owned signals is in flight.  Pointer-events:none
            so the user can still see the layout underneath but the
            dimming makes it visually clear nothing is actionable yet. */}
        {!wsHydrated && (
          <div className="hyd-overlay">
            <div className="hyd-card">
              <div className="dot"/>
              <div>{rebooting ? 'BRIDGE REBOOTING…' : wsConnected ? 'HYDRATING STATE…' : 'CONNECTING TO BRIDGE…'}</div>
              <div className="sub">{rebooting ? 'simulated power cycle — RAM cleared, NVM persists' : wsConnected ? 'awaiting plant-model snapshot' : 'ws://localhost:8080'}</div>
            </div>
          </div>
        )}
        <div className="ctbar">
          <span className="ctlabel"><b>VSS</b> · {viewLabel}</span>
          {/* Perimeter-alarm state pill — always visible, drawn from
              the bridge's authoritative `Vehicle.Body.Alarm.State`.
              Replaces what used to be a mental model of "is the cabin
              locked × is the chime pulsing × wall-clock since lock"
              with a single string the bridge owns. */}
          {(() => {
            const meta = ({
              DISARMED:  {label:'DISARMED',  color:'#64748B', bg:'rgba(100,116,139,.15)', border:'rgba(100,116,139,.45)', icon:'🔓', tip:'Cabin unlocked — perimeter alarm idle.'},
              PRE_ARMED: {label:'PRE-ARMED', color:'#BFDBFE', bg:'rgba(96,165,250,.18)',  border:'rgba(96,165,250,.55)',  icon:'🛡️', tip:'Cabin locked, 20 s grace window in progress. Door-opens during this window are ignored.'},
              ARMED:     {label:'ARMED',     color:'#A7F3D0', bg:'rgba(16,217,138,.15)',  border:'rgba(16,217,138,.55)',  icon:'🛡️', tip:'Pre-arm window elapsed. A door-open or interior-trim unlock now triggers the chime warning.'},
              ACTIVATED: {label:'ACTIVATED', color:'#FECACA', bg:'rgba(239,68,68,.25)',   border:'rgba(239,68,68,.7)',    icon:'🚨', tip:'Alarm sequence in progress (chime / horn+lights / lights-only).'},
            })[alarmState] || ({label:alarmState, color:'#64748B', bg:'transparent', border:'rgba(100,116,139,.45)', icon:'·', tip:`Unknown alarm state: ${alarmState}`});
            return (
              <span title={meta.tip}
                style={{display:'inline-flex',alignItems:'center',gap:6,padding:'2px 9px',borderRadius:14,
                        border:`1px solid ${meta.border}`,background:meta.bg,fontFamily:'var(--fm)',fontSize:10,
                        fontWeight:700,letterSpacing:'.06em',color:meta.color}}>
                <span style={{fontSize:11}}>{meta.icon}</span>
                <span>ALARM:</span>
                <b style={{color:meta.color}}>{meta.label}</b>
              </span>
            );
          })()}
          {/* AutoRelock countdown banner — visible only while IsArmed=true.
              Remaining seconds computed client-side from the wall-clock
              captured at the FALSE→TRUE transition. */}
          {(() => {
            if(!relockArmed || !relockArmedAt) return null;
            const total = s['Body.Doors.AutoRelock.TimeoutSeconds'] || 45;
            const elapsed = Math.floor((tickNow - relockArmedAt) / 1000);
            const remaining = Math.max(0, total - elapsed);
            return (
              <span className="relock-banner" title="Auto-relock will lock all doors when this counter reaches 0. Open any door to cancel.">
                <span style={{fontSize:11}}>🔒</span>
                <span>AUTO-RELOCK IN</span>
                <b>{remaining}s</b>
              </span>
            );
          })()}
          {/* Vehicle.Body.Alarm.IsActive — full anti-intrusion alarm
              is sounding (chime escalated to horn + lights, OR PanicAlarm
              was triggered).  Highest-priority banner; shown alone — the
              chime banner is suppressed because chimeStartedAt clears
              the moment ALARM_STATUS goes true. */}
          {alarmActive && (
            <span className="alarm-banner" title="Anti-intrusion alarm sounding. Authenticate (RKE / PEPS / phone) or press PANIC to cancel.  Starting the engine (ignition ON) also disarms.">
              <span style={{fontSize:12}}>🚨</span>
              <span>ALARM ACTIVE</span>
            </span>
          )}
          {/* PerimeterAlarm chime countdown — visible during the 12 s
              pre-alarm chime warning phase.  Takes priority over the
              pre-arm banner (the pre-arm phase is over once the chime
              fires) but is sequential with auto-relock so both never
              show together in practice. */}
          {(() => {
            // Hide the chime banner the instant the bridge moves out
            // of ACTIVATED — silent disarms (auth unlock / ignition /
            // panic during chime) all transition straight back to
            // ARMED or DISARMED, and the banner must disappear with
            // them rather than continuing its local countdown.
            if(alarmState !== 'ACTIVATED') return null;
            if(!chimeStartedAt || alarmActive) return null;
            const CHIME_TOTAL = 12;
            const elapsed = Math.floor((tickNow - chimeStartedAt) / 1000);
            const remaining = Math.max(0, CHIME_TOTAL - elapsed);
            if(remaining === 0) return null;
            return (
              <span className="chime-banner" title="Pre-alarm chime: authenticate with a paired fob/phone or press PANIC before this counter reaches 0 to cancel silently.">
                <span style={{fontSize:11}}>🔔</span>
                <span>ALARM IN</span>
                <b>{remaining}s</b>
              </span>
            );
          })()}
          {/* PerimeterAlarm pre-arm countdown — visible during the 20 s
              grace period after the cabin first becomes locked.  Hidden
              once the alarm is fully armed (or once a chime sequence
              has started). */}
          {(() => {
            // Gate on the bridge's authoritative state: PRE_ARMED
            // means we are inside the 20 s grace window.  Any other
            // state (ARMED / ACTIVATED / DISARMED) hides the banner —
            // including the ignition-cancel case where the cabin stays
            // LOCKED but the bridge has moved past pre-arm.
            if(alarmState !== 'PRE_ARMED') return null;
            if(!prearmStartedAt) return null;
            const PRE_ARM_TOTAL = 20;
            const elapsed = Math.floor((tickNow - prearmStartedAt) / 1000);
            const remaining = Math.max(0, PRE_ARM_TOTAL - elapsed);
            if(remaining === 0) return null;
            return (
              <span className="prearm-banner" title="Perimeter alarm pre-arm window: a door-open during this window is a no-op. After the counter reaches 0 the alarm is fully armed.">
                <span style={{fontSize:11}}>🛡️</span>
                <span>ARMING IN</span>
                <b>{remaining}s</b>
              </span>
            );
          })()}
          <span className="ctright">NXP S32G2 · BODY DOMAIN · QM+ASIL-B</span>
        </div>
        <div className={view==='config'?'':' svgwrap'} style={view==='config'?{flex:1,display:'flex',minHeight:0}:{}}>
          {view==='top'     &&<CombinedView s={s} set={set} cfg={cfg} onDeviceSelect={setSelDev}/>}
          {view==='side'    &&<SideView s={s} set={set}/>}
          {view==='cockpit' &&<CockpitView s={s} set={set} cfg={cfg}/>}
          {view==='config'  &&<ConfigView cfg={cfg} onSet={setCfgKey}
            staged={cfgStaged} setStaged={setCfgStaged} onApplyReboot={applyAndReboot}/>}
        </div>
        <div className="stbar">
          {[
            {label:'LIGHTS', active:Object.keys(s).some(k=>k.startsWith('Body.Lights')&&s[k]===true),c:'var(--amber)'},
            {label:'DOORS',  active:['Row1.Left','Row1.Right','Row2.Left','Row2.Right'].some(d=>s[`Body.Doors.${d}.IsOpen`]),c:'var(--amber)'},
            {label:'WIPERS', active:s['Body.Windshield.Front.Wiping.Mode']!=='OFF',c:'var(--blue)'},
            {label:'HVAC',   active:s['Cabin.HVAC.IsAirConditioningActive'],c:'var(--teal)'},
            {label:'HORN',   active:s['Body.Horn.IsActive'],c:'var(--red)',horn:true},
            {label:'CHIME',  active:s['Body.Chime.IsSounding'],c:'var(--amber)',chime:true},
            {label:'PEPS',   active:[1,2,3,4,5,6].some(i=>s[`Body.PEPS.Plant.KeyFob.${i}.Zone`]&&s[`Body.PEPS.Plant.KeyFob.${i}.Zone`]!=='OutOfRange')||[1,2].some(i=>s[`Body.PEPS.Plant.BlePhone.${i}.Zone`]&&s[`Body.PEPS.Plant.BlePhone.${i}.Zone`]!=='OutOfRange'),c:'var(--teal)'},
          ].map(({label,active,c,horn,chime})=>(
            <div key={label} className="sti">
              {horn ? (
                /* Horn-with-sound-waves visualisation: the indicator dot is
                   replaced by a small horn icon; when Body.Horn.IsActive
                   is TRUE, three concentric red ripples emanate outward,
                   matching the horn's audible pulse. */
                <span className={`horn-viz${active?' active':''}`} title={active?'Horn active — chirping':'Horn idle'}>
                  <span className="ripple"/>
                  <span className="ripple r2"/>
                  <span className="ripple r3"/>
                  <svg width="14" height="14" viewBox="0 0 16 16">
                    <path d="M2 6 L2 10 L5 10 L9 13 L9 3 L5 6 Z"
                      fill={active?'#EF4444':'var(--muted)'}
                      stroke={active?'#FFB4B4':'#222'} strokeWidth="0.6"/>
                    {active && <>
                      <path d="M11 6 Q12 8 11 10" stroke="#EF4444" strokeWidth="1" fill="none"/>
                      <path d="M13 4 Q15 8 13 12" stroke="#EF4444" strokeWidth="1" fill="none" opacity=".7"/>
                    </>}
                  </svg>
                </span>
              ) : chime ? (
                /* Chime visualisation — bell icon with three concentric
                   amber ripples that emanate when Body.Chime.IsSounding
                   is TRUE.  Same shape as the horn visualisation but in
                   amber + slightly slower so the user reads "warning
                   chime" vs "intrusion alarm" at a glance. */
                <span className={`chime-viz${active?' active':''}`} title={active?'Chime sounding — pre-alarm warning':'Chime idle'}>
                  <span className="ripple"/>
                  <span className="ripple r2"/>
                  <span className="ripple r3"/>
                  <svg width="14" height="14" viewBox="0 0 16 16">
                    {/* Bell body */}
                    <path d="M8 2 C5 2 4 4 4 7 L4 10 L3 11 L13 11 L12 10 L12 7 C12 4 11 2 8 2 Z"
                      fill={active?'#FCD34D':'var(--muted)'}
                      stroke={active?'#FFFBEB':'#222'} strokeWidth="0.6"/>
                    {/* Clapper */}
                    <circle cx="8" cy="13" r="1.2"
                      fill={active?'#FCD34D':'var(--muted)'}
                      stroke={active?'#FFFBEB':'#222'} strokeWidth="0.4"/>
                  </svg>
                </span>
              ) : (
                <div className="stid" style={{background:active?c:'var(--muted)',boxShadow:active?`0 0 6px ${c}`:''}}/>
              )}
              <span style={{color:active?c:''}}>{label}</span>
            </div>
          ))}
          <div style={{marginLeft:'auto',fontFamily:'var(--fm)',fontSize:'10px',color:'var(--muted)'}}>
            {Object.keys(INIT_STATE).length} signals
          </div>
        </div>
      </div>

      {view!=='config'&&<DevicePanel s={s} set={set} sel={selDev} setSel={setSelDev}/>}
      {view!=='config'&&<ControlPanel s={s} set={set} cfg={cfg}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
