<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSS Body HMI · COVESA v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080F;--s1:#080E18;--s2:#0C1420;--s3:#111B28;--s4:#18243A;
  --bdr:#1A2540;--bdr2:#243055;
  --amber:#F59E0B;--amber2:rgba(245,158,11,.15);--amber3:rgba(245,158,11,.07);
  --teal:#0DC8C8;--teal2:rgba(13,200,200,.13);
  --green:#10D98A;--green2:rgba(16,217,138,.12);
  --red:#F04040;--red2:rgba(240,64,64,.12);
  --blue:#4A9EF5;--blue2:rgba(74,158,245,.12);
  --violet:#9B6DFF;--violet2:rgba(155,109,255,.12);
  --white:#DCE8F5;--dim:#6B7E99;--muted:#2E3E55;
  --fd:'Orbitron',monospace;--fm:'Share Tech Mono',monospace;--fu:'Inter',sans-serif;
  --r4:4px;--r6:6px;--r8:8px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--fu)}
.hdr{height:44px;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:14px;flex-shrink:0;position:relative;z-index:10}
.logo{font-family:var(--fd);font-size:13px;font-weight:900;letter-spacing:.22em;color:var(--amber);white-space:nowrap}
.logo span{color:var(--muted);font-weight:400}
.hdiv{width:1px;height:22px;background:var(--bdr2)}
.hchip{display:flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--bdr2);background:var(--s2);color:var(--dim);white-space:nowrap}
.hchip .dot{width:5px;height:5px;border-radius:50%}
.dot-mock{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.dot-ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.hright{margin-left:auto;display:flex;align-items:center;gap:12px}
.clk{font-family:var(--fm);font-size:12px;color:var(--dim)}
.sigcount{font-family:var(--fm);font-size:10px;color:var(--teal);padding:3px 8px;border:1px solid var(--teal2);border-radius:3px;background:var(--teal2)}
.layout{display:flex;height:calc(100vh - 44px)}
.sb{width:80px;background:var(--s1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0}
.vbtn{width:64px;height:56px;border-radius:var(--r6);border:1.5px solid transparent;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--dim);font-family:var(--fm);font-size:9px;letter-spacing:.06em;transition:all .15s;font-weight:500}
.vbtn:hover{background:var(--s2);color:var(--white)}
.vbtn.active{background:var(--amber2);border-color:rgba(245,158,11,.35);color:var(--amber)}
.vbtn svg{width:20px;height:20px;stroke-width:1.5}
.canvas{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);position:relative}
.ctbar{height:32px;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.ctlabel{font-family:var(--fd);font-size:11px;letter-spacing:.14em;color:var(--white);font-weight:500}
.ctlabel b{color:var(--amber)}
.ctright{margin-left:auto;font-family:var(--fm);font-size:10px;color:var(--dim)}
.svgwrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px}
.cp{width:340px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.cphdr{height:32px;display:flex;align-items:center;padding:0 12px;gap:7px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.cptitle{font-family:var(--fd);font-size:10px;letter-spacing:.18em;color:var(--white);font-weight:500}
.cpscroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent}
.cpscroll::-webkit-scrollbar{width:3px}
.cpscroll::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.sg{border-bottom:1px solid var(--bdr)}
.sghdr{padding:8px 12px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;font-size:11px;font-weight:600;color:var(--white);text-transform:uppercase;letter-spacing:.09em;transition:color .13s}
.sghdr:hover{color:var(--amber)}
.sghdr.lit{color:var(--amber)}
.vsstag{font-family:var(--fm);font-size:8px;color:var(--dim);background:var(--s2);padding:2px 6px;border-radius:2px;margin-left:auto;border:1px solid var(--bdr)}
.chv{color:var(--muted);transition:transform .13s;font-size:12px;margin-left:4px}
.chv.o{transform:rotate(90deg)}
.sgbody{padding:6px 12px 10px;display:flex;flex-direction:column;gap:6px}
.cr{display:flex;align-items:center;gap:6px;min-height:28px}
.cn{font-family:var(--fm);font-size:11px;color:var(--dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .13s}
.cn.on{color:var(--white)}
.tog{width:42px;height:22px;border-radius:11px;border:1.5px solid var(--bdr2);background:var(--s3);cursor:pointer;position:relative;transition:all .16s;flex-shrink:0}
.tog.on{border-color:var(--green)}.tog.on.a{border-color:var(--amber)}.tog.on.r{border-color:var(--red)}.tog.on.b{border-color:var(--blue)}.tog.on.t{border-color:var(--teal)}.tog.on.v{border-color:var(--violet)}
.tog.on{background:var(--green2)}.tog.on.a{background:var(--amber2)}.tog.on.r{background:var(--red2)}.tog.on.b{background:var(--blue2)}.tog.on.t{background:var(--teal2)}.tog.on.v{background:var(--violet2)}
.knob{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--dim);top:3px;left:3px;transition:transform .16s,background .16s}
.tog.on .knob{transform:translateX(20px);background:var(--green)}
.tog.on.a .knob{background:var(--amber)}.tog.on.r .knob{background:var(--red)}.tog.on.b .knob{background:var(--blue)}.tog.on.t .knob{background:var(--teal)}.tog.on.v .knob{background:var(--violet)}
.slrow{display:flex;flex-direction:column;gap:4px}
.slhdr{display:flex;justify-content:space-between;align-items:center}
.slr{flex:1;height:6px;-webkit-appearance:none;background:var(--s4);border-radius:4px;outline:none;cursor:pointer;margin-top:4px}
.slr::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--amber);cursor:pointer;box-shadow:0 0 6px rgba(245,158,11,.7)}
.sv{font-family:var(--fm);font-size:11px;color:var(--amber);min-width:35px;text-align:right;font-weight:500}
.sel{flex:1;background:var(--s3);border:1px solid var(--bdr2);border-radius:var(--r4);color:var(--white);font-family:var(--fm);font-size:10px;padding:4px 6px;outline:none;cursor:pointer}
.sel:focus{border-color:var(--amber)}
.dcgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dcard{background:var(--s2);border-radius:var(--r6);padding:8px 10px;border:1px solid var(--bdr);display:flex;flex-direction:column;gap:4px}
.dctitle{font-family:var(--fm);font-size:10px;color:var(--amber);margin-bottom:2px;font-weight:600}
.dcr{display:flex;align-items:center;justify-content:space-between;gap:4px}
.dcl{font-family:var(--fm);font-size:10px;color:var(--dim)}
.hdiv2{height:1px;background:var(--bdr);margin:3px 0}
.ebrow{display:flex;gap:4px;flex-wrap:wrap}
.eb{padding:4px 8px;border-radius:4px;font-family:var(--fm);font-size:9px;border:1px solid var(--bdr2);background:var(--s3);color:var(--dim);cursor:pointer;transition:all .13s}
.eb:hover{color:var(--white);border-color:var(--white)}
.eb.on{background:var(--amber2);border-color:rgba(245,158,11,.4);color:var(--amber)}
.stbar{height:24px;background:var(--s1);border-top:1px solid var(--bdr);display:flex;align-items:center;padding:0 12px;gap:16px;flex-shrink:0}
.sti{display:flex;align-items:center;gap:4px;font-family:var(--fm);font-size:10px;color:var(--muted)}
.stid{width:6px;height:6px;border-radius:50%}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.1}}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:.7}}
@keyframes hornPulse{0%{transform:scale(1);opacity:.9}80%{transform:scale(2.4);opacity:0}100%{transform:scale(2.4);opacity:0}}
@keyframes chimeRipple{0%{transform:scale(1);opacity:.9}80%{transform:scale(2.4);opacity:0}100%{transform:scale(2.4);opacity:0}}
@keyframes relockPulseBg{0%,100%{background:rgba(245,158,11,.18)}50%{background:rgba(245,158,11,.32)}}
@keyframes prearmPulseBg{0%,100%{background:rgba(96,165,250,.18)}50%{background:rgba(96,165,250,.32)}}
@keyframes chimePulseBg{0%,100%{background:rgba(239,68,68,.20)}50%{background:rgba(239,68,68,.40)}}
@keyframes alarmPulseBg{0%,100%{background:rgba(220,38,38,.45);box-shadow:0 0 8px rgba(248,113,113,.4)}50%{background:rgba(248,113,113,.65);box-shadow:0 0 14px rgba(252,165,165,.7)}}
.blink{animation:blink .7s infinite}
.blinks{animation:blink 1.4s infinite}
.pulse{animation:pulse .5s infinite}
.relock-banner{display:flex;align-items:center;gap:8px;padding:3px 10px;border-radius:14px;border:1px solid rgba(245,158,11,.55);font-family:var(--fm);font-size:10px;color:#FCD34D;font-weight:600;letter-spacing:.04em;animation:relockPulseBg 1.6s infinite;text-shadow:0 0 6px rgba(252,211,77,.4)}
/* Hydration overlay — dims the canvas + shows a "Connecting…" banner
   while the WS snapshot is being delivered.  Pointer events stay live
   so the user can still see the layout but can't act on stale data. */
.hyd-overlay{position:absolute;inset:0;background:rgba(8,15,24,.60);display:flex;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(1px);font-family:var(--fm);font-size:11px;color:var(--amber);letter-spacing:.08em;pointer-events:none}
.hyd-overlay .hyd-card{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;padding:14px 22px;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 4px 22px rgba(0,0,0,.45)}
.hyd-overlay .hyd-card .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);animation:pulse .9s infinite}
.hyd-overlay .hyd-card .sub{color:var(--muted);font-size:9px;letter-spacing:.04em;text-transform:uppercase}
.relock-banner b{color:#FFEDD5;font-weight:800;font-size:12px}
.prearm-banner{display:flex;align-items:center;gap:8px;padding:3px 10px;border-radius:14px;border:1px solid rgba(96,165,250,.55);font-family:var(--fm);font-size:10px;color:#BFDBFE;font-weight:600;letter-spacing:.04em;animation:prearmPulseBg 1.6s infinite;text-shadow:0 0 6px rgba(191,219,254,.4)}
.prearm-banner b{color:#EFF6FF;font-weight:800;font-size:12px}
.chime-banner{display:flex;align-items:center;gap:8px;padding:3px 10px;border-radius:14px;border:1px solid rgba(239,68,68,.65);font-family:var(--fm);font-size:10px;color:#FCA5A5;font-weight:700;letter-spacing:.04em;animation:chimePulseBg 0.8s infinite;text-shadow:0 0 6px rgba(252,165,165,.5)}
.chime-banner b{color:#FEE2E2;font-weight:800;font-size:12px}
.alarm-banner{display:flex;align-items:center;gap:8px;padding:3px 10px;border-radius:14px;border:1px solid #FCA5A5;font-family:var(--fm);font-size:11px;color:#FFF;font-weight:800;letter-spacing:.08em;animation:alarmPulseBg 0.45s infinite;text-shadow:0 0 8px rgba(252,165,165,.8);text-transform:uppercase}
.alarm-banner b{color:#FEE2E2;font-weight:900;font-size:12px}
.horn-viz{position:relative;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px}
.horn-viz svg{position:relative;z-index:2}
.horn-viz .ripple{position:absolute;inset:0;border:2px solid #EF4444;border-radius:50%;opacity:0;pointer-events:none}
.horn-viz.active .ripple{animation:hornPulse .42s ease-out infinite}
.horn-viz.active .ripple.r2{animation-delay:.15s}
.horn-viz.active .ripple.r3{animation-delay:.30s}
.chime-viz{position:relative;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px}
.chime-viz svg{position:relative;z-index:2}
.chime-viz .ripple{position:absolute;inset:0;border:2px solid #FCD34D;border-radius:50%;opacity:0;pointer-events:none}
.chime-viz.active .ripple{animation:chimeRipple .50s ease-out infinite}
.chime-viz.active .ripple.r2{animation-delay:.18s}
.chime-viz.active .ripple.r3{animation-delay:.36s}
.peps-card{background:var(--s2);border-radius:var(--r6);padding:8px 10px;border:1px solid var(--bdr);display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.peps-card.intruder{border-color:rgba(240,64,64,.4);background:var(--red2)}
.peps-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:8px;padding:2px 6px;border-radius:3px;font-weight:600}
.peps-badge.paired{background:var(--green2);color:var(--green);border:1px solid rgba(16,217,138,.3)}
.peps-badge.unpaired{background:var(--red2);color:var(--red);border:1px solid rgba(240,64,64,.3)}
.peps-title{font-family:var(--fm);font-size:10px;color:var(--amber);font-weight:600;display:flex;align-items:center;gap:6px}
.peps-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.peps-label{font-family:var(--fm);font-size:10px;color:var(--dim)}
.peps-btnrow{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.peps-btn{padding:3px 7px;border-radius:3px;font-family:var(--fm);font-size:8px;border:1px solid var(--bdr2);background:var(--s3);color:var(--dim);cursor:pointer;transition:all .13s;font-weight:600}
.peps-btn:hover{color:var(--white);border-color:var(--white)}
.peps-section{font-family:var(--fd);font-size:9px;letter-spacing:.14em;color:var(--dim);padding:8px 12px 4px;font-weight:500}
/* ── Device panel ── */
.devpanel{width:180px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.devpanel-inner{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent}
.devpanel-inner::-webkit-scrollbar{width:3px}
.devpanel-inner::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.devpanel-hdr{height:32px;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.devpanel-title{font-family:var(--fm);font-size:9px;color:var(--amber);font-weight:700;letter-spacing:.12em}
.devchip{font-family:var(--fm);font-size:8px;padding:3px 7px;border-radius:3px;border:1px solid var(--bdr2);color:var(--dim);cursor:pointer;transition:all .15s;font-weight:600;text-align:center}
.devchip.active{font-weight:800}
.devchip.inrange{box-shadow:0 0 5px currentColor}
.devpanel-section{font-family:var(--fm);font-size:8px;color:var(--muted);font-weight:600;letter-spacing:.08em;padding:2px 0;border-top:1px solid var(--bdr);margin-top:2px}
.devpanel-zone{display:flex;flex-direction:column;gap:3px}
.devpanel-zoneval{font-family:var(--fm);font-size:12px;font-weight:700;line-height:1}
.devpanel-prox{display:flex;gap:2px;margin-top:2px}
.devpanel-proxseg{flex:1;height:5px;border-radius:2px;transition:all .3s}
.devpanel-rssi{font-family:var(--fm);font-size:7px;color:var(--muted);word-break:break-all;line-height:1.4}
.devpanel-btns{display:flex;flex-direction:column;gap:4px}
.devpanel-btn{padding:6px 4px;border-radius:3px;font-family:var(--fm);font-size:8px;border:1px solid var(--bdr2);background:var(--s3);color:var(--dim);cursor:pointer;font-weight:600;transition:all .13s;text-align:center}
.devpanel-btn:hover{color:var(--white);border-color:rgba(255,255,255,.4)}
.devpanel-btn.fired{background:var(--amber2);border-color:rgba(245,158,11,.6);color:var(--amber)}
.zonepick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.zpbtn{padding:4px 2px;border-radius:3px;font-family:var(--fm);font-size:7px;border:1px solid var(--bdr2);background:var(--s3);color:var(--dim);cursor:pointer;font-weight:600;transition:all .13s;text-align:center;line-height:1.3;white-space:pre-line}
.zpbtn:hover{color:var(--white);border-color:rgba(255,255,255,.35)}
.zpbtn.zp-active{color:var(--bg);font-weight:800}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

function Tog({val,on,c=''}){
  return <div className={`tog ${val?'on '+c:''}`} onClick={on}><div className="knob"/></div>;
}
function BR({label,k,s,set,c=''}){
  return <div className="cr">

/* CmdToggleRow — bool-state row driven by a pair of momentary
   commands (e.g. OpenCmd / CloseCmd into a plant model).  Reads
   `stateKey` for the visual on/off, click sends the matching cmd
   based on current state.  Whole row is clickable so the affordance
   is obvious. */
function CmdToggleRow({label,stateKey,openCmd,closeCmd,s,set,c=''}){
  const on = !!s[stateKey];
  const click = ()=>set(on ? closeCmd : openCmd, true);
  return <div className="cr" onClick={click} style={{cursor:'pointer'}}>
    <span className={`cn ${on?'on':''}`}>{label}</span>
    <Tog val={on} on={click} c={c}/>
  </div>;
}

/* ══════ COMBINED TOP + PEPS VIEW ══════ */
// Vehicle body center — midpoint of front panel (y=30) and rear bumper (y=580).
// Stadiums are centred here so they symmetrically enclose the car top and bottom.
// VCY shifted from 305 to 265 to track the lengthened front hood
// (now y=-50 to y=580, mid-line = 265).  Stadium shapes recentre
// here so they remain visually symmetric around the vehicle.
const VCX=180, VCY=265;

// Stadium (discorectangle) hit-test.
// halfW    — half the total width of the stadium (= semicircle radius = rx).
// The straight rectangular mid-section spans ±straightH around VCY.
// Cap semicircles of radius halfW sit above and below the straight section.
function inStadium(x, y, halfW){
  const straightH=100;
  const dx=Math.abs(x-VCX), dy=Math.abs(y-VCY);
  if(dx>halfW) return false;           // outside left/right walls
  if(dy<=straightH) return true;       // inside rectangular mid-section
  return dx*dx+(dy-straightH)*(dy-straightH)<=halfW*halfW;  // inside cap
}

function getDevicePos(zone, idx, total){
  const sp=26, off=(idx-(total-1)/2)*sp;
  switch(zone){
    case 'RfRange':{
      // Trace devices around an ellipse that approximates the RF stadium boundary.
      // halfW=340, vertical semi-axis = straightH(100) + halfW(340) = 440.
      const a=(idx/Math.max(total,1))*2*Math.PI-Math.PI/2;
      return {x:VCX+340*Math.cos(a), y:VCY+440*Math.sin(a)};
    }
    case 'Approach':{
      // halfW=300, vertical semi-axis = 100+300 = 400.
      const a=(idx/Math.max(total,1))*2*Math.PI-Math.PI/2;
      return {x:VCX+300*Math.cos(a), y:VCY+400*Math.sin(a)};
    }
    // All interior/near-body zones use absolute SVG coords so they
    // stay glued to the car regardless of VCY.
    case 'LeftFront':   return {x:32,        y:300+idx*30}; // left of car body (x=60)
    case 'RightFront':return {x:328,       y:300+idx*30}; // right of car body (x=300)
    case 'Hood':         return {x:VCX+off,   y:-66};        // above lengthened front panel (y=-50)
    case 'Trunk':        return {x:VCX+off,   y:600};        // below rear bumper (y=580)
    case 'TrunkInside':  return {x:VCX+off,   y:550};        // inside trunk rect (y=440–560)
    case 'Cabin':        return {x:VCX+off,   y:330};        // mid-cabin
    // Short-range cylinder antenna — physically at the steering column
    // / start-button area.  Park chips just above the dashboard.
    case 'KeyCylinder':  return {x:VCX-22+off, y:170};
    case 'OutOfRange':   return {x:-150+idx*52, y:755};
    default:             return {x:-150+idx*52, y:755};
  }
}

function hitTestZone(x,y){
  // Hood — both the lengthened front-fascia ON the vehicle (y=-50..80)
  // AND the slab ahead of the bumper (y=-120..-50) where chips park
  // (Hood pos y=-66).
  if(x>=60&&x<=300&&y>=-120&&y<80) return 'Hood';
  // Trunk — slab behind the rear bumper (y=585..645) where chips park
  // (Trunk pos y=600).  Tested before the in-body checks so it doesn't
  // collide with the in-body Trunk zone (y=495..544).
  if(x>=60&&x<=300&&y>=580&&y<=650) return 'Trunk';
  // Outboard side slabs — where the device chips actually park
  // (LeftFront pos x=32, RightFront pos x=328).  Tested before
  // body bounds so a chip dropped just OUTBOARD of the door also
  // registers as the door zone.
  if(x>=5  &&x<60 &&y>=125&&y<=430) return 'LeftFront';
  if(x>300&&x<=360&&y>=125&&y<=430) return 'RightFront';
  // Inside vehicle body bounds (60–300 x, 80–580 y).
  // Trunk-cargo area inside the body is the entire y=440..580 band
  // (the visible "cargo / trunk area" rect spans y=440..560 plus the
  // liftgate band y=560..580).  Map all of it to 'TrunkInside' — the
  // outboard 'Trunk' slab handles drops behind the rear bumper.
  if(x>=60&&x<=300&&y>=80&&y<=580){
    if(y<=140) return 'Hood';
    if(y>=440) return 'TrunkInside';
    // KeyCylinder — small dashboard / steering-column region between
    // the firewall and the front-seat area.  Tested before the door
    // edge bands so a chip dropped right at the start-button stays
    // KeyCylinder rather than collapsing to LeftFront / RightFront.
    if(x>=140&&x<=220&&y>=150&&y<=195) return 'KeyCylinder';
    if(x<=112) return 'LeftFront';
    if(x>=248) return 'RightFront';
    return 'Cabin';
  }
  if(inStadium(x,y,300)) return 'Approach';
  if(inStadium(x,y,340)) return 'RfRange';
  return 'OutOfRange';
}

function DeviceChip({device, pos, dimmed, onPointerDown}){
  const {type,label,color,paired}=device;
  const {x,y}=pos;
  const op=dimmed?0.22:0.92;
  const shape=type==='fob'
    ?<rect x={x-11} y={y-7} width={22} height={14} rx={3} fill={color} opacity={op}/>
    :type==='phone'
    ?<rect x={x-6} y={y-10} width={12} height={20} rx={2} fill={color} opacity={op}/>
    :<circle cx={x} cy={y} r={9} fill={color} opacity={op}/>;
  return <g style={{cursor:onPointerDown&&!dimmed?'grab':'default'}}
    onPointerDown={onPointerDown&&!dimmed?onPointerDown:undefined}>
    {!dimmed&&<circle cx={x} cy={y} r={20} fill={color} opacity={0.06}/>}
    {shape}
    <text x={x} y={y+4} textAnchor="middle" fill="#000" fontSize="8" fontFamily="Share Tech Mono" fontWeight="700">{label}</text>
    {!paired&&<text x={x+13} y={y-9} fill="#F04040" fontSize="13" fontWeight="bold">!</text>}
  </g>;
}

function CombinedView({s,set,cfg,onDeviceSelect}){
  const svgRef=useRef(null);
  const [drag,setDrag]=useState(null);
  // drag={key,type,label,color,paired,isNfc,x,y,ox,oy}

  // Build device list
  const allDevices=[];
  for(let i=1;i<=6;i++){
    allDevices.push({key:`Body.PEPS.Plant.KeyFob.${i}.Zone`,type:'fob',label:`F${i}`,
      zone:s[`Body.PEPS.Plant.KeyFob.${i}.Zone`]||'OutOfRange',
      paired:i<=4,color:i<=4?'#F59E0B':'#F04040'});
  }
  for(let i=1;i<=2;i++){
    allDevices.push({key:`Body.PEPS.Plant.BlePhone.${i}.Zone`,type:'phone',label:`P${i}`,
      zone:s[`Body.PEPS.Plant.BlePhone.${i}.Zone`]||'OutOfRange',paired:true,color:'#4A9EF5'});
  }
  for(let i=1;i<=2;i++){
    const pos=s[`Body.PEPS.Plant.NfcCard.${i}.Position`]||'NotPresent';
    // Render NFC card chip at the *driver-side* B-pillar zone — uses
    // the same dealer.driver_door_side cal as PEPS handle routing so
    // the chip moves to the correct side on RHD vehicles.
    const driverSideForChip = cfg?.dealer?.driver_door_side === 'Right' ? 'Right' : 'Left';
    const driverZoneForChip = driverSideForChip === 'Right' ? 'RightFront' : 'LeftFront';
    const zone=pos==='DriverHandle'?driverZoneForChip:pos==='PushButton'?'Cabin':'OutOfRange';
    allDevices.push({key:`Body.PEPS.Plant.NfcCard.${i}.Position`,type:'nfc',label:`N${i}`,
      zone,paired:true,color:'#0DC8C8',isNfc:true,nfcPos:pos});
  }

  // Group by zone for position indexing
  const byZone={};
  allDevices.forEach(d=>{
    if(!byZone[d.zone])byZone[d.zone]=[];
    byZone[d.zone].push(d);
  });

  function svgCoords(e){
    const svg=svgRef.current;
    if(!svg)return{x:0,y:0};
    const ctm=svg.getScreenCTM();
    if(!ctm)return{x:0,y:0};
    const pt=svg.createSVGPoint();
    pt.x=e.clientX;pt.y=e.clientY;
    const r=pt.matrixTransform(ctm.inverse());
    return{x:r.x,y:r.y};
  }

  function startDrag(e,device){
    // Key removal lockout — a fob can only leave the cylinder when
    // the cylinder is rotated to LOCK on KeyCylinder vehicles.  PEPS
    // vehicles aren't affected.  Phones at the cylinder are NFC
    // taps and never physically insert, so they're never stuck.
    if (device.type === 'fob'
        && device.zone === 'KeyCylinder'
        && isFobLockedInCylinder(s, cfg)) {
      return;
    }
    e.preventDefault();
    const {x,y}=svgCoords(e);
    setDrag({...device,x,y,ox:x,oy:y});
  }

  function onMove(e){
    if(!drag)return;
    const {x,y}=svgCoords(e);
    setDrag(d=>({...d,x,y}));
  }

  function onDrop(e){
    if(!drag)return;
    const {x,y}=svgCoords(e);
    const dist=Math.hypot(x-drag.ox, y-drag.oy);
    // Tap (< 8 SVG units) on a fob or phone → select it in the device panel
    if(dist<8 && (drag.type==='fob'||drag.type==='phone') && drag.paired){
      const mFob=drag.key.match(/KeyFob\.(\d+)/);
      const mPh=drag.key.match(/BlePhone\.(\d+)/);
      if(mFob) onDeviceSelect({type:'fob',  index:parseInt(mFob[1])});
      if(mPh)  onDeviceSelect({type:'phone',index:parseInt(mPh[1])});
      setDrag(null);
      return;
    }
    const zone=hitTestZone(x,y);
    if(drag.isNfc){
      // NFC card → reader position mapping, side-aware via the same
      // `dealer.driver_door_side` cal that PEPS uses to route handle
      // pulls.  Only the driver-side B-pillar carries the NFC reader
      // hardware in production; dropping on the passenger side
      // therefore reads as `NotPresent` (no reader to tap).
      // Defaults to Left when cfg is missing or driver_door_side
      // hasn't arrived yet from the broadcast.
      const driverSide = cfg?.dealer?.driver_door_side === 'Right' ? 'Right' : 'Left';
      const driverZone = driverSide === 'Right' ? 'RightFront' : 'LeftFront';
      const nfcPos = zone===driverZone ? 'DriverHandle'
                   : zone==='Cabin'     ? 'PushButton'
                   : 'NotPresent';
      set(drag.key,nfcPos);
    } else {
      // Single-slot cylinder: refuse drops on KeyCylinder when a
      // different fob is already inserted there.  Applies to fobs
      // only; phones can "tap" the NFC pad regardless.
      if(zone==='KeyCylinder' && drag.type==='fob'){
        const mFob=drag.key.match(/KeyFob\.(\d+)/);
        const myIdx=mFob?parseInt(mFob[1]):0;
        const occupant=fobOccupyingCylinder(s);
        if(occupant && occupant !== myIdx){
          // Slot occupied by a different fob — silently bounce.
          setDrag(null);
          return;
        }
      }
      set(drag.key,zone);
    }
    setDrag(null);
  }

  const dropZone=drag?hitTestZone(drag.x,drag.y):null;

  // Existing top-view signals
  const lo=s['Body.Lights.Beam.Low.IsOn'],hi=s['Body.Lights.Beam.High.IsOn'];
  const drl=s['Body.Lights.Running.IsOn'],park=s['Body.Lights.Parking.IsOn'];
  const ffog=s['Body.Lights.Fog.Front.IsOn'],rfog=s['Body.Lights.Fog.Rear.IsOn'];
  const brake=s['Body.Lights.Brake.IsActive'],back=s['Body.Lights.Backup.IsActive'];
  const lp=s['Body.Lights.LicensePlate.IsOn'];
  const lLamp=s['Body.Lights.DirectionIndicator.Left.Lamp.Front.IsOn'];
  const rLamp=s['Body.Lights.DirectionIndicator.Right.Lamp.Front.IsOn'];
  const bothCmded=s['Body.Lights.Hazard.IsSignaling']||(s['Body.Lights.DirectionIndicator.Left.IsSignaling']&&s['Body.Lights.DirectionIndicator.Right.IsSignaling']);
  const li=lLamp, ri=bothCmded?lLamp:rLamp;
  const hlc=hi?'#FFFFFF':lo?'#FCD34D':drl?'#C0C8D0':park?'#FEF3C7':'#0A1420';
  const hlo=hi?.95:lo?.85:drl?.45:park?.2:.04;
  const tlc=brake?'#FF2222':lo||hi||park?'#EF4444':'#1A0808';
  const tlo=brake?.95:lo||hi||park?.75:.08;
  const rlc=back?'#FFFFFF':'#1A1A2A';
  const hood=s['Body.Hood.IsOpen'],trunk=s['Body.Trunk.IsOpen'];
  // Hood tri-state latch (LATCHED / HALF_LATCHED / OPEN).
  // Top-view click logic uses this to gate the OpenCmd / CloseCmd dispatch.
  const hoodLatch = s['Body.Hood.LatchState'] || 'LATCHED';
  const hoodHalf  = hoodLatch === 'HALF_LATCHED';

  // Exterior trunk button — would-it-open indicator.  Mirrors the
  // bridge-side ExteriorTrunkButton + PassiveEntry decision so the
  // dot reflects what an ACTUAL press would do right now:
  //   • valet active → disabled
  //   • cabin unlocked → enabled (direct path)
  //   • cabin locked + paired fob in Trunk zone → enabled (auth path)
  //   • cabin locked + no fob in Trunk zone → disabled
  const trunkBtnLockStatus = s['Cabin.LockStatus'] ?? '';
  const trunkBtnValet      = !!s['Cabin.ValetMode.IsActive'];
  const trunkBtnFobInZone  =
    [1,2,3,4,5,6].some(i => s[`Body.PEPS.Plant.KeyFob.${i}.Zone`] === 'Trunk') ||
    [1,2].some(i => s[`Body.PEPS.Plant.BlePhone.${i}.Zone`] === 'Trunk');
  const trunkBtnUnlocked   =
    trunkBtnLockStatus === 'UNLOCKED' || trunkBtnLockStatus === 'DRIVER_UNLOCKED';
  const trunkBtnLocked     =
    trunkBtnLockStatus === 'LOCKED' || trunkBtnLockStatus === 'DOUBLE_LOCKED';
  const trunkBtnEnabled =
    !trunkBtnValet && (trunkBtnUnlocked || (trunkBtnLocked && trunkBtnFobInZone));

  const mlf=s['Body.Mirror.Left.IsFolded'],mrf=s['Body.Mirror.Right.IsFolded'];
  const wf=s['Body.Windshield.Front.Wiping.Mode']!=='OFF';
  // Exterior puddle lamps — driven by Welcome (and future Farewell /
  // PerimeterAlarm) via the courtesy arbiter.  Rendered as soft blue
  // ovals projected on the ground outboard of each side mirror.
  const puddleL=s['Body.Lights.Puddle.Left.IsOn'];
  const puddleR=s['Body.Lights.Puddle.Right.IsOn'];
  // Interior dome / overhead courtesy lamp — claimed by Welcome via
  // the courtesy arbiter.  Rendered as a soft warm glow over the
  // front-cabin headliner area in the top view.
  const dome=s['Cabin.Lights.IsDomeOn'];

  const doorsData=[
    {pfx:'Body.Doors.Row1.Left',  open:s['Body.Doors.Row1.Left.IsOpen'],  cx:85,cy:207,dx:-65,rx:60, ry:125,rw:50,rh:165,handleSide:'left'},
    {pfx:'Body.Doors.Row1.Right', open:s['Body.Doors.Row1.Right.IsOpen'], cx:275,cy:207,dx:65, rx:250,ry:125,rw:50,rh:165,handleSide:'right'},
    {pfx:'Body.Doors.Row2.Left',  open:s['Body.Doors.Row2.Left.IsOpen'],  cx:85,cy:362,dx:-65,rx:60, ry:295,rw:50,rh:135,handleSide:'left'},
    {pfx:'Body.Doors.Row2.Right', open:s['Body.Doors.Row2.Right.IsOpen'], cx:275,cy:362,dx:65, rx:250,ry:295,rw:50,rh:135,handleSide:'right'},
  ];

  const spokes=(cx,cy,r1,r2)=>[0,51.4,102.8,154.3,205.7,257.1,308.6].map(a=>{
    const rad=a*Math.PI/180;
    return <line key={a} x1={cx+r1*Math.cos(rad)} y1={cy+r1*Math.sin(rad)}
      x2={cx+r2*Math.cos(rad)} y2={cy+r2*Math.sin(rad)} stroke="#252E3C" strokeWidth="2" strokeLinecap="round"/>;
  });

  // Zone label positions
  const ZONE_LABELS=[
    // Labels at top-right corner of each stadium (just inside the rounded cap)
    {zone:'RfRange',    x:VCX+140, y:VCY-425, color:'#4A9EF5'},
    {zone:'Approach',   x:VCX+110, y:VCY-385, color:'#F59E0B'},
    {zone:'OutOfRange', x:-150,    y:755,      color:'#2E3E55'},
  ];

  return <svg ref={svgRef}
    viewBox="-220 -200 800 1020"
    style={{maxHeight:'70vh',height:'100%',userSelect:'none',touchAction:'none',cursor:drag?'grabbing':'default'}}
    onPointerMove={onMove}
    onPointerUp={onDrop}
    onPointerLeave={()=>setDrag(null)}>

    {/* Background grid */}
    <defs>
      <pattern id="cg" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0a1420" strokeWidth="0.5"/>
      </pattern>
      <filter id="backupGlow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      {/* Top-view fog lamp beam — short wide cone, blue-white */}
      <linearGradient id="fogBeamTop" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%"   stopColor="#BAD6FE" stopOpacity="0.60"/>
        <stop offset="100%" stopColor="#BAD6FE" stopOpacity="0"/>
      </linearGradient>
      {/* Top-view headlamp beam — bright at headlight, fades forward */}
      <linearGradient id="headBeamTop" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%"   stopColor="#FCD34D" stopOpacity="0.55"/>
        <stop offset="60%"  stopColor="#FCD34D" stopOpacity="0.12"/>
        <stop offset="100%" stopColor="#FCD34D" stopOpacity="0"/>
      </linearGradient>
    </defs>
    <rect x="-220" y="-200" width="800" height="1020" fill="url(#cg)" opacity="0.07"/>

    {/* OutOfRange tray — positioned BELOW the vehicle, just outside
        the RfRange stadium's rear cap (which now ends at y≈705).
        Devices dragged here are released from the vehicle's PEPS
        zones entirely. */}
    <rect x="-215" y="730" width="790" height="50"
      fill={dropZone==='OutOfRange'?'rgba(46,62,85,0.25)':'none'}
      stroke={dropZone==='OutOfRange'?'#4A9EF5':'#2E3E55'} strokeWidth={dropZone==='OutOfRange'?1.5:1}
      strokeDasharray="5,3" rx="4"/>
    <text x="-180" y="760" fill={dropZone==='OutOfRange'?'#4A9EF5':'#2E3E55'} fontSize="9" fontFamily="Share Tech Mono" fontWeight="600">OUT OF RANGE — drag here to remove from vehicle</text>

    {/* RF Range stadium — halfW=340, straightH=100, centred at (VCX, VCY=265)
         rect: x=VCX-340, y=VCY-100-340, width=680, height=880, rx=340.
         Vertical extent y=-175..705 — enclosing the lengthened
         vehicle (hood front y=-50 to liftgate y=580) with ~125 px
         margin top/bottom. */}
    <rect x={VCX-340} y={VCY-100-340} width={680} height={880} rx={340}
      fill={dropZone==='RfRange'?'rgba(74,158,245,0.07)':'none'}
      stroke="#4A9EF5" strokeWidth={dropZone==='RfRange'?2:1}
      opacity={dropZone==='RfRange'?0.6:0.2} strokeDasharray="8,4"/>
    <text x={VCX+140} y={VCY-100-340+20} fill="#4A9EF5" fontSize="9" fontFamily="Share Tech Mono" opacity={dropZone==='RfRange'?0.8:0.4}>RF RANGE</text>

    {/* Approach stadium — halfW=300, straightH=100, centred at (VCX, VCY).
         40 px gap from RfRange both horizontally and vertically so
         the two boundaries stay clearly distinct. */}
    <rect x={VCX-300} y={VCY-100-300} width={600} height={800} rx={300}
      fill={dropZone==='Approach'?'rgba(245,158,11,0.07)':'none'}
      stroke="#F59E0B" strokeWidth={dropZone==='Approach'?2:1}
      opacity={dropZone==='Approach'?0.6:0.2} strokeDasharray="5,3"/>
    <text x={VCX+110} y={VCY-100-300+20} fill="#F59E0B" fontSize="9" fontFamily="Share Tech Mono" opacity={dropZone==='Approach'?0.8:0.4}>APPROACH</text>

    {/* KeyCylinder — short-range LF antenna at the steering column /
        start button.  Drop zone is a small rectangle in the dashboard
        region.  Used by VehicleStartingControl on KeyCylinder builds
        (fob authenticates only when sitting at the cylinder) and as a
        low-battery fallback on PEPS builds. */}
    <rect x={140} y={150} width={80} height={45} rx={6}
      fill={dropZone==='KeyCylinder'?'rgba(74,158,245,0.18)':'rgba(74,158,245,0.05)'}
      stroke="#4A9EF5" strokeWidth={dropZone==='KeyCylinder'?2:1}
      opacity={dropZone==='KeyCylinder'?0.9:0.45} strokeDasharray="3,2"/>
    <text x={180} y={167} textAnchor="middle" fill="#4A9EF5" fontSize="8"
      fontFamily="Share Tech Mono" fontWeight="700"
      opacity={dropZone==='KeyCylinder'?1:0.55}>KEY CYLINDER</text>

    {/* ── Vehicle top view ── */}
    {/* Headlamp beam cones — fan forward from each headlight in top
        view.  Shifted up 80 px (headlight at y=-35) to track the
        lengthened hood. */}
    {(drl||lo||hi)&&<>
      <path d={hi
        ? "M 78,-35 L 25,-175 L 148,-175 Z"
        : lo
        ? "M 78,-35 L 12,-132 L 158,-132 Z"
        : "M 78,-35 L 42,-78 L 122,-78 Z"}
        fill="url(#headBeamTop)" opacity={hi?0.58:lo?0.40:0.16}/>
      <path d={hi
        ? "M 282,-35 L 212,-175 L 335,-175 Z"
        : lo
        ? "M 282,-35 L 202,-132 L 348,-132 Z"
        : "M 282,-35 L 238,-78 L 318,-78 Z"}
        fill="url(#headBeamTop)" opacity={hi?0.58:lo?0.40:0.16}/>
    </>}

    {/* SUV body */}
    <rect x="60" y="80" width="240" height="480" rx="8" fill="#0C1825" stroke="#1A2838" strokeWidth="1"/>
    <line x1="60" y1="150" x2="300" y2="150" stroke="#182030" strokeWidth="1" opacity=".6"/>
    <line x1="60" y1="290" x2="300" y2="290" stroke="#182030" strokeWidth="1" opacity=".6"/>
    <line x1="60" y1="430" x2="300" y2="430" stroke="#182030" strokeWidth="1" opacity=".6"/>

    {/* Front section / hood — extended forward so the hood length
        (~130 px from y=-50 to y=80) matches the trunk length, giving
        the side-mirror positions visual sense at the A-pillar /
        beltline junction.  All front-fascia lamps shift up by 80 px
        to stay anchored at the front bumper. */}
    {/* Hood — tri-state click target.  HALF_LATCHED → OpenCmd;
        OPEN → CloseCmd; LATCHED → no-op (must double-pull dash lever
        first).  Stroke + fill change with state so the user can see
        the popped-but-still-closed condition. */}
    <rect x="60" y="-50" width="240" height="130" rx="4"
      fill={hood?'#1A2838':hoodHalf?'#1A2230':'#0D1628'}
      stroke={hood?'#F59E0B':hoodHalf?'#F59E0B':'#1A2838'}
      strokeWidth={hood||hoodHalf?2:1}
      style={{cursor:(hoodHalf||hood)?'pointer':'default'}}
      onClick={hood
        ? ()=>set('Body.Hood.CloseCmd',true)
        : hoodHalf
          ? ()=>set('Body.Hood.OpenCmd',true)
          : undefined}>
      <title>{hood
        ? 'Hood OPEN — click to close'
        : hoodHalf
          ? 'Hood HALF-LATCHED — click to fully open'
          : 'Hood LATCHED — pull the dash hood-release lever twice within 3 s to pop'}</title>
    </rect>
    {hood&&<rect x="70" y="-45" width="220" height="8" fill="#F59E0B" opacity=".4"/>}
    {/* Half-latched visual cue — narrow popped gap at the front edge. */}
    {hoodHalf&&!hood&&<rect x="70" y="-50" width="220" height="2" fill="#F59E0B" opacity=".7"/>}
    <rect x="70" y="-40" width="220" height="120" fill="#09111E" stroke="#182030" strokeWidth="0.5"
      style={{pointerEvents:'none'}}/>
    {hoodHalf&&!hood&&<text x="180" y="40" textAnchor="middle" fill="#F59E0B" fontSize="6" fontWeight="bold"
      style={{pointerEvents:'none'}}>▣ TAP TO OPEN HOOD</text>}
    {hood&&<text x="180" y="40" textAnchor="middle" fill="#F59E0B" fontSize="6" fontWeight="bold"
      style={{pointerEvents:'none'}}>▣ TAP TO CLOSE HOOD</text>}

    {/* Headlights */}
    <g><title>{`Left headlight — ${hi?'HIGH BEAM':lo?'LOW BEAM':drl?'DRL':park?'PARKING':'off'}`}</title>
      <rect x="70" y="-35" width="30" height="28" rx="3" fill={hlc} opacity={hlo/1.5}/>
      <text x="85" y="-15" textAnchor="middle" fill={hlc} fontSize="10" fontWeight="bold" opacity={hlo}>{lo?'●':'○'}</text>
    </g>
    <g><title>{`Right headlight — ${hi?'HIGH BEAM':lo?'LOW BEAM':drl?'DRL':park?'PARKING':'off'}`}</title>
      <rect x="260" y="-35" width="30" height="28" rx="3" fill={hlc} opacity={hlo/1.5}/>
      <text x="275" y="-15" textAnchor="middle" fill={hlc} fontSize="10" fontWeight="bold" opacity={hlo}>{lo?'●':'○'}</text>
    </g>

    {/* Turn indicators front — outboard of the headlights at the
        bumper corners. */}
    <rect x="65" y="-5" width="32" height="10" rx="2" fill={li?'#F59E0B':'#1A1208'} opacity={li?1:.25}>
      <title>{li?'Left front turn indicator — signaling':'Left front turn indicator — off'}</title>

    <rect x="263" y="-5" width="32" height="10" rx="2" fill={ri?'#F59E0B':'#1A1208'} opacity={ri?1:.25}>
      <title>{ri?'Right front turn indicator — signaling':'Right front turn indicator — off'}</title>
    </rect>

    {/* Front fog — indicator strip centred inside each headlight assembly (well clear of edges) */}
    <rect x="78" y="-30" width="6" height="20" rx="2" fill={ffog?'#BAD6FE':'#0A1828'} opacity={ffog?0.90:.30}>

    <rect x="272" y="-30" width="6" height="20" rx="2" fill={ffog?'#BAD6FE':'#0A1828'} opacity={ffog?0.90:.30}>
      <title>{ffog?'Right front fog lamp — on':'Right front fog lamp — off'}</title>
    </rect>
    {/* Front fog beams — short wide cones projecting forward, apex at fog strip centre */}
    {ffog&&<>
