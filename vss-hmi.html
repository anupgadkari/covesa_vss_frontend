    {/* ── Gear shifter ── */}
    <CockpitZone title="GEAR SHIFTER" subtitle="SelectedGear → TransmissionPlant → CurrentGear" night={night}>
      {(()=>{
        // BTSI status — true while P is engaged but brake + ignition
        // haven't both been satisfied.  Drives a small inline chip so
        // the driver understands why a P→D shift is being rejected.
        const shiftLock = !!s['Powertrain.Transmission.ShiftLockEngaged'];
        return <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {[{lab:'P',g:126},{lab:'R',g:-1},{lab:'N',g:0},{lab:'D',g:127},{lab:'S',g:128}].map(({lab,g})=>{
            // Grey out non-P chips while the shift lock is engaged so
            // the user can see the interlock at a glance.
            const isP = lab === 'P';
            const blocked = shiftLock && !isP;
            return <span key={lab}
              style={{opacity:blocked?0.4:1,
                      cursor:blocked?'not-allowed':'pointer',
                      display:'inline-block'}}>
              <Btn night={night} on={gearLabel(selGear)===lab}
                onClick={()=>set('Powertrain.Transmission.SelectedGear',g)}
                sz={14} pad={'10px 18px'} min={50}>{lab}</Btn>
            </span>;
          })}
          {shiftLock && <div style={{fontFamily:'Share Tech Mono',fontSize:9,
            color:'#F59E0B',fontWeight:700,padding:'4px 8px',borderRadius:3,
            border:'1px solid #F59E0B',background:'rgba(245,158,11,0.08)',
            letterSpacing:0.5,marginLeft:6}}>
            🔒 SHIFT-LOCK · press brake + ignition ON
          </div>}
          <span style={{flex:1}}/>
          {/* Driver-intent readout — mirrors the highlighted button.
              The cluster PRND under the speedometer is the authoritative
              "actual engaged gear" indicator (bound to CurrentGear). */}
          <div style={{fontFamily:'Orbitron',fontSize:24,fontWeight:700,color:'#F59E0B',
            border:`1px solid ${night?'#3A2A12':'#1A2838'}`,padding:'4px 18px',borderRadius:4,minWidth:60,textAlign:'center'}}>
            {gearLabel(selGear)}
          </div>
        </div>;
      })()}
    </CockpitZone>

    {/* ── Row-1 door trim panels — left + right side-by-side. ──
         Layout is fixed (LEFT=Row1.Left, RIGHT=Row1.Right physically);
         labels and contents flip based on `driver_door_side`.  Each
         side carries the inside pull and lock pad.  The passenger
         side also carries its own local window switch writing
         Body.Switches.Window.Local.Row1.{passenger-side}.*; the
         driver side has no local window switch (the master pack on
         the driver door card covers it via DriverMaster.*).
         Central locking is cabin-wide — pressing LOCK or UNLOCK on
         either side feeds the DoorTrimButton feature which applies
         the two-stage policy.  Mirror master pad and 4-window
         switch pack live in the DRIVER DOOR TRIM BUTTONS below. */}
    {(() => {
      const Side = ({side, isDriver}) => {
        const pull = side==='Left' ? pullL : pullR;
        const pullKey = `Body.Doors.Row1.${side}.Handle.Inside.IsPulled`;
        const lockKey   = `Body.Switches.DoorTrim.Row1.${side}.LockButton`;
        const unlockKey = `Body.Switches.DoorTrim.Row1.${side}.UnlockButton`;
        const dbl = side==='Left' ? dblL : false;
        const winKey = `Body.Doors.Row1.${side}.Window.Position`;
        const motorKey = `Body.Doors.Row1.${side}.Window.MotorDirection`;
        const localDetent = `Body.Switches.Window.Local.Row1.${side}.Detent`;
        return <CockpitZone
          title={`${side.toUpperCase()} DOOR TRIM`}
          subtitle={isDriver ? 'driver' : 'passenger'}
          night={night}>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            <Btn night={night} on={pull} {...holdSwitch(pullKey)}
              sz={10} pad={'8px 12px'}>
              {side==='Left'?'⇲':'⇱'} INSIDE PULL {pull?'●':''}
            </Btn>
            <div style={{display:'flex',gap:6}}>
              {/* Momentary push: highlight tracks the switch input
                  (true while held), not the resulting lock state.
                  The persistent lock state shows elsewhere (top view
                  IsLocked / IsDoubleLocked + the LOCK label suffix). */}
              <Btn night={night} on={!!s[unlockKey]} {...holdSwitch(unlockKey)} sz={9} pad={'6px 10px'} min={90}>UNLOCK</Btn>
              <Btn night={night} on={!!s[lockKey]}   {...holdSwitch(lockKey)}   sz={9} pad={'6px 10px'} min={90}>LOCK {dbl?'⊕⊕':''}</Btn>
            </div>
            {/* Passenger side: own local window switch (hold-to-move).
                Driver side: no local switch — the master pack handles it. */}
            {isDriver
              ? <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,fontStyle:'italic'}}>
                  Window + mirror master controls are in the DRIVER DOOR TRIM BUTTONS below.
                </span>
              : <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                  <WindowRocker s={s} set={set} night={night}
                    detentKey={localDetent} posKey={winKey} motorKey={motorKey}
                    label="LOCAL"/>
                  <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,maxWidth:90}}>
                    5-detent: outer detents latch AUTO; both-source presses STOP
                  </span>
                </div>
            }
          </div>
        </CockpitZone>;
      };
      return <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <Side side="Left"  isDriver={driverSide==='Left'}/>
        <Side side="Right" isDriver={driverSide==='Right'}/>
      </div>;
    })()}

    {/* ── Row-2 rear-door trim panels — local window switches only. ──
         The inside pull on rear doors is already exercisable from the
         top view; the cockpit just exposes the per-door local window
         5-detent rocker so child-lock gating in `PowerWindow` can be
         demonstrated.  The rocker stays clickable when the door is
         child-locked — it still writes the Detent signal — so a
         tester can confirm the feature observes the write and
         declines to claim the motor arbiter.  Only the visual is
         dimmed; the wiring is identical to the unlocked case. */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      {[
        {side:'Left',  childLock:childRL},
        {side:'Right', childLock:childRR},
      ].map(({side,childLock})=>{
        const winKey      = `Body.Doors.Row2.${side}.Window.Position`;
        const motorKey    = `Body.Doors.Row2.${side}.Window.MotorDirection`;
        const localDetent = `Body.Switches.Window.Local.Row2.${side}.Detent`;
        return <CockpitZone key={side}
          title={`REAR ${side.toUpperCase()} TRIM`}
          subtitle={childLock?'child-locked — writes ignored by feature':'local window'}
          night={night}>
          <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
            <WindowRocker s={s} set={set} night={night}
              detentKey={localDetent} posKey={winKey} motorKey={motorKey}
              label="LOCAL" dimmed={childLock}/>
            <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,maxWidth:130,fontStyle:childLock?'italic':'normal'}}>
              {childLock
                ? 'Switch still writes Detent — PowerWindow observes and refuses to claim arbiter while child-locked.'
                : '5-detent: outer = AUTO. Cancel via any press.'}
            </span>
          </div>
        </CockpitZone>;
      })}
    </div>

    {/* ── Driver master panel ──
         The cluster of master controls physically located on the
         driver's door card: mirror controls + 4-way window switches
         + power child-lock master button.
         - Mirrors: master fold, side select, 4-way direction dpad
           on Body.Switches.Mirror.{Fold,Select,Direction}.
           Direction is press-and-hold; releasing writes NONE.
         - Windows: 2×2 grid of 5-detent rockers writing
           Body.Switches.Window.DriverMaster.Row{1,2}.{L,R}.Detent.
           The PowerWindow feature owns the state machine, cross-
           source conflict resolution, and the stuck-switch
           watchdog; the WindowPlant ramps the position at 10 %/s.
         - Power child lock: momentary push on
           Body.Switches.PowerChildLock.IsPressed.  The
           PowerChildLock feature toggles MasterStatus + both rear
           IsChildLockActive on each rising edge.  Door plant
           suppresses inside-pull on a child-locked door; the local
           rear window switches are also suppressed by
           PowerWindow. */}
    <CockpitZone title="DRIVER DOOR TRIM BUTTONS" subtitle="mirrors · windows · child locks" night={night}>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {/* Momentary toggle — write true then immediately false so
              the bridge sees a clean rising edge.  The button label
              suffix (● / ○) reflects the resulting fold state from
              the bus; the button itself is never "on" (no persistent
              highlight on a momentary push). */}
          <Btn night={night} on={false}
            onClick={()=>{set('Body.Switches.Mirror.Fold',true);setTimeout(()=>set('Body.Switches.Mirror.Fold',false),60);}}
            sz={9} pad={'7px 12px'} min={90}>FOLD {(mirL&&mirR)?'●':'○'}</Btn>
          <div style={{display:'flex',gap:5}}>
            <Btn night={night} on={mirSel==='LEFT'}  onClick={()=>set('Body.Switches.Mirror.Select', mirSel==='LEFT' ?'NONE':'LEFT')}  sz={9} pad={'6px 10px'} min={42}>SEL L</Btn>
            <Btn night={night} on={mirSel==='RIGHT'} onClick={()=>set('Body.Switches.Mirror.Select', mirSel==='RIGHT'?'NONE':'RIGHT')} sz={9} pad={'6px 10px'} min={42}>SEL R</Btn>
          </div>
          <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,letterSpacing:1}}>
            {mirSel==='NONE'?'no side selected':`adjusting ${mirSel}`}
          </span>
        </div>
        {/* 4-way direction dpad — disabled when no side is selected.
            Press-and-hold: press writes the direction; release/leave
            writes NONE so the plant stops integrating. */}
        {(() => {
          const enabled = mirSel !== 'NONE';
          const dirBtn = (v, label) => {
            const lit = mirDir === v;
            const press = enabled ? {
              onMouseDown: () => set('Body.Switches.Mirror.Direction', v),
              onMouseUp:   () => set('Body.Switches.Mirror.Direction', 'NONE'),
              onMouseLeave:() => { if (mirDir === v) set('Body.Switches.Mirror.Direction', 'NONE'); },
            } : {};
            return <button {...press} disabled={!enabled} style={{
              width:36,height:36,padding:0,borderRadius:6,
              background: lit?(night?'#3A2C0A':'#1E3A52'):(night?'#0A1018':'#0E1625'),
              border: `1px solid ${lit?(night?'#F59E0B':'#4A9EF5'):(night?'#2A3A50':'#1A2838')}`,
              color: lit?(night?'#F59E0B':'#4A9EF5'):(night?'#D7A03A':'#3A5070'),
              fontFamily:'Share Tech Mono',fontSize:14,fontWeight:700,
              cursor:enabled?'pointer':'not-allowed',opacity:enabled?1:0.35,
              userSelect:'none',touchAction:'none',
            }}>{label}</button>;
          };
          return <div style={{display:'grid',gridTemplateColumns:'36px 36px 36px',
            gridTemplateRows:'36px 36px 36px',gap:4,justifyContent:'center'}}>
            <div/>{dirBtn('UP','▲')}<div/>
            {dirBtn('LEFT','◀')}
            <div style={{width:36,height:36,opacity:0.25,display:'flex',alignItems:'center',
              justifyContent:'center',fontFamily:'Share Tech Mono',fontSize:10,
              color:txtDim,border:`1px dashed ${night?'#2A3A50':'#1A2838'}`,borderRadius:6}}>
              {mirSel==='NONE'?'—':mirSel[0]}
            </div>
            {dirBtn('RIGHT','▶')}
            <div/>{dirBtn('DOWN','▼')}<div/>
          </div>;
        })()}
      </div>

      {/* Driver-master window switch pack — 4 vertical 5-detent
          rockers arranged in a 2×2 grid (FL/FR top row, RL/RR
          bottom row), matching the physical pack layout on a real
          door card.  Each rocker writes
          Body.Switches.Window.DriverMaster.Row{1,2}.{L,R}.Detent.
          The PowerWindow feature owns the state machine + cross-
          source conflict resolution.  Rear positions dim when the
          matching rear door is child-locked — visual cue only; the
          driver master is not actually blocked by child lock. */}
      <div style={{marginTop:10}}>
        <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,letterSpacing:1,display:'block',marginBottom:4}}>WINDOWS — 2×2 master pack (UP = close, DOWN = open; outer detents latch AUTO):</span>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxWidth:260}}>
          {[
            {pos:'Body.Doors.Row1.Left.Window.Position',  motor:'Body.Doors.Row1.Left.Window.MotorDirection',  det:'Body.Switches.Window.DriverMaster.Row1.Left.Detent',  l:driverSide==='Left' ?'FL (drv)':'FL (pas)'},
            {pos:'Body.Doors.Row1.Right.Window.Position', motor:'Body.Doors.Row1.Right.Window.MotorDirection', det:'Body.Switches.Window.DriverMaster.Row1.Right.Detent', l:driverSide==='Right'?'FR (drv)':'FR (pas)'},
            {pos:'Body.Doors.Row2.Left.Window.Position',  motor:'Body.Doors.Row2.Left.Window.MotorDirection',  det:'Body.Switches.Window.DriverMaster.Row2.Left.Detent',  l:'RL', childLock:childRL},
            {pos:'Body.Doors.Row2.Right.Window.Position', motor:'Body.Doors.Row2.Right.Window.MotorDirection', det:'Body.Switches.Window.DriverMaster.Row2.Right.Detent', l:'RR', childLock:childRR},
          ].map(({pos,motor,det,l,childLock})=>(
            <WindowRocker key={pos} s={s} set={set} night={night}
              detentKey={det} posKey={pos} motorKey={motor}
              label={l} dimmed={!!childLock}/>
          ))}
        </div>
      </div>

      {/* Master child-lock indicator + push.  Single momentary
          button on Body.Switches.PowerChildLock.IsPressed; the
          PowerChildLock feature toggles MasterStatus on each rising
          edge and fans it out to both rear-door IsChildLockActive
          outputs.  The LED reflects MasterStatus (feature output —
          read-only); the click writes the input. */}
      {(() => {
        const press = {
          onMouseDown: () => set('Body.Switches.PowerChildLock.IsPressed', true),
          onMouseUp:   () => set('Body.Switches.PowerChildLock.IsPressed', false),
          onMouseLeave:() => set('Body.Switches.PowerChildLock.IsPressed', false),
        };
        return <div style={{display:'flex',gap:10,marginTop:10,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,letterSpacing:1}}>SAFETY:</span>
          <button {...press}
            title={`Master child lock — ${masterChildLock?'engaged':'released'} (tap to toggle).  Disables inside-pull on rear doors and suppresses rear local window switches.`}
            style={{
              display:'flex',alignItems:'center',gap:8,
              background: masterChildLock?(night?'#3A2C0A':'#1E3A52'):(night?'#0A1018':'#0E1625'),
              border: `1px solid ${masterChildLock?(night?'#F59E0B':'#4A9EF5'):(night?'#2A3A50':'#1A2838')}`,
              color: masterChildLock?(night?'#F59E0B':'#4A9EF5'):(night?'#5A7090':'#3A5070'),
              fontFamily:'Share Tech Mono',fontSize:9,fontWeight:600,
              padding:'8px 14px',borderRadius:4,cursor:'pointer',
              userSelect:'none',touchAction:'none',
            }}>
            {/* LED dot — bright amber when engaged, dim grey otherwise. */}
            <span style={{
              width:10,height:10,borderRadius:'50%',
              background: masterChildLock ? '#F59E0B' : (night?'#1A2838':'#3A4D5C'),
              boxShadow: masterChildLock ? '0 0 6px rgba(245,158,11,0.7)' : 'none',
            }}/>
            <span style={{fontSize:16,lineHeight:1}}>{masterChildLock?'🔒':'🔓'}</span>
            <span>CHILD LOCK</span>
            <span style={{fontSize:7,color:txtDim,fontStyle:'italic',marginLeft:4}}>
              {masterChildLock?'engaged · rear inside-pulls + local windows inert':'released'}
            </span>
          </button>
          <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,fontStyle:'italic'}}>
            LED = PowerChildLock.MasterStatus · click = momentary push
          </span>
        </div>;
      })()}
    </CockpitZone>

    {/* ── Ambient / footwell lighting ── */}
    <CockpitZone title="AMBIENT LIGHTING" subtitle="footwell · console · door piping" night={night}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
        {[
          {k:'Cabin.Lights.Ambient.Footwell.Left.IsOn',l:'FOOTWELL L'},
          {k:'Cabin.Lights.Ambient.Footwell.Right.IsOn',l:'FOOTWELL R'},
          {k:'Cabin.Lights.Ambient.CenterConsole.IsOn',l:'CONSOLE'},
          {k:'Cabin.Lights.Ambient.DoorCard.IsOn',l:'DOOR PIPING'},
        ].map(({k,l})=>{
          const on=!!s[k];
          return <Btn key={k} on={on} onClick={()=>set(k,!on)}>{l} {on?'●':'○'}</Btn>;
        })}
      </div>
      <div style={{marginTop:6,fontFamily:'Share Tech Mono',fontSize:8,color:txtDim,fontStyle:'italic'}}>
        Each lamp will be backlit-tied to the LightSwitch feature in a follow-up.
      </div>
    </CockpitZone>

    {/* ── Status bar ── */}
    <CockpitZone title="STATUS" night={night}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:6,fontFamily:'Share Tech Mono',fontSize:9}}>
        <span style={{color: wf!=='OFF'?'#4A9EF5':txtDim}}>WIPERS: <b>{wf}</b></span>
        <span style={{color: horn?'#EF4444':txtDim}}>HORN: <b>{horn?'●':'-'}</b></span>
        <span style={{color: dome?'#FCD34D':txtDim}}>DOME: <b>{dome?'ON':'OFF'}</b></span>
        <span style={{color: fuel?'#F59E0B':txtDim}}>FUEL: <b>{fuel?'OPEN':'-'}</b></span>
        <span style={{color: trunk?'#F59E0B':txtDim}}>GATE: <b>{trunk?'OPEN':'-'}</b></span>
        {/* DAP — gates PowerWindow (and other accessory features later).
            Active when ign is on, OR within 2 min after ign off provided
            no door has opened.  When OFF the cockpit windows won't move. */}
        <span style={{color: s['Body.Power.DelayedAccessory.IsActive']?'#10D98A':'#EF4444'}}
              title="Delayed accessory power: ign-on, or 2-min courtesy window after ign-off (kills on door-open).">
          ACC PWR: <b>{s['Body.Power.DelayedAccessory.IsActive']?'ON':'OFF'}</b>
        </span>
      </div>
    </CockpitZone>

  </div>;
}

/* ══════ CONTROL PANEL ══════ */
const PEPS_BTN_OPTS=[
  {val:'LOCK',label:'LOCK'},{val:'UNLOCK',label:'UNLOCK'},
  {val:'TRUNK_RELEASE',label:'TRUNK'},{val:'REMOTE_START',label:'START'},{val:'PANIC_ALARM',label:'PANIC'},
];

/* ── Zone proximity bar ────────────────────────────────────────── */
const ZONE_PROX=[
  {key:'OutOfRange', label:'OUT',      c:'#1E2C3C'},
  {key:'RfRange',    label:'RF',       c:'#4A9EF5'},
  {key:'Approach',   label:'APPR',     c:'#F59E0B'},
  {key:'Interior',   label:'INT',      c:'#10D98A'},
];
const INTERIOR_ZONES=new Set(['Hood','Trunk','TrunkInside','LeftFront','RightFront','Cabin']);

/* The cylinder is a single physical slot — only one fob's mechanical
   key bow can be inserted at a time.  Returns the slot index (1-6) of
   the fob currently at KeyCylinder, or 0 if empty.  Phones and NFC
   cards don't count: their "presence" at the cylinder is an NFC tap,
   not a mechanical insertion. */
function fobOccupyingCylinder(s){
  for(let i=1;i<=6;i++){
    if(s[`Body.PEPS.Plant.KeyFob.${i}.Zone`]==='KeyCylinder') return i;
  }
  return 0;
}

/* Fob-stuck-in-cylinder predicate.
   A fob can be pulled out of the cylinder only when the cylinder is
   actually rotated to LOCK — which on KeyCylinder vehicles also
   requires the transmission to be in PARK (the bridge enforces that
   rotation gate via RemovalInhibited).  Position-based check here
   covers the case where the driver shifts to P but hasn't yet
   rotated to LOCK; in real cars the key still won't come out. */
function isFobLockedInCylinder(s, cfg){
  const keySource = cfg?.vehicle_line?.key_source_cfg || 'PEPS';
  if(keySource !== 'KeyCylinder') return false;
  const pos = s['Body.Switches.IgnitionCylinder.Position'] || 'LOCK';
  return pos !== 'LOCK';
}

/* ── Dedicated Auth Device Panel ──────────────────────────────── */
function DevicePanel({s, set, sel, setSel}){
  const [firedBtn, setFiredBtn]=useState(null);

  // Device selector list: paired fobs 1-4 + intruder fobs 5-6 + phones 1-2.
  // Intruder fobs are coloured red to distinguish them from authorised
  // (amber) fobs.  Fob 5 is a mechanically-compatible / unauthorised key;
  // Fob 6 is an incompatible key blank (modelled in the zone-button
  // filter — its CYLINDER tile is hidden).
  const devices=[
    ...[1,2,3,4].map(i=>({type:'fob',  index:i, label:`F${i}`, color:'#F59E0B', pfx:`Body.PEPS.Plant.KeyFob.${i}`,  sigKey:'Zone'})),
    ...[5,6]    .map(i=>({type:'fob',  index:i, label:`F${i}`, color:'#F04040', pfx:`Body.PEPS.Plant.KeyFob.${i}`,  sigKey:'Zone', intruder:true})),
    ...[1,2]    .map(i=>({type:'phone',index:i, label:`P${i}`, color:'#4A9EF5', pfx:`Body.PEPS.Plant.BlePhone.${i}`, sigKey:'Zone'})),
    // NFC cards — signal is `.Position` (NfcPosition enum), not `.Zone`.
    // Default value `NotPresent` represents "no NFC reader contact".
    ...[1,2]    .map(i=>({type:'nfc',  index:i, label:`N${i}`, color:'#0DC8C8', pfx:`Body.PEPS.Plant.NfcCard.${i}`,  sigKey:'Position', isNfc:true})),
  ];

  const dev=devices.find(d=>d.type===sel.type&&d.index===sel.index)||devices[0];
  const isNfc = dev.type === 'nfc';
  // Raw signal value (Zone enum for fobs/phones, NfcPosition enum for cards).
  const rawSlot=s[`${dev.pfx}.${dev.sigKey}`] || (isNfc?'NotPresent':'OutOfRange');
  // Logical "zone" used by the proximity bar + colour code.  NFC
  // positions translate into a representative zone (LeftFront for
  // DriverHandle, Cabin for PushButton) just for the colour band —
  // the actual signal write goes through the NFC-specific quick-
  // assign buttons below, not the zone grid.
  const zone = isNfc
    ? (rawSlot==='DriverHandle' ? 'LeftFront' : rawSlot==='PushButton' ? 'Cabin' : 'OutOfRange')
    : rawSlot;
  const rssi=isNfc?'':(s[`${dev.pfx}.RssiResponse`]||'');
  const rfMsg=dev.type==='fob'?(s[`${dev.pfx}.RfMessage`]||''):'';
  const btnPress=dev.type==='fob'?(s[`${dev.pfx}.ButtonPress`]||'NONE'):null;

  // Zone colour
  const zoneColor=INTERIOR_ZONES.has(zone)?'#10D98A':
    zone==='Approach'?'#F59E0B':zone==='RfRange'?'#4A9EF5':'#2A3A50';

  // Proximity bar active segment
  const proxActive=INTERIOR_ZONES.has(zone)?'Interior':zone;

  function pressBtn(val){
    setFiredBtn(val);
    set(`${dev.pfx}.ButtonPress`, val);
    setTimeout(()=>{set(`${dev.pfx}.ButtonPress`,'NONE');setFiredBtn(null);}, 600);
  }

  return <div className="devpanel">
    <div className="devpanel-hdr">
      <div style={{width:6,height:6,borderRadius:2,background:'var(--teal)',opacity:.6}}/>
      <span className="devpanel-title">AUTH DEVICE</span>
    </div>
    <div className="devpanel-inner">

      {/* Device chips — tap to select */}
      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
        {devices.map(d=>{
          const dSlot=s[`${d.pfx}.${d.sigKey}`] || (d.isNfc?'NotPresent':'OutOfRange');
          const inRange = d.isNfc ? dSlot!=='NotPresent' : dSlot!=='OutOfRange';
          const isSel=d.type===sel.type&&d.index===sel.index;
          return <div key={d.type+d.index}
            className={`devchip${isSel?' active':''}${inRange?' inrange':''}`}
            style={{color:isSel||inRange?d.color:'',
                    borderColor:isSel?d.color:inRange?`${d.color}60`:'',
                    background:isSel?`${d.color}18`:''}}
            onClick={()=>setSel({type:d.type,index:d.index})}>
            {d.label}
          </div>;
        })}
      </div>

      {/* Zone display — for NFC, displays the NfcPosition enum value
          (DriverHandle / PushButton / NotPresent) instead of the
          zone name, since cards have no physical "zone". */}
      <div className="devpanel-zone">
        <div className="devpanel-section">{isNfc?'NFC POSITION':'ZONE'}</div>
        <div className="devpanel-zoneval" style={{color:zoneColor}}>{isNfc?rawSlot:zone}</div>
        {/* Proximity bar */}
        <div className="devpanel-prox">
          {ZONE_PROX.map(seg=>{
            const isActive=seg.key===proxActive;
            return <div key={seg.key} className="devpanel-proxseg"
              style={{background:isActive?seg.c:'var(--bdr)',
                      flex:seg.key==='Interior'?1.5:1,
                      opacity:isActive?1:.4,
                      boxShadow:isActive?`0 0 6px ${seg.c}`:''}}
              title={seg.label}/>;
          })}
        </div>
        <div style={{display:'flex',gap:2,marginTop:1}}>
          {ZONE_PROX.map(seg=><span key={seg.key}
            style={{flex:seg.key==='Interior'?1.5:1,fontFamily:'var(--fm)',fontSize:'6px',
                    color:seg.key===proxActive?seg.c:'var(--muted)',textAlign:'center'}}>
            {seg.label}</span>)}
        </div>
      </div>

      {/* NFC quick-assign — only 3 valid NfcPosition values.
          Bypasses the zone-based grid entirely. */}
      {isNfc && (()=>{
        const NFC_BTNS=[
          {z:'NotPresent',  label:'NOT\nPRESENT',  c:'#2E3E55'},
          {z:'DriverHandle',label:'DRIVER\nHANDLE',c:'#10D98A'},
          {z:'PushButton',  label:'PUSH\nBUTTON',  c:'#4A9EF5'},
        ];
        return <>
          <div className="devpanel-section">PLACE AT READER</div>
          <div className="zonepick">
            {NFC_BTNS.map(({z,label,c})=>{
              const isActive=rawSlot===z;
              return <button key={z}
                className={`zpbtn${isActive?' zp-active':''}`}
                style={{borderColor:isActive?c:'',background:isActive?c:'',color:isActive?'#0a0f18':''}}
                onClick={()=>set(`${dev.pfx}.${dev.sigKey}`,z)}>
                {label}
              </button>;
            })}
          </div>
        </>;
      })()}

      {/* Zone quick-assign */}
      {!isNfc && (()=>{
        // CYLINDER / BACKUP represents the short-range LF + NFC pad
        // at the start button / cylinder.  Devices that can sit there:
        //   - Authorised fobs (F1-F4) via the LF transponder.
        //   - Fob 5 mechanically fits but fails the immobilizer check.
        //   - Phones (P1, P2) tap the cylinder NFC pad — same model
        //     as a phone tapped on the driver-door NFC reader for
        //     unlock, just at the start-button NFC pad for ignition.
        // Excluded:
        //   - Fob 6 — physically incompatible key blank, can't even
        //     be inserted into the cylinder.
        const noCylinderSlot = dev.type==='fob' && dev.index===6;
        const ZONE_BTNS=[
          {z:'OutOfRange',  label:'OUT',          c:'#2E3E55'},
          {z:'RfRange',     label:'RF RANGE',      c:'#4A9EF5'},
          {z:'Approach',    label:'APPROACH',      c:'#F59E0B'},
          // Physical-position labels — these zones are LF antenna
          // patterns mounted on the left and right sides of the
          // vehicle, independent of LHD/RHD cal.  PassiveEntry then
          // routes commands per `dealer.driver_door_side`.
          {z:'LeftFront',  label:'LEFT\nFRONT',  c:'#10D98A'},
          {z:'RightFront',label:'RIGHT\nFRONT', c:'#10D98A'},
          {z:'Cabin',       label:'CABIN',         c:'#10D98A'},
          {z:'Hood',        label:'HOOD',          c:'#10D98A'},
          {z:'Trunk',       label:'TRUNK\nOUTSIDE',c:'#A78BFA'},
          {z:'TrunkInside', label:'TRUNK\nINSIDE', c:'#EC4899'},
          // Cylinder / backup antenna — KeyCylinder line-cal uses
          // this as the only auth path; PEPS line-cal uses it as a
          // low-battery fallback (auth still works without fob RF).
          ...(noCylinderSlot ? [] : [{z:'KeyCylinder', label:'CYLINDER\n/ BACKUP', c:'#4A9EF5'}]),
        ];
        // Key removal lockout — only fobs parked at the KeyCylinder
        // slot are physically inserted.  They can be removed only
        // once the cylinder is rotated to LOCK (KeyCylinder vehicles
        // only).  Phones at the cylinder are NFC taps and never
        // stuck.  PEPS vehicles never reach this branch.
        const keyStuckHere = dev.type === 'fob'
                          && zone === 'KeyCylinder'
                          && isFobLockedInCylinder(s, cfg);
        // Single-slot cylinder occupancy.  Only relevant when the
        // selected device is a fob trying to *enter* the cylinder.
        const cylOccupant = fobOccupyingCylinder(s);
        const selectedFobIdx = dev.type==='fob' ? dev.index : 0;
        const cylBlockedByOther = dev.type==='fob'
                               && cylOccupant !== 0
                               && cylOccupant !== selectedFobIdx;
        return <>
          <div className="devpanel-section">
            PLACE IN ZONE
            {keyStuckHere && <span style={{
              marginLeft:6,fontFamily:'var(--fm)',fontSize:'7px',
              color:'#F59E0B',fontWeight:700,letterSpacing:0.5}}>
              🔒 KEY-IN LOCKOUT · rotate cylinder to LOCK to remove
            </span>}
            {cylBlockedByOther && !keyStuckHere && <span style={{
              marginLeft:6,fontFamily:'var(--fm)',fontSize:'7px',
              color:'#4A9EF5',fontWeight:700,letterSpacing:0.5}}>
              🔑 CYLINDER OCCUPIED BY F{cylOccupant}
            </span>}
          </div>
          <div className="zonepick">
            {ZONE_BTNS.map(({z,label,c})=>{
              const isActive=zone===z;
              const blockedByLockout = keyStuckHere && z !== 'KeyCylinder';
              const blockedByOccupant = z === 'KeyCylinder' && cylBlockedByOther;
              const blocked = blockedByLockout || blockedByOccupant;
              return <button key={z}
                className={`zpbtn${isActive?' zp-active':''}`}
                disabled={blocked}
                title={blockedByOccupant
                  ? `Cylinder occupied by Fob ${cylOccupant} — remove that key first`
                  : undefined}
                style={{borderColor:isActive?c:'',background:isActive?c:'',
                        color:isActive?'#0a0f18':'',
                        opacity:blocked?0.35:1,
                        cursor:blocked?'not-allowed':'pointer'}}
                onClick={()=>{ if(!blocked) set(`${dev.pfx}.Zone`,z); }}>
                {label}
              </button>;
            })}
          </div>
        </>;
      })()}

      {/* RSSI / RF payload */}
      {(rssi||rfMsg)&&<div>
        <div className="devpanel-section">SIGNAL</div>
        {rssi&&<div className="devpanel-rssi">{rssi.slice(0,60)}</div>}
        {rfMsg&&<div className="devpanel-rssi">{rfMsg.slice(0,60)}</div>}
      </div>}

      {/* Fob buttons */}
      {dev.type==='fob'&&<div>
        <div className="devpanel-section">RKE BUTTONS</div>
        <div className="devpanel-btns">
          {PEPS_BTN_OPTS.map(b=>(
            <button key={b.val}
              className={`devpanel-btn${firedBtn===b.val||btnPress===b.val?' fired':''}`}
              onClick={()=>pressBtn(b.val)}>
              {b.label}
            </button>
          ))}
        </div>
        <div style={{marginTop:6,fontFamily:'var(--fm)',fontSize:'7px',color:'var(--muted)'}}>
          press → auto-reset 600 ms
        </div>
      </div>}

      {/* Phone — no buttons, just zone state */}
      {dev.type==='phone'&&<div style={{fontFamily:'var(--fm)',fontSize:'8px',color:'var(--muted)',lineHeight:1.5}}>
        BLE phone device.<br/>Zone is set by drag in top view.
      </div>}

    </div>
  </div>;
}

function ControlPanelContent({s,set,cfg,anyDoor,anyLight,lux}){
  // VehicleStartingControl is the sole writer of Vehicle.LowVoltageSystemState
  // and Vehicle.Starting.ImmobilizerStatus.  The HMI displays these read-only
  // and writes the input signals the feature subscribes to:
  //   - Body.Switches.StartStop.IsPressed       (PEPS mode)
  //   - Body.Switches.IgnitionCylinder.Position (KeyCylinder mode)
  const keySource = cfg?.vehicle_line?.key_source_cfg || 'PEPS';
  const powerMode = s['Vehicle.LowVoltageSystemState'] || 'OFF';
  const immo      = s['Vehicle.Starting.ImmobilizerStatus'] || 'LOCKED';
  const cylPos    = s['Body.Switches.IgnitionCylinder.Position'] || 'LOCK';
  const startPressed = !!s['Body.Switches.StartStop.IsPressed'];
  const immoColor = {
    'AUTHENTICATED':'#10B981', 'AUTHENTICATING':'#F59E0B',
    'FAILED':'#EF4444',        'LOCKED':'#6B7E99',
  }[immo] || '#6B7E99';
  const powerColor = powerMode==='START' ? '#EF4444'
                   : powerMode==='ON'    ? '#10B981'
                   : powerMode==='ACC'   ? '#F59E0B'
                   : '#6B7E99';
  return <>

      <SG title="Vehicle Power" vss="Vehicle" def={true}>
        {/* Power Mode + Immobilizer are read-only — VehicleStartingControl
            owns them.  Driver inputs (start button or cylinder rotary)
            are below this row. */}
        <div style={{display:'flex',flexDirection:'column',gap:3}}>
          <span className="cn">Power Mode <span style={{color:'var(--muted)',fontSize:9}}>(read-only)</span></span>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <span style={{fontFamily:'var(--fm)',fontSize:11,fontWeight:700,
              padding:'4px 10px',borderRadius:4,
              background:'var(--s2)',border:`1px solid ${powerColor}`,color:powerColor}}>
              {powerMode}
            </span>
            <span style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--muted)'}}>Immobilizer:</span>
            <span style={{fontFamily:'var(--fm)',fontSize:10,fontWeight:700,color:immoColor}}>
              {immo}
            </span>
          </div>
        </div>

        {/* Key source — read-only display.  Changing requires a reboot
            with an edited vehicle_line.json. */}
        <div className="cr" style={{marginTop:4}}>
          <span className="cn">Key Source <span style={{color:'var(--muted)',fontSize:9}}>(line-cal)</span></span>
          <span style={{fontFamily:'var(--fm)',fontSize:10,fontWeight:700,
            padding:'2px 8px',borderRadius:3,background:'var(--s2)',
            border:'1px solid var(--bdr)',color:'#4A9EF5'}}>
            {keySource}
          </span>
        </div>

        {keySource==='PEPS' && (
          <div style={{display:'flex',flexDirection:'column',gap:3,marginTop:4}}>
            <span className="cn">Start / Stop Button <span style={{color:'var(--muted)',fontSize:9}}>(press & hold)</span></span>
            <button className={`eb ${startPressed?'on':''}`}
              onMouseDown={()=>set('Body.Switches.StartStop.IsPressed',true)}
              onMouseUp={()=>set('Body.Switches.StartStop.IsPressed',false)}
              onMouseLeave={()=>set('Body.Switches.StartStop.IsPressed',false)}
              style={{cursor:'pointer',userSelect:'none',touchAction:'none'}}>
              ⏻ ENGINE START / STOP
            </button>
          </div>
        )}

        {keySource==='KeyCylinder' && (
          <div style={{display:'flex',flexDirection:'column',gap:3,marginTop:4}}>
            <span className="cn">Cylinder Rotary <span style={{color:'var(--muted)',fontSize:9}}>(spring-loaded START)</span></span>
            <div className="ebrow">
              {['LOCK','OFF','ACC','ON','START'].map(p=>(
                <button key={p} className={`eb ${cylPos===p?'on':''}`}
                  onClick={()=>set('Body.Switches.IgnitionCylinder.Position',p)}>{p}</button>
              ))}
            </div>
          </div>
        )}

        <EnumR label="Powertrain" k="Vehicle.Powertrain.Type" s={s} set={set}
          opts={['COMBUSTION','HYBRID','ELECTRIC']}/>
        {/* Valet mode — published by infotainment in production.
            When ON, the trunk arbiter's ValetGate suppresses every
            Body.Trunk.OpenCmd (RKE, exterior button, future phone
            app).  Cabin doors and other features are unaffected. */}
        <div style={{display:'flex',flexDirection:'column',gap:3}}>
          <span className="cn">Valet Mode</span>
          <div className="ebrow">
            <button className={`eb ${!s['Cabin.ValetMode.IsActive']?'on':''}`}
              onClick={()=>set('Cabin.ValetMode.IsActive',false)}>OFF</button>
            <button className={`eb ${s['Cabin.ValetMode.IsActive']?'on':''}`}
              onClick={()=>set('Cabin.ValetMode.IsActive',true)}>ON</button>
          </div>
        </div>
      </SG>

      <SG title="Light Control" vss="Body.Lights" lit={anyLight}>
        <EnumR label="Mode" k="Body.Lights.LightSwitch" s={s} set={set}
          opts={['OFF','POSITION','DRL','AUTO','BEAM']}/>
        <div style={{marginTop:4,padding:'8px',background:'var(--s2)',borderRadius:'var(--r4)',border:'1px solid var(--bdr)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
            <span style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--white)'}}>Ambient Lux</span>
            <span style={{fontFamily:'var(--fm)',fontSize:'10px',color:'#F59E0B',fontWeight:700}}>
              {lux} &nbsp;
              <span style={{fontSize:'9px',color:lux<200?'#F59E0B':'#6B7E99'}}>
                {lux<50?'🌙 Night':lux<200?'🌆 Dusk':lux<500?'🌇 Twilight':lux<10000?'☁ Overcast':'☀ Daylight'}
              </span>
            </span>
          </div>
          <input type="range" className="slr" min={0} max={100000} step={500}
            value={lux} style={{marginTop:0,marginBottom:6}}
            onChange={e=>set('Body.Lights.AmbientLightSensor.Illuminance',parseInt(e.target.value))}/>
          <div className="ebrow">
            {[{l:'Night',v:5},{l:'Tunnel',v:50},{l:'Dusk',v:100},{l:'Twilight',v:300},{l:'Overcast',v:2000},{l:'Day',v:25000}].map(p=>(
              <button key={p.l} className={`eb ${lux===p.v?'on':''}`} onClick={()=>set('Body.Lights.AmbientLightSensor.Illuminance',p.v)}>{p.l}</button>
            ))}
          </div>
        </div>
        <div className="cr" style={{marginTop:4}}>
          <span className="cn">Front Fog</span>
          <Tog val={s['Body.Switches.Fog.Front.IsEngaged']} on={()=>set('Body.Switches.Fog.Front.IsEngaged',!s['Body.Switches.Fog.Front.IsEngaged'])} c="b"/>
        </div>
        <div className="cr">
          <span className="cn">Rear Fog</span>
          <Tog val={s['Body.Switches.Fog.Rear.IsEngaged']} on={()=>set('Body.Switches.Fog.Rear.IsEngaged',!s['Body.Switches.Fog.Rear.IsEngaged'])} c="r"/>
        </div>
        <div className="cr">
          <span className="cn">High Beam Stalk</span>
          <Tog val={s['Body.Switches.HighBeam.IsEngaged']} on={()=>set('Body.Switches.HighBeam.IsEngaged',!s['Body.Switches.HighBeam.IsEngaged'])} c="b"/>
        </div>
      </SG>

      <SG title="Turn / Hazard / Horn" vss="Body.Switches">
        <div className="cr">
          <span className="cn">Hazard</span>
          <Tog val={s['Body.Switches.Hazard.IsEngaged']} on={()=>set('Body.Switches.Hazard.IsEngaged',!s['Body.Switches.Hazard.IsEngaged'])} c="a"/>
        </div>
        <EnumR label="Turn Stalk" k="Body.Switches.TurnIndicator.Direction" s={s} set={set} opts={['OFF','LEFT','RIGHT']}/>
        {/* Steering-wheel horn pad — press-and-hold.  Goes through
            ManualHorn → horn_arbiter at Medium priority; PanicAlarm
            at High still wins if it's running.  Body.Horn.IsActive
            output drives the horn icon at the bottom of the dash. */}
        <div className="cr" style={{marginTop:2}}>
          <span className={`cn ${s['Body.Horn.IsActive']?'on':''}`}>Horn</span>
          <button className={`eb ${s['Body.Horn.IsActive']?'on':''}`}
            onMouseDown={()=>set('Body.Switches.Horn.IsPressed',true)}
            onMouseUp={()=>set('Body.Switches.Horn.IsPressed',false)}
            onMouseLeave={()=>set('Body.Switches.Horn.IsPressed',false)}
            style={{cursor:'pointer',userSelect:'none',touchAction:'none'}}>
            🔊 Press & hold
          </button>
        </div>
      </SG>

      <SG title="Braking & Transmission" vss="Chassis">
        <SlR label="Brake Pedal" k="Chassis.Brake.PedalPosition" s={s} set={set} min={0} max={100} step={1} unit="%"/>
        <div className="cr">
          <span className="cn">Parking Brake</span>
          <Tog val={s['Chassis.ParkingBrake.IsEngaged']} on={()=>set('Chassis.ParkingBrake.IsEngaged',!s['Chassis.ParkingBrake.IsEngaged'])} c="r"/>
        </div>
        {/* Driver writes SelectedGear (intent); TransmissionPlant
            mirrors it to CurrentGear (actual).  The label appends the
            actual gear so the simulator panel shows both at a glance. */}
        <EnumR label={`Gear  (actual: ${gearLabelGlobal(s['Powertrain.Transmission.CurrentGear']??126)})`}
          k="Powertrain.Transmission.SelectedGear" s={s} set={set}
          opts={[-1,0,1,2,3,4,5,6,126,127,128]}/>
      </SG>

      <SG title="ADAS" vss="Vehicle.ADAS">
        <div className="cr">
          <span className="cn" style={{flex:1}}>Oncoming Vehicle</span>
          <button className={`eb ${s['Vehicle.ADAS.HighBeam.OncomingVehicleDetected']?'on':''}`}
            style={s['Vehicle.ADAS.HighBeam.OncomingVehicleDetected']?{background:'#EF4444',borderColor:'#EF4444',color:'#fff'}:{}}
            onClick={()=>set('Vehicle.ADAS.HighBeam.OncomingVehicleDetected',!s['Vehicle.ADAS.HighBeam.OncomingVehicleDetected'])}>
            {s['Vehicle.ADAS.HighBeam.OncomingVehicleDetected']?'DETECTED':'Clear'}
          </button>
        </div>
      </SG>

      {/* Lock Status — read-only display of the door-lock arbiter's
          published outputs.  The per-source interactors that used to
          live here (Keyfob RKE, Trim buttons, Phone, BLE, NFC) all
          have dedicated panels elsewhere now (PEPS plant cards,
          fob-button row, etc.) — keeping them here would just be
          duplicate UI driving the same input signals.  What's
          *unique* to the arbiter is the published lock-state event
          stream, which features like AutoRelock and PerimeterAlarm
          gate on. */}
      <SG title="Lock Status" vss="Cabin.LockStatus">
        <div className="cr">
          <span className="cn">LockStatus</span>
          <CfgReadOnly val={s['Cabin.LockStatus']||'—'}/>
        </div>
        <div className="cr">
          <span className="cn">LastRequestor</span>
          <CfgReadOnly val={s['Cabin.LockStatus.LastRequestor']||'—'}/>
        </div>
        <div className="cr">
          <span className="cn">EventNum</span>
          <CfgReadOnly val={s['Cabin.LockStatus.EventNum']??'—'}/>
        </div>
      </SG>

      <SG title="Safety" vss="Vehicle.Safety">
        <div className="cr"><span className="cn">Crash Detected</span><Tog val={s['Vehicle.Safety.CrashDetected']} on={()=>set('Vehicle.Safety.CrashDetected',!s['Vehicle.Safety.CrashDetected'])} c="r"/></div>
      </SG>

      <SG title="PEPS Devices" vss="Body.PEPS.Plant">
        <div className="peps-section" style={{padding:'0 0 4px',fontFamily:'var(--fm)',fontSize:'9px',color:'var(--dim)'}}>KEY FOBS — button press + zone</div>
        {[1,2,3,4].map(i=>{
          const pfx=`Body.PEPS.Plant.KeyFob.${i}`;
          const zone=s[`${pfx}.Zone`]||'OutOfRange';
          const rssi=s[`${pfx}.RssiResponse`]||'';
          return <div key={i} className="peps-card">
            <div className="peps-title">FOB {i} <span className="peps-badge paired">PAIRED</span>
              <span style={{marginLeft:'auto',fontFamily:'var(--fm)',fontSize:'9px',color:'var(--dim)'}}>{zone}</span>
            </div>
            {rssi&&<div style={{fontFamily:'var(--fm)',fontSize:'8px',color:'var(--dim)',wordBreak:'break-all'}}>{rssi.slice(0,60)}</div>}
            {/* Zone select — quick placement without leaving the panel.
                KeyCylinder is the dash cylinder antenna; used as the
                only auth path on KeyCylinder builds and as a backup
                (low-battery fob) path on PEPS builds. */}
            {(()=>{
              const stuck = zone === 'KeyCylinder' && isFobLockedInCylinder(s, cfg);
              // Single-slot cylinder: hide the KeyCylinder option if
              // another fob is already inserted.  The current occupant
              // sees the option (so they can stay/leave); everyone
              // else does not.
              const cylOccupant = fobOccupyingCylinder(s);
              const cylBlocked = cylOccupant !== 0 && cylOccupant !== i;
              const allZones = ['OutOfRange','RfRange','Approach','LeftFront','RightFront','Cabin','Hood','Trunk','TrunkInside','KeyCylinder'];
              const opts = cylBlocked ? allZones.filter(z=>z!=='KeyCylinder') : allZones;
              return <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
                <span style={{fontFamily:'var(--fm)',fontSize:'8px',color:stuck?'#F59E0B':'var(--dim)'}}>{stuck?'ZONE 🔒':'ZONE'}</span>
                <select className="peps-btn" style={{flex:1,padding:'2px 4px',fontFamily:'var(--fm)',fontSize:'9px',
                          opacity:stuck?0.55:1, cursor:stuck?'not-allowed':'pointer'}}
                  value={zone}
                  disabled={stuck}
                  title={stuck?'Key locked in cylinder — rotate to LOCK to remove'
                         : cylBlocked?`Cylinder occupied by Fob ${cylOccupant}`
                         : undefined}
                  onChange={e=>set(`${pfx}.Zone`, e.target.value)}>
                  {opts.map(z=><option key={z} value={z}>{z}</option>)}
                </select>
              </div>;
            })()}
            <div className="peps-btnrow">
              {PEPS_BTN_OPTS.map(b=>(
                <button key={b.val} className="peps-btn" onClick={()=>set(`${pfx}.ButtonPress`,b.val)}>{b.label}</button>
              ))}
            </div>
          </div>;
        })}
        {[5,6].map(i=>{
          const pfx=`Body.PEPS.Plant.KeyFob.${i}`;
          const zone=s[`${pfx}.Zone`]||'OutOfRange';
          // Fob 5: mechanically-compatible key blank — fits the
          //   cylinder but fails the immobilizer challenge, so the
          //   cylinder rotates without authorising a state change.
          // Fob 6: physically incompatible (wrong key blank / no
          //   transponder) — can't be inserted, so the KeyCylinder
          //   zone is omitted from its dropdown entirely.
          const zoneOpts = i === 5
            ? ['OutOfRange','RfRange','Approach','LeftFront','RightFront','Cabin','Hood','Trunk','TrunkInside','KeyCylinder']
            : ['OutOfRange','RfRange','Approach','LeftFront','RightFront','Cabin','Hood','Trunk','TrunkInside'];
          const fobSubtitle = i === 5
            ? 'mechanically compatible · unauthorised'
            : 'incompatible key blank';
          return <div key={i} className="peps-card intruder">
            <div className="peps-title">FOB {i} <span className="peps-badge unpaired">INTRUDER</span>
              <span style={{marginLeft:'auto',fontFamily:'var(--fm)',fontSize:'9px',color:'var(--dim)'}}>{zone}</span>
            </div>
            <div style={{fontFamily:'var(--fm)',fontSize:'7px',color:'var(--muted)',marginTop:1}}>{fobSubtitle}</div>
            {(()=>{
              const stuck = zone === 'KeyCylinder' && isFobLockedInCylinder(s, cfg);
              const cylOccupant = fobOccupyingCylinder(s);
              const cylBlocked = cylOccupant !== 0 && cylOccupant !== i;
              const opts = cylBlocked ? zoneOpts.filter(z=>z!=='KeyCylinder') : zoneOpts;
              return <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
                <span style={{fontFamily:'var(--fm)',fontSize:'8px',color:stuck?'#F59E0B':'var(--dim)'}}>{stuck?'ZONE 🔒':'ZONE'}</span>
                <select className="peps-btn" style={{flex:1,padding:'2px 4px',fontFamily:'var(--fm)',fontSize:'9px',
                          opacity:stuck?0.55:1, cursor:stuck?'not-allowed':'pointer'}}
                  value={zone}
                  disabled={stuck}
                  title={stuck?'Key locked in cylinder — rotate to LOCK to remove'
                         : cylBlocked?`Cylinder occupied by Fob ${cylOccupant}`
                         : undefined}
                  onChange={e=>set(`${pfx}.Zone`, e.target.value)}>
                  {opts.map(z=><option key={z} value={z}>{z}</option>)}
                </select>
              </div>;
            })()}
          </div>;
        })}
      </SG>

      <SG title="Doors" vss="Body.Doors" def={true} lit={anyDoor}>
        <div className="dcgrid">
          <DoorCard label="ROW1 · LEFT"  pfx="Body.Doors.Row1.Left"  s={s} set={set}/>
          <DoorCard label="ROW1 · RIGHT" pfx="Body.Doors.Row1.Right" s={s} set={set}/>
          <DoorCard label="ROW2 · LEFT"  pfx="Body.Doors.Row2.Left"  s={s} set={set}/>
          <DoorCard label="ROW2 · RIGHT" pfx="Body.Doors.Row2.Right" s={s} set={set}/>
        </div>
      </SG>

      <SG title="Body" vss="Body">
        {/* Hood — dash-mounted release lever.  Two pulls within 3 s
            while LATCHED → HALF_LATCHED.  Status pill shows the
            current LatchState; a press-here-to-open prompt appears
            on the hood rectangle in the top view once half-latched. */}
        <HoodReleaseRow s={s} set={set}/>
        {/* Cabin trunk release — push-button / pull-handle inside the
            cabin (low on the dash or in driver footwell).  Routes
            through the trunk arbiter so the valet gate applies.
            No lock-state or auth check — the user is already in the
            cabin.  Result is visible in the top view via Body.Trunk.IsOpen. */}
        <CabinTrunkReleaseRow s={s} set={set}/>
        <BR label="Fuel lid open"    k="Body.FuelLid.IsOpen"    s={s} set={set} c="a"/>
        <BR label="Charge lid open"  k="Body.ChargeLid.IsOpen"  s={s} set={set} c="t"/>
      </SG>

      <SG title="Wipers & Washers" vss="Body.Windshield">
        <EnumR label="Front mode" k="Body.Windshield.Front.Wiping.Mode" s={s} set={set} opts={['OFF','SLOW','MEDIUM','FAST','INTERVAL']}/>
        <SlR label="Front intensity" k="Body.Windshield.Front.Wiping.Intensity" s={s} set={set} min={0} max={5} step={1} unit="/5"/>
        <BR label="Front washer" k="Body.Windshield.Front.Washing.IsActive" s={s} set={set} c="b"/>
        <div className="hdiv2"/>
        <EnumR label="Rear mode" k="Body.Windshield.Rear.Wiping.Mode" s={s} set={set} opts={['OFF','SLOW','MEDIUM','FAST']}/>
        <BR label="Rear washer" k="Body.Windshield.Rear.Washing.IsActive" s={s} set={set} c="b"/>
      </SG>

      <SG title="Mirror" vss="Body.Mirror">
        {/* Fold momentary press — drives Body.Switches.Mirror.Fold.
            The MirrorFold feature treats each false→true edge as a
            press and toggles `intended_fold_state` (= !last_fold_cmd).
            Per-side IsFolded readouts below are read-only feedback
            from the MirrorFoldPlantModel (plant owns those signals
            now; HMI cannot write them directly). */}
        <div className="dcr" style={{marginBottom:6}}>
          <span className="dcl">Fold switch</span>
          <button onMouseDown={()=>{set('Body.Switches.Mirror.Fold',true);setTimeout(()=>set('Body.Switches.Mirror.Fold',false),60);}}
                  style={{padding:'4px 14px',borderRadius:4,border:'1px solid var(--bdr2)',background:'var(--s3)',color:'var(--white)',fontFamily:'var(--fm)',fontSize:9,fontWeight:700,cursor:'pointer'}}>
            ↻ FOLD / UNFOLD
          </button>
        </div>
        <div style={{display:'flex',gap:6}}>
          {[['Left','Body.Mirror.Left'],['Right','Body.Mirror.Right']].map(([side,pfx])=>(
            <div key={side} style={{flex:1,background:'var(--s2)',borderRadius:'var(--r6)',padding:'6px 8px',border:'1px solid var(--bdr)',display:'flex',flexDirection:'column',gap:3}}>
              <div className="dctitle">{side.toUpperCase()}</div>
              <div className="dcr">
                <span className="dcl">Fold status</span>
                <span style={{fontFamily:'var(--fm)',fontSize:9,fontWeight:700,color:s[`${pfx}.IsFolded`]?'var(--amber)':'var(--dim)'}}>
                  {s[`${pfx}.IsFolded`]?'◀▶ FOLDED':'OUT'}
                </span>
              </div>
              <div className="dcr"><span className="dcl">Heat</span><Tog val={s[`${pfx}.IsHeatingOn`]} on={()=>set(`${pfx}.IsHeatingOn`,!s[`${pfx}.IsHeatingOn`])} c="r"/></div>
              {/* Tilt / Yaw are now plant-owned — read-only display.
                  Adjust them via the Side selector + DPad below. */}
              <div className="dcr"><span className="dcl">Tilt</span>
                <span style={{fontFamily:'var(--fm)',fontSize:9,fontWeight:700,color:'var(--dim)'}}>
                  {(s[`${pfx}.Tilt`]??0)}%
                </span>
              </div>
              <div className="dcr"><span className="dcl">Yaw</span>
                <span style={{fontFamily:'var(--fm)',fontSize:9,fontWeight:700,color:'var(--dim)'}}>
                  {(s[`${pfx}.Yaw`]??0)}%
                </span>
              </div>
            </div>
          ))}
        </div>
        {/* Adjust controls — Side selector picks which mirror responds,
            then the DPad drives Body.Switches.Mirror.Direction while
            held.  Plant model integrates at 50%/sec to ±100. */}
        <MirrorAdjustControls s={s} set={set}/>
      </SG>

      <SG title="Sunroof" vss="Body.Sunroof">
        {/* Press-and-hold OPEN / CLOSE buttons drive the sunroof
            motor model (5 s full travel).  Mouseup → STOP, freezing
            the position wherever it is.  SunroofPlantModel owns and
            NVM-persists Position + Shade.Position. */}
        <SunroofMotorRow label="Roof position"  cmd="Body.Sunroof.MoveCmd"
          posKey="Body.Sunroof.Position" s={s} set={set}/>
        <SunroofMotorRow label="Shade position" cmd="Body.Sunroof.Shade.MoveCmd"
          posKey="Body.Sunroof.Shade.Position" s={s} set={set}/>
      </SG>

      <SG title="Cabin Lighting" vss="Cabin.Lights">
        <BR label="Dome light"     k="Cabin.Lights.IsDomeOn"         s={s} set={set} c="a"/>
        <BR label="Glovebox light" k="Cabin.Lights.IsGloveBoxOn"     s={s} set={set} c="a"/>
        <SlR label="Ambient intensity" k="Cabin.Lights.Ambient.Intensity" s={s} set={set} min={0} max={100} step={5} unit="%"/>
        <div className="cr">
          <span className="cn">Ambient color</span>
          <input type="color" value={s['Cabin.Lights.Ambient.Color']||'#3B82F6'}
            onChange={e=>set('Cabin.Lights.Ambient.Color',e.target.value)}
            style={{width:32,height:20,border:'1px solid var(--bdr2)',borderRadius:3,background:'transparent',cursor:'pointer',padding:1}}/>
        </div>
      </SG>

      <SG title="HVAC" vss="Cabin.HVAC">
        <BR label="A/C active"       k="Cabin.HVAC.IsAirConditioningActive" s={s} set={set} c="b"/>
        <BR label="Recirculation"    k="Cabin.HVAC.IsRecirculationActive"   s={s} set={set} c="t"/>
        <BR label="Front defroster"  k="Cabin.HVAC.IsFrontDefrosterActive"  s={s} set={set} c="b"/>
        <BR label="Rear defroster"   k="Cabin.HVAC.IsRearDefrosterActive"   s={s} set={set} c="b"/>
        <div className="hdiv2"/>
        <SlR label="Driver temp"   k="Cabin.HVAC.Station.Row1.Left.Temperature"  s={s} set={set} min={16} max={30} step={0.5} unit="°C"/>
        <SlR label="Driver fan"    k="Cabin.HVAC.Station.Row1.Left.FanSpeed"     s={s} set={set} min={0} max={7} step={1} unit="/7"/>
        <EnumR label="Driver vent" k="Cabin.HVAC.Station.Row1.Left.AirDistribution" s={s} set={set} opts={['AUTO','FACE','FACE_FEET','FEET','FEET_DEF','DEF']}/>
        <div className="hdiv2"/>
        <SlR label="Pass temp"    k="Cabin.HVAC.Station.Row1.Right.Temperature"  s={s} set={set} min={16} max={30} step={0.5} unit="°C"/>
        <SlR label="Pass fan"     k="Cabin.HVAC.Station.Row1.Right.FanSpeed"     s={s} set={set} min={0} max={7} step={1} unit="/7"/>
        <EnumR label="Pass vent"  k="Cabin.HVAC.Station.Row1.Right.AirDistribution" s={s} set={set} opts={['AUTO','FACE','FACE_FEET','FEET','FEET_DEF','DEF']}/>
      </SG>

      <SG title="Seats" vss="Cabin.Seat">
        {[['Driver','Cabin.Seat.Row1.Left'],['Passenger','Cabin.Seat.Row1.Right']].map(([label,pfx])=>(
          <div key={pfx} style={{background:'var(--s2)',borderRadius:'var(--r6)',padding:'8px 10px',border:'1px solid var(--bdr)',display:'flex',flexDirection:'column',gap:4,marginBottom:4}}>
            <div className="dctitle">{label.toUpperCase()}</div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span className="dcl" style={{flex:1}}>Heating</span>
              <button style={{background:s[`${pfx}.HeatingLevel`]>0?'#8B2E2E':'#1A2838',border:'1px solid #3A4D5C',borderRadius:4,color:s[`${pfx}.HeatingLevel`]>0?'#FF6B35':'#666',cursor:'pointer',padding:'4px 12px',fontSize:'11px',fontWeight:'600',fontFamily:'Orbitron'}}
                onClick={()=>set(`${pfx}.HeatingLevel`,[3,0,1,2][s[`${pfx}.HeatingLevel`]||0])}>
                {s[`${pfx}.HeatingLevel`]||0}
              </button>
            </div>
            <div className="dcr"><span className="dcl">Ventilation</span><Tog val={s[`${pfx}.IsVentilationOn`]} on={()=>set(`${pfx}.IsVentilationOn`,!s[`${pfx}.IsVentilationOn`])} c="b"/></div>
          </div>
        ))}
      </SG>

  </>;
}

function ControlPanel({s,set,cfg,inline=false}){
  const anyDoor=['Row1.Left','Row1.Right','Row2.Left','Row2.Right'].some(d=>s[`Body.Doors.${d}.IsOpen`]);
  const anyLight=Object.keys(s).some(k=>k.startsWith('Body.Lights')&&s[k]===true);
  const lux=s['Body.Lights.AmbientLightSensor.Illuminance']??10000;
  if(inline) return <div style={{flex:1,overflowY:'auto',padding:'16px 20px',scrollbarWidth:'thin',scrollbarColor:'var(--bdr2) transparent'}}>
    <ControlPanelContent s={s} set={set} cfg={cfg} anyDoor={anyDoor} anyLight={anyLight} lux={lux}/>
  </div>;
  return <div className="cp">
    <div className="cphdr">
      <div style={{width:7,height:7,borderRadius:2,background:'var(--amber)',opacity:.5}}/>
      <span className="cptitle">VSS SIGNAL CONTROL</span>
    </div>
    <div className="cpscroll">
      <ControlPanelContent s={s} set={set} cfg={cfg} anyDoor={anyDoor} anyLight={anyLight} lux={lux}/>
    </div>
  </div>;
}

/* ══════ CONFIG VIEW ══════ */

const INIT_CONFIG={
  dealer:{
    auto_relock_enabled:true, horn_chirp_on_lock:true,
    courtesy_light_timeout_secs:30, remote_start_max_minutes:10,
    two_stage_unlock:true, driver_door_side:'Left', mirror_fold_mode:'MANUAL',
    farewell_hold_secs:20,
  },
  variant:{
    auto_lock_speed_kmh:20, double_lock_enabled:false,
    nfc_enabled:true, ble_key_enabled:true, remote_lock_enabled:true,
    welcome_light_pattern:'Simple',
    doors_row2_left:true, doors_row2_right:true, doors_removable:false,
  },
  vehicle_line:{

// Helper renders one editable config row
function CfgRow({label, hint, children, dirty}){
  return <div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid var(--bdr)'}}>
    <div style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:6}}>
      {/* Dirty indicator — staged-but-not-yet-applied edit. */}
      {dirty && <span style={{
        width:6,height:6,borderRadius:'50%',background:'var(--amber)',
        boxShadow:'0 0 4px rgba(245,158,11,.6)',flexShrink:0
      }} title="Edit pending — Apply & Reboot to persist"/>}
      <div style={{minWidth:0}}>
        <div style={{fontFamily:'var(--fm)',fontSize:'9px',color:'var(--white)',fontWeight:600}}>{label}</div>
        {hint&&<div style={{fontFamily:'var(--fm)',fontSize:'7px',color:'var(--muted)',marginTop:1}}>{hint}</div>}
      </div>
    </div>
    <div style={{flexShrink:0}}>{children}</div>
  </div>;
}

function CfgNum({val, onChange, min=0, max=9999, step=1}){
  return <input type="number" value={val} min={min} max={max} step={step}
    onChange={e=>onChange(Number(e.target.value))}
    style={{width:72,padding:'3px 6px',background:'var(--s3)',border:'1px solid var(--bdr2)',
            borderRadius:3,color:'var(--white)',fontFamily:'var(--fm)',fontSize:'10px',textAlign:'right'}}/>;
}

/* CfgReadOnly — typed display badge for vehicle-line / variant
   parameters that are flashed-and-reboot, not runtime-mutable.  The
   bridge has no `config_set` handler for these tiers; an editable
   control would silently optimistic-update the HMI without ever
   reaching the ECU.  Read-only badge makes the contract clear. */
function CfgReadOnly({val, unit=''}){
  const isBool = typeof val === 'boolean';
  const display = isBool ? (val?'ON':'OFF') : `${val}${unit}`;
  const color = isBool
    ? (val?'var(--amber)':'var(--dim)')
    : 'var(--white)';
  return <span style={{
    fontFamily:'var(--fm)',fontSize:10,fontWeight:700,color,
    padding:'2px 8px',
    border:`1px solid ${color}`,borderRadius:9,
    minWidth:42,textAlign:'center',display:'inline-block'
  }}>{display}</span>;
}
function CfgBool({val, onChange}){
  return <button onClick={()=>onChange(!val)}
    style={{padding:'3px 10px',borderRadius:3,fontFamily:'var(--fm)',fontSize:'9px',fontWeight:700,
            cursor:'pointer',border:'1px solid',transition:'all .13s',
            background:val?'rgba(16,217,138,.15)':'var(--s3)',
            borderColor:val?'rgba(16,217,138,.5)':'var(--bdr2)',
            color:val?'var(--teal)':'var(--dim)'}}>
    {val?'ON':'OFF'}
  </button>;
}

function CfgSelect({val, opts, onChange}){
  return <select value={val} onChange={e=>onChange(e.target.value)}
    style={{padding:'3px 6px',background:'var(--s3)',border:'1px solid var(--bdr2)',borderRadius:3,
            color:'var(--white)',fontFamily:'var(--fm)',fontSize:'9px',cursor:'pointer'}}>
    {opts.map(o=><option key={o} value={o}>{o}</option>)}
  </select>;
}

function CfgSection({title, badge, children}){
  return <div style={{marginBottom:16}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
      <span style={{fontFamily:'var(--fm)',fontSize:'8px',fontWeight:700,letterSpacing:'.12em',color:'var(--muted)'}}>{title}</span>
      {badge&&<span style={{fontFamily:'var(--fm)',fontSize:'7px',padding:'1px 6px',borderRadius:10,
        background:'rgba(74,158,245,.12)',border:'1px solid rgba(74,158,245,.25)',color:'#4A9EF5'}}>{badge}</span>}
      <div style={{flex:1,height:1,background:'var(--bdr)'}}/>
    </div>
    {children}
  </div>;
}
