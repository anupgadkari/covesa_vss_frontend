/* ══════ CONTROL PANEL ══════ */
const PEPS_BTN_OPTS=[
  {val:'LOCK',label:'LOCK'},{val:'UNLOCK',label:'UNLOCK'},
  {val:'TRUNK_RELEASE',label:'TRUNK'},{val:'REMOTE_START',label:'START'},{val:'PANIC_ALARM',label:'PANIC'},
];

/* ── Zone proximity bar ────────────────────────────────────────── */
const ZONE_PROX=[
  {key:'OutOfRange', label:'OUT',      c:'#1E2C3C'},
  {key:'RfRange',    label:'RF',       c:'#4A9EF5'},
  {key:'Approach',   label:'APPR',     c:'#F59E0B'},
  {key:'Interior',   label:'INT',      c:'#10D98A'},
];
const INTERIOR_ZONES=new Set(['Hood','Trunk','TrunkInside','DriverDoor','PassengerDoor','Cabin']);

/* ── Dedicated Auth Device Panel ──────────────────────────────── */
function DevicePanel({s, set, sel, setSel}){
  const [firedBtn, setFiredBtn]=useState(null);

  // Device selector list: fobs 1-4 (paired) + phones 1-2
  const devices=[
    ...[1,2,3,4].map(i=>({type:'fob',  index:i, label:`F${i}`, color:'#F59E0B', pfx:`Body.PEPS.Plant.KeyFob.${i}`})),
    ...[1,2]    .map(i=>({type:'phone',index:i, label:`P${i}`, color:'#4A9EF5', pfx:`Body.PEPS.Plant.BlePhone.${i}`})),
  ];

  const dev=devices.find(d=>d.type===sel.type&&d.index===sel.index)||devices[0];
  const zone=s[`${dev.pfx}.Zone`]||'OutOfRange';
  const rssi=s[`${dev.pfx}.RssiResponse`]||'';
  const rfMsg=dev.type==='fob'?(s[`${dev.pfx}.RfMessage`]||''):'';
  const btnPress=dev.type==='fob'?(s[`${dev.pfx}.ButtonPress`]||'NONE'):null;

  // Zone colour
  const zoneColor=INTERIOR_ZONES.has(zone)?'#10D98A':
    zone==='Approach'?'#F59E0B':zone==='RfRange'?'#4A9EF5':'#2A3A50';

  // Proximity bar active segment
  const proxActive=INTERIOR_ZONES.has(zone)?'Interior':zone;

  function pressBtn(val){
    setFiredBtn(val);
    set(`${dev.pfx}.ButtonPress`, val);
    setTimeout(()=>{set(`${dev.pfx}.ButtonPress`,'NONE');setFiredBtn(null);}, 600);
  }

  return <div className="devpanel">
    <div className="devpanel-hdr">
      <div style={{width:6,height:6,borderRadius:2,background:'var(--teal)',opacity:.6}}/>
      <span className="devpanel-title">AUTH DEVICE</span>
    </div>
    <div className="devpanel-inner">

      {/* Device chips — tap to select */}
      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
        {devices.map(d=>{
          const dZone=s[`${d.pfx}.Zone`]||'OutOfRange';
          const inRange=dZone!=='OutOfRange';
          const isSel=d.type===sel.type&&d.index===sel.index;
          return <div key={d.type+d.index}
            className={`devchip${isSel?' active':''}${inRange?' inrange':''}`}
            style={{color:isSel||inRange?d.color:'',
                    borderColor:isSel?d.color:inRange?`${d.color}60`:'',
                    background:isSel?`${d.color}18`:''}}
            onClick={()=>setSel({type:d.type,index:d.index})}>
            {d.label}
          </div>;
        })}
      </div>

      {/* Zone display */}
      <div className="devpanel-zone">
        <div className="devpanel-section">ZONE</div>
        <div className="devpanel-zoneval" style={{color:zoneColor}}>{zone}</div>
        {/* Proximity bar */}
        <div className="devpanel-prox">
          {ZONE_PROX.map(seg=>{
            const isActive=seg.key===proxActive;
            return <div key={seg.key} className="devpanel-proxseg"
              style={{background:isActive?seg.c:'var(--bdr)',
                      flex:seg.key==='Interior'?1.5:1,
                      opacity:isActive?1:.4,
                      boxShadow:isActive?`0 0 6px ${seg.c}`:''}}
              title={seg.label}/>;
          })}
        </div>
        <div style={{display:'flex',gap:2,marginTop:1}}>
          {ZONE_PROX.map(seg=><span key={seg.key}
            style={{flex:seg.key==='Interior'?1.5:1,fontFamily:'var(--fm)',fontSize:'6px',
                    color:seg.key===proxActive?seg.c:'var(--muted)',textAlign:'center'}}>
            {seg.label}</span>)}
        </div>
      </div>

      {/* Zone quick-assign */}
      {(()=>{
        const ZONE_BTNS=[
          {z:'OutOfRange',  label:'OUT',          c:'#2E3E55'},
          {z:'RfRange',     label:'RF RANGE',      c:'#4A9EF5'},
          {z:'Approach',    label:'APPROACH',      c:'#F59E0B'},
          {z:'DriverDoor',  label:'DRIVER\nDOOR',  c:'#10D98A'},
          {z:'PassengerDoor',label:'PASS\nDOOR',   c:'#10D98A'},
          {z:'Cabin',       label:'CABIN',         c:'#10D98A'},
          {z:'Hood',        label:'HOOD',          c:'#10D98A'},
          {z:'Trunk',       label:'TRUNK\nOUTSIDE',c:'#A78BFA'},
          {z:'TrunkInside', label:'TRUNK\nINSIDE', c:'#EC4899'},
        ];
        return <>
          <div className="devpanel-section">PLACE IN ZONE</div>
          <div className="zonepick">
            {ZONE_BTNS.map(({z,label,c})=>{
              const isActive=zone===z;
              return <button key={z}
                className={`zpbtn${isActive?' zp-active':''}`}
                style={{borderColor:isActive?c:'',background:isActive?c:'',color:isActive?'#0a0f18':''}}
                onClick={()=>set(`${dev.pfx}.Zone`,z)}>
                {label}
              </button>;
            })}
          </div>
        </>;
      })()}

      {/* RSSI / RF payload */}
      {(rssi||rfMsg)&&<div>
        <div className="devpanel-section">SIGNAL</div>
        {rssi&&<div className="devpanel-rssi">{rssi.slice(0,60)}</div>}
        {rfMsg&&<div className="devpanel-rssi">{rfMsg.slice(0,60)}</div>}
      </div>}

      {/* Fob buttons */}
      {dev.type==='fob'&&<div>
        <div className="devpanel-section">RKE BUTTONS</div>
        <div className="devpanel-btns">
          {PEPS_BTN_OPTS.map(b=>(
            <button key={b.val}
              className={`devpanel-btn${firedBtn===b.val||btnPress===b.val?' fired':''}`}
              onClick={()=>pressBtn(b.val)}>
              {b.label}
            </button>
          ))}
        </div>
        <div style={{marginTop:6,fontFamily:'var(--fm)',fontSize:'7px',color:'var(--muted)'}}>
          press → auto-reset 600 ms
        </div>
      </div>}

      {/* Phone — no buttons, just zone state */}
      {dev.type==='phone'&&<div style={{fontFamily:'var(--fm)',fontSize:'8px',color:'var(--muted)',lineHeight:1.5}}>
        BLE phone device.<br/>Zone is set by drag in top view.
      </div>}

    </div>
  </div>;
}

      <SG title="Body" vss="Body">

        <BR label="Trunk locked"     k="Body.Trunk.IsLocked"    s={s} set={set} c="r"/>
        <BR label="Fuel lid open"    k="Body.FuelLid.IsOpen"    s={s} set={set} c="a"/>

        <div className="hdiv2"/>
        <EnumR label="Rear mode" k="Body.Windshield.Rear.Wiping.Mode" s={s} set={set} opts={['OFF','SLOW','MEDIUM','FAST']}/>

      </SG>

      <SG title="Mirror" vss="Body.Mirror">
        {/* Fold momentary press — drives Body.Switches.Mirror.Fold.
            The MirrorFold feature treats each false→true edge as a
            press and toggles `intended_fold_state` (= !last_fold_cmd).
            Per-side IsFolded readouts below are read-only feedback
            from the MirrorFoldPlantModel (plant owns those signals
            now; HMI cannot write them directly). */}
        <div className="dcr" style={{marginBottom:6}}>
          <span className="dcl">Fold switch</span>
          <button onMouseDown={()=>{set('Body.Switches.Mirror.Fold',true);setTimeout(()=>set('Body.Switches.Mirror.Fold',false),60);}}

            ↻ FOLD / UNFOLD

        <div style={{display:'flex',gap:6}}>

                <span className="dcl">Fold status</span>

              </div>
              <div className="dcr"><span className="dcl">Heat</span><Tog val={s[`${pfx}.IsHeatingOn`]} on={()=>set(`${pfx}.IsHeatingOn`,!s[`${pfx}.IsHeatingOn`])} c="r"/></div>

                <span style={{fontFamily:'var(--fm)',fontSize:9,fontWeight:700,color:'var(--dim)'}}>
                  {(s[`${pfx}.Yaw`]??0)}%

            </div>

        </div>

      </SG>

      <SG title="Sunroof" vss="Body.Sunroof">

      <SG title="Cabin Lighting" vss="Cabin.Lights">

        <div className="hdiv2"/>
        <SlR label="Pass temp"    k="Cabin.HVAC.Station.Row1.Right.Temperature"  s={s} set={set} min={16} max={30} step={0.5} unit="°C"/>
        <SlR label="Pass fan"     k="Cabin.HVAC.Station.Row1.Right.FanSpeed"     s={s} set={set} min={0} max={7} step={1} unit="/7"/>
        <EnumR label="Pass vent"  k="Cabin.HVAC.Station.Row1.Right.AirDistribution" s={s} set={set} opts={['DASHBOARD','FLOOR','DEFROST','COMBINED']}/>
      </SG>

      <SG title="Seats" vss="Cabin.Seat">
        {[['Driver','Cabin.Seat.Row1.Left'],['Passenger','Cabin.Seat.Row1.Right']].map(([label,pfx])=>(
          <div key={pfx} style={{background:'var(--s2)',borderRadius:'var(--r6)',padding:'8px 10px',border:'1px solid var(--bdr)',display:'flex',flexDirection:'column',gap:4,marginBottom:4}}>

              <span className="dcl" style={{flex:1}}>Heating</span>
              <button style={{background:s[`${pfx}.HeatingLevel`]>0?'#8B2E2E':'#1A2838',border:'1px solid #3A4D5C',borderRadius:4,color:s[`${pfx}.HeatingLevel`]>0?'#FF6B35':'#666',cursor:'pointer',padding:'4px 12px',fontSize:'11px',fontWeight:'600',fontFamily:'Orbitron'}}
                onClick={()=>set(`${pfx}.HeatingLevel`,[3,0,1,2][s[`${pfx}.HeatingLevel`]||0])}>
                {s[`${pfx}.HeatingLevel`]||0}
              </button>
            </div>
            <div className="dcr"><span className="dcl">Ventilation</span><Tog val={s[`${pfx}.IsVentilationOn`]} on={()=>set(`${pfx}.IsVentilationOn`,!s[`${pfx}.IsVentilationOn`])} c="b"/></div>
          </div>
        ))}
      </SG>

  </>;
}

function ControlPanel({s,set,inline=false}){
  const anyDoor=['Row1.Left','Row1.Right','Row2.Left','Row2.Right'].some(d=>s[`Body.Doors.${d}.IsOpen`]);
  const anyLight=Object.keys(s).some(k=>k.startsWith('Body.Lights')&&s[k]===true);
  const lux=s['Body.Lights.AmbientLightSensor.Illuminance']??10000;
  if(inline) return <div style={{flex:1,overflowY:'auto',padding:'16px 20px',scrollbarWidth:'thin',scrollbarColor:'var(--bdr2) transparent'}}>
    <ControlPanelContent s={s} set={set} anyDoor={anyDoor} anyLight={anyLight} lux={lux}/>
  </div>;
  return <div className="cp">
    <div className="cphdr">
      <div style={{width:7,height:7,borderRadius:2,background:'var(--amber)',opacity:.5}}/>
      <span className="cptitle">VSS SIGNAL CONTROL</span>
    </div>
    <div className="cpscroll">
      <ControlPanelContent s={s} set={set} anyDoor={anyDoor} anyLight={anyLight} lux={lux}/>
    </div>
  </div>;
}

// Helper renders one editable config row
function CfgRow({label, hint, children}){
  return <div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid var(--bdr)'}}>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontFamily:'var(--fm)',fontSize:'9px',color:'var(--white)',fontWeight:600}}>{label}</div>
      {hint&&<div style={{fontFamily:'var(--fm)',fontSize:'7px',color:'var(--muted)',marginTop:1}}>{hint}</div>}
    </div>
    <div style={{flexShrink:0}}>{children}</div>
  </div>;
}

function CfgNum({val, onChange, min=0, max=9999, step=1}){
  return <input type="number" value={val} min={min} max={max} step={step}
    onChange={e=>onChange(Number(e.target.value))}
    style={{width:72,padding:'3px 6px',background:'var(--s3)',border:'1px solid var(--bdr2)',
            borderRadius:3,color:'var(--white)',fontFamily:'var(--fm)',fontSize:'10px',textAlign:'right'}}/>;
}

function CfgBool({val, onChange}){
  return <button onClick={()=>onChange(!val)}
    style={{padding:'3px 10px',borderRadius:3,fontFamily:'var(--fm)',fontSize:'9px',fontWeight:700,
            cursor:'pointer',border:'1px solid',transition:'all .13s',
            background:val?'rgba(16,217,138,.15)':'var(--s3)',
            borderColor:val?'rgba(16,217,138,.5)':'var(--bdr2)',
            color:val?'var(--teal)':'var(--dim)'}}>
    {val?'ON':'OFF'}
  </button>;
}

function CfgSelect({val, opts, onChange}){
  return <select value={val} onChange={e=>onChange(e.target.value)}
    style={{padding:'3px 6px',background:'var(--s3)',border:'1px solid var(--bdr2)',borderRadius:3,
            color:'var(--white)',fontFamily:'var(--fm)',fontSize:'9px',cursor:'pointer'}}>
    {opts.map(o=><option key={o} value={o}>{o}</option>)}
  </select>;
}

function CfgSection({title, badge, children}){

function App(){
  const [s,setS]=useState(INIT_STATE);
  const [cfg,setCfg]=useState(INIT_CONFIG);
  const [view,setView]=useState('top');
  const [time,setTime]=useState(new Date());
  const [wsConnected,setWsConnected]=useState(false);
  // wsHydrated — flips TRUE the first time the bridge's WS snapshot
  // arrives.  Visuals that depend on bridge-owned signals (door locks,
  // trunk, horn, alarm-active flag, AutoRelock status, …) gate on this
  // and render a dimmed "loading" placeholder until the snapshot lands.
  // Reset to FALSE on every reconnect (ws.onclose) so the gating kicks
  // back in during bridge restarts.  See
  // docs/signal-ownership-and-state-hydration.md §4.
  const [wsHydrated,setWsHydrated]=useState(false);
  const [selDev,setSelDev]=useState({type:'fob',index:1}); // selected auth device
  // AutoRelock countdown — captures wall-clock at the moment IsArmed went TRUE.
  // The banner derives remaining seconds = timeoutSecs - (now - armedAt) and
  // ticks once a second while armed.
  const [relockArmedAt,setRelockArmedAt]=useState(null);
  const [tickNow,setTickNow]=useState(Date.now());
  const wsRef=useRef(null);
  const reconnRef=useRef(null);
  const attemptsRef=useRef(0);

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);

  // Capture / clear the AutoRelock arm timestamp on transitions of IsArmed.
  // Re-arming during a running countdown (re-press of UNLOCK) restarts the
  // visible timer because the bus republishes IsArmed=TRUE at the top of
  // each new timer phase.
  const relockArmed = !!s['Body.Doors.AutoRelock.IsArmed'];
  useEffect(()=>{
    if(relockArmed){
      setRelockArmedAt(Date.now());
    } else {
      setRelockArmedAt(null);
    }
  },[relockArmed]);

  // Seconds-tick driver — only runs while the banner is visible to keep
  // the rest of the app at a slow heartbeat.
  useEffect(()=>{
    if(!relockArmed) return;
    const t=setInterval(()=>setTickNow(Date.now()),250);
    return()=>clearInterval(t);
  },[relockArmed]);

  useEffect(()=>{
    function connect(){
      try{
        const ws=new WebSocket(`ws://${window.location.hostname||'localhost'}:8080`);
        ws.onopen=()=>{setWsConnected(true);attemptsRef.current=0;
          // Reset HMI-owned defaults (e.g. fob-zone OUT, switches off);
          // bridge-owned signals come in the snapshot below.  wsHydrated
          // stays FALSE until that snapshot arrives.
          setS(INIT_STATE);
          setWsHydrated(false);
        };
        ws.onmessage=(e)=>{
          try{
            const msg=JSON.parse(e.data);
            if(msg.config){
              setCfg(prev=>({
                dealer:    {...prev.dealer,   ...(msg.config.dealer||{})},
                variant:   {...prev.variant,  ...(msg.config.variant||{})},
                vehicle_line:{...prev.vehicle_line,...(msg.config.vehicle_line||{})},
              }));
            } else if(msg.state) {
              setS(prev=>({...prev,...msg.state}));
              // The first state snapshot from the bridge marks hydration
              // complete — every owned signal now has its authoritative
              // value and visuals can drop the dimmed placeholder.
              setWsHydrated(true);
            }
            else if(msg.path!==undefined) setS(prev=>({...prev,[msg.path]:msg.value}));
          }catch(err){}
        };
        ws.onerror=()=>{};
        ws.onclose=()=>{
          setWsConnected(false);
          // Disconnect → the values we hold may now be stale.  Force
          // re-hydration via the dim placeholder until reconnect lands
          // a fresh snapshot.
          setWsHydrated(false);
          const delay=Math.min(1000*2**Math.min(attemptsRef.current,5),30000);
          attemptsRef.current++;
          reconnRef.current=setTimeout(connect,delay);
        };
        wsRef.current=ws;
      }catch(e){}
    }
    connect();
    return()=>{clearTimeout(reconnRef.current);wsRef.current?.close()};
  },[]);

  const set=(k,v)=>{
    setS(prev=>({...prev,[k]:v}));
    if(wsRef.current?.readyState===WebSocket.OPEN){
      wsRef.current.send(JSON.stringify({type:'sensor',path:k,value:v}));
    }
  };

  const setCfgKey=(key,value)=>{
    // key is e.g. "dealer.auto_relock_enabled" — split into tier + field
    const dot=key.indexOf('.');
    const tier=key.slice(0,dot);
    const field=key.slice(dot+1);
    setCfg(prev=>({...prev,[tier]:{...prev[tier],[field]:value}}));
    if(wsRef.current?.readyState===WebSocket.OPEN){
      wsRef.current.send(JSON.stringify({type:'config_set',key,value}));
    }
  };

  const lo=s['Body.Lights.Beam.Low.IsOn'],hi=s['Body.Lights.Beam.High.IsOn'];
  const ffog=s['Body.Lights.Fog.Front.IsOn'],rfog=s['Body.Lights.Fog.Rear.IsOn'];
  const activeCount=Object.values(s).filter(v=>v===true).length;
  const viewLabel=VIEWS.find(v=>v.id===view)?.label||'';

  return <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
    <div className="hdr">
      <span className="logo">BODY<span>CTRL</span></span>
      <div className="hdiv"/>
      <span className="hchip"><span className={`dot ${wsConnected?'dot-ok':'dot-mock'}`}/>{wsConnected?'LIVE':'MOCK'}</span>
      <span className="hchip"><span className="dot dot-ok"/>COVESA VSS v4.0</span>
      <span className="hchip">VIN: <b style={{color:'var(--teal)',marginLeft:4}}>1FTFW1ET0EKF08206</b></span>
      <div className="hright">
        <span className="sigcount">{activeCount} ACTIVE</span>
        <span className="clk">{time.toTimeString().slice(0,8)}</span>
      </div>
    </div>

    <div className="layout">
      {/* Sidebar */}
      <div className="sb">
        {VIEWS.map(v=>(
          <button key={v.id} className={`vbtn ${view===v.id?'active':''}`} onClick={()=>setView(v.id)}>
            {v.icon}{v.label}
          </button>
        ))}
      </div>

      {/* Canvas */}
      <div className="canvas">
        {/* Hydration overlay — covers the canvas while the WS snapshot
            of bridge-owned signals is in flight.  Pointer-events:none
            so the user can still see the layout underneath but the
            dimming makes it visually clear nothing is actionable yet. */}
        {!wsHydrated && (
          <div className="hyd-overlay">
            <div className="hyd-card">
              <div className="dot"/>
              <div>{wsConnected ? 'HYDRATING STATE…' : 'CONNECTING TO BRIDGE…'}</div>
              <div className="sub">{wsConnected ? 'awaiting plant-model snapshot' : 'ws://localhost:8080'}</div>
            </div>
          </div>
        )}
        <div className="ctbar">
          <span className="ctlabel"><b>VSS</b> · {viewLabel}</span>
          {/* AutoRelock countdown banner — visible only while IsArmed=true.
              Remaining seconds computed client-side from the wall-clock
              captured at the FALSE→TRUE transition. */}
          {(() => {
            if(!relockArmed || !relockArmedAt) return null;
            const total = s['Body.Doors.AutoRelock.TimeoutSeconds'] || 45;
            const elapsed = Math.floor((tickNow - relockArmedAt) / 1000);
            const remaining = Math.max(0, total - elapsed);
            return (
              <span className="relock-banner" title="Auto-relock will lock all doors when this counter reaches 0. Open any door to cancel.">
                <span style={{fontSize:11}}>🔒</span>
                <span>AUTO-RELOCK IN</span>
                <b>{remaining}s</b>
              </span>
            );
          })()}
          <span className="ctright">NXP S32G2 · BODY DOMAIN · QM+ASIL-B</span>
        </div>
        <div className={view==='config'?'':' svgwrap'} style={view==='config'?{flex:1,display:'flex',minHeight:0}:{}}>
          {view==='top'     &&<CombinedView s={s} set={set} onDeviceSelect={setSelDev}/>}
          {view==='side'    &&<SideView s={s} set={set}/>}
          {view==='cockpit' &&<CockpitView s={s} set={set}/>}
          {view==='config'  &&<ConfigView cfg={cfg} onSet={setCfgKey}/>}
        </div>
        <div className="stbar">
          {[
            {label:'LIGHTS', active:Object.keys(s).some(k=>k.startsWith('Body.Lights')&&s[k]===true),c:'var(--amber)'},
            {label:'DOORS',  active:['Row1.Left','Row1.Right','Row2.Left','Row2.Right'].some(d=>s[`Body.Doors.${d}.IsOpen`]),c:'var(--amber)'},
            {label:'WIPERS', active:s['Body.Windshield.Front.Wiping.Mode']!=='OFF',c:'var(--blue)'},
            {label:'HVAC',   active:s['Cabin.HVAC.IsAirConditioningActive'],c:'var(--teal)'},
            {label:'HORN',   active:s['Body.Horn.IsActive'],c:'var(--red)',horn:true},
            {label:'PEPS',   active:[1,2,3,4,5,6].some(i=>s[`Body.PEPS.Plant.KeyFob.${i}.Zone`]&&s[`Body.PEPS.Plant.KeyFob.${i}.Zone`]!=='OutOfRange')||[1,2].some(i=>s[`Body.PEPS.Plant.BlePhone.${i}.Zone`]&&s[`Body.PEPS.Plant.BlePhone.${i}.Zone`]!=='OutOfRange'),c:'var(--teal)'},
          ].map(({label,active,c,horn})=>(
            <div key={label} className="sti">
              {horn ? (
                /* Horn-with-sound-waves visualisation: the indicator dot is
                   replaced by a small horn icon; when Body.Horn.IsActive
                   is TRUE, three concentric red ripples emanate outward,
                   matching the horn's audible pulse. */
                <span className={`horn-viz${active?' active':''}`} title={active?'Horn active — chirping':'Horn idle'}>
                  <span className="ripple"/>
                  <span className="ripple r2"/>
                  <span className="ripple r3"/>
                  <svg width="14" height="14" viewBox="0 0 16 16">
                    <path d="M2 6 L2 10 L5 10 L9 13 L9 3 L5 6 Z"
                      fill={active?'#EF4444':'var(--muted)'}
                      stroke={active?'#FFB4B4':'#222'} strokeWidth="0.6"/>
                    {active && <>
                      <path d="M11 6 Q12 8 11 10" stroke="#EF4444" strokeWidth="1" fill="none"/>
                      <path d="M13 4 Q15 8 13 12" stroke="#EF4444" strokeWidth="1" fill="none" opacity=".7"/>
                    </>}
                  </svg>
                </span>
              ) : (
                <div className="stid" style={{background:active?c:'var(--muted)',boxShadow:active?`0 0 6px ${c}`:''}}/>
              )}
              <span style={{color:active?c:''}}>{label}</span>
            </div>
          ))}
          <div style={{marginLeft:'auto',fontFamily:'var(--fm)',fontSize:'10px',color:'var(--muted)'}}>
            {Object.keys(INIT_STATE).length} signals
          </div>
        </div>
      </div>

      {view!=='config'&&<DevicePanel s={s} set={set} sel={selDev} setSel={setSelDev}/>}
      {view!=='config'&&<ControlPanel s={s} set={set}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
