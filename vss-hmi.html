            onTouchEnd:   (e) => { e.preventDefault(); set('Body.Switches.Sunroof.Detent', 'NEUTRAL'); },
          });
          // Map current detent → handle Y offset for the visual spring.
          const handleY = {
            CLOSE_AUTO: -22, CLOSE_HOLD: -10,
            NEUTRAL:      0,
            OPEN_HOLD:   10,  OPEN_AUTO:   22,
          }[detent] ?? 0;
          // Active region color tint.
          const active = (v) => detent === v;
          const zoneFill = (v) => active(v) ? '#F59E0B' : (night?'#0A1018':'#0E1625');
          const zoneStroke = (v) => active(v) ? '#F59E0B' : (night?'#2A3A50':'#1A2838');
          return <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,letterSpacing:1}}>SUNROOF</span>
            <svg viewBox="0 0 50 100" style={{width:46,height:92,userSelect:'none',touchAction:'none'}}>
              {/* Track */}
              <rect x="14" y="4" width="22" height="92" rx="6"
                fill={night?'#070F1C':'#070F1C'} stroke={night?'#2A3A50':'#1A2838'} strokeWidth="1.2"/>
              {/* 2nd detent zones (outer) */}
              <rect x="15" y="6"  width="20" height="14" rx="3"
                fill={zoneFill('CLOSE_AUTO')} stroke={zoneStroke('CLOSE_AUTO')} strokeWidth="0.8"
                style={{cursor:'pointer'}} {...press('CLOSE_AUTO')}>
                <title>2nd detent — AUTO CLOSE (roof closes fully, then shade)</title>
              </rect>
              <rect x="15" y="80" width="20" height="14" rx="3"
                fill={zoneFill('OPEN_AUTO')} stroke={zoneStroke('OPEN_AUTO')} strokeWidth="0.8"
                style={{cursor:'pointer'}} {...press('OPEN_AUTO')}>
                <title>2nd detent — AUTO OPEN (shade opens fully, then roof)</title>
              </rect>
              {/* 1st detent zones (inner) */}
              <rect x="15" y="22" width="20" height="14" rx="3"
                fill={zoneFill('CLOSE_HOLD')} stroke={zoneStroke('CLOSE_HOLD')} strokeWidth="0.8"
                style={{cursor:'pointer'}} {...press('CLOSE_HOLD')}>
                <title>Hold to close (proportional)</title>
              </rect>
              <rect x="15" y="64" width="20" height="14" rx="3"
                fill={zoneFill('OPEN_HOLD')} stroke={zoneStroke('OPEN_HOLD')} strokeWidth="0.8"
                style={{cursor:'pointer'}} {...press('OPEN_HOLD')}>
                <title>Hold to open (proportional)</title>
              </rect>
              {/* Detent guide markings */}
              <line x1="11" y1="20" x2="14" y2="20" stroke={txtDim} strokeWidth="0.8"/>
              <line x1="36" y1="20" x2="39" y2="20" stroke={txtDim} strokeWidth="0.8"/>
              <line x1="11" y1="38" x2="14" y2="38" stroke={txtDim} strokeWidth="0.6" opacity="0.6"/>
              <line x1="36" y1="38" x2="39" y2="38" stroke={txtDim} strokeWidth="0.6" opacity="0.6"/>
              <line x1="11" y1="62" x2="14" y2="62" stroke={txtDim} strokeWidth="0.6" opacity="0.6"/>
              <line x1="36" y1="62" x2="39" y2="62" stroke={txtDim} strokeWidth="0.6" opacity="0.6"/>
              <line x1="11" y1="80" x2="14" y2="80" stroke={txtDim} strokeWidth="0.8"/>
              <line x1="36" y1="80" x2="39" y2="80" stroke={txtDim} strokeWidth="0.8"/>
              {/* Up arrow (close = forward) and down arrow (open = back). */}
              <polygon points="25,2 22,7 28,7" fill={txtDim}/>
              <polygon points="25,98 22,93 28,93" fill={txtDim}/>
              {/* Spring-returning handle bar — slides between detents
                  while pressed, snaps back to center on release. */}
              <rect x="13" y={50 + handleY - 4} width="24" height="8" rx="2"
                fill={night?'#D7A03A':'#F59E0B'} opacity="0.95"
                style={{transition:'y 80ms ease-out'}}/>
            </svg>
            {/* Position readouts. */}
            <div style={{display:'flex',flexDirection:'column',gap:1,fontFamily:'Share Tech Mono',fontSize:8,color:txtDim}}>
              <span>ROOF  <b style={{color:sr>0?'#F59E0B':txtDim}}>{sr}%</b></span>
              <span>SHADE <b style={{color:sh>0?'#F59E0B':txtDim}}>{sh}%</b></span>
              <span style={{fontSize:7,color:detent==='NEUTRAL'?txtDim:'#F59E0B',marginTop:2}}>
                {detent==='NEUTRAL' ? '— idle —' : detent.replace('_',' ')}
              </span>
            </div>
          </div>;
        })()}
      </div>
    </CockpitZone>

    {/* ── Instrument cluster ── */}
    <CockpitZone title="INSTRUMENT CLUSTER" night={night}>
      <svg viewBox="0 0 760 220" style={{width:'100%'}}>
        <rect x="260" y="30" width="240" height="160" rx="8" fill={night?'#050B14':'#070F1C'} stroke={night?'#2A3A50':'#1A2838'} strokeWidth="1.2"/>
        <text x="380" y="55" textAnchor="middle" fill={txtDim} fontSize="11" fontFamily="Share Tech Mono" fontWeight="600" letterSpacing="2">SPEED</text>
        <text x="380" y="105" textAnchor="middle" fill="#F59E0B" fontSize="52" fontFamily="Orbitron" fontWeight="700">0</text>
        <text x="380" y="130" textAnchor="middle" fill={txtDim} fontSize="12" fontFamily="Share Tech Mono">km/h</text>
        <text x="380" y="165" textAnchor="middle" fill={gw.c} fontSize="13" fontFamily="Share Tech Mono" fontWeight="600">● {gw.t}</text>
        <text x="30" y="55" fill={txtDim} fontSize="9" fontFamily="Share Tech Mono" fontWeight="600">WARNINGS:</text>
        {/* Real ISO-style headlamp telltales.  Colour cues per ISO
            2575 convention: green = low beam, blue = high beam,
            green = front fog (distinguished from low beam by the
            wavy fog line), amber = rear fog (distinguished from
            front fog by the horizontal beams). */}
        {/* When high beams are on the high-beam telltale takes
            precedence; the low-beam telltale is suppressed even
            though Beam.Low.IsOn may still be true. */}
        <HeadlampTelltale cx={30}  cy={80} kind="lo"  on={lo && !hi} onColor="#22C55E"/>
        <HeadlampTelltale cx={90}  cy={80} kind="hi"  on={hi}   onColor="#4A9EF5"/>
        {/* Front fog: green (same hue as low beam — the wavy line
            distinguishes it).  Rear fog: amber (same wavy line, but
            horizontal beams distinguish it from front fog). */}
        <HeadlampTelltale cx={150} cy={80} kind="fog"  on={ffog} onColor="#22C55E"/>
        <HeadlampTelltale cx={210} cy={80} kind="rfog" on={rfog} onColor="#F59E0B"/>
        {/* Turn-signal telltales — filled triangle arrows, ISO 2575.
            Blink amber while the indicator is active, dim grey when
            idle so the warnings row layout stays stable. */}
        <TurnArrowTelltale cx={30} cy={120} direction="left"  on={li}/>
        <TurnArrowTelltale cx={90} cy={120} direction="right" on={ri}/>
        {/* Door-ajar telltale — fixed top-view silhouette with the
            driver-side front door swung out.  Single drawing regardless
            of which door is actually open; the lamp is the "any door"
            warning.  Dim when closed so the cluster layout stays stable. */}
        <DoorAjarTelltale cx={150} cy={120} on={doorAjar}/>
        {brake&&<g><circle cx={210} cy={120} r={12} fill="#EF4444" opacity="0.3" stroke="#EF4444" strokeWidth="1.2"/>
          <text x={210} y={125} textAnchor="middle" fill="#EF4444" fontSize="8" fontFamily="Share Tech Mono" fontWeight="600">BRK</text></g>}
        {/* TPMS warning — off by default, amber when any wheel reports
            low pressure.  Real ISO 2575 telltale: tire-section "U"
            with a tread / road line + "!" inside. */}
        <g><title>{tpms?'Tire pressure low':'TPMS normal'}</title>
          <TpmsTelltale cx={30} cy={170} on={tpms}/>
        </g>
        <text x="540" y="55" fill={txtDim} fontSize="9" fontFamily="Share Tech Mono">ODO</text>
        <text x="540" y="75" fill={night?'#D7A03A':'#5A6A80'} fontSize="14" fontFamily="Orbitron" fontWeight="600">000000</text>
        <text x="540" y="105" fill={txtDim} fontSize="9" fontFamily="Share Tech Mono">FUEL</text>
        <text x="540" y="125" fill={night?'#D7A03A':'#5A6A80'} fontSize="14" fontFamily="Orbitron" fontWeight="600">— %</text>
        <text x="640" y="55" fill={txtDim} fontSize="9" fontFamily="Share Tech Mono">RPM</text>
        <text x="640" y="75" fill={night?'#D7A03A':'#5A6A80'} fontSize="14" fontFamily="Orbitron" fontWeight="600">0</text>
        <text x="640" y="105" fill={txtDim} fontSize="9" fontFamily="Share Tech Mono">COOL</text>
        <text x="640" y="125" fill={night?'#D7A03A':'#5A6A80'} fontSize="14" fontFamily="Orbitron" fontWeight="600">— °</text>
      </svg>
    </CockpitZone>

    {/* ── Steering wheel + stalks ── */}
    <CockpitZone title="STEERING" subtitle="wheel · stalks · paddles · start button" night={night}>
      <div style={{display:'grid',gridTemplateColumns:'120px 1fr 120px 80px',gap:10,alignItems:'center'}}>
        {/* Left stalk: turn signals + high-beam pull */}
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,letterSpacing:1}}>LEFT STALK</span>
          <Btn night={night} on={sigDir==='LEFT'} onClick={()=>set('Body.Switches.TurnIndicator.Direction', sigDir==='LEFT'?'OFF':'LEFT')}>◄ TURN L</Btn>
          <Btn night={night} on={sigDir==='RIGHT'} onClick={()=>set('Body.Switches.TurnIndicator.Direction', sigDir==='RIGHT'?'OFF':'RIGHT')}>TURN R ►</Btn>
          <Btn night={night} on={hbSw} onClick={()=>set('Body.Switches.HighBeam.IsEngaged',!hbSw)}>HI-BEAM {hbSw?'●':'○'}</Btn>
        </div>
        {/* Wheel SVG with embedded button pads */}
        <svg viewBox="0 0 240 200" style={{width:'100%',maxHeight:200}}>
          <circle cx="120" cy="105" r="85" fill="none" stroke={night?'#2A1A08':'#15202F'} strokeWidth="14"/>
          <circle cx="120" cy="105" r="32" fill={night?'#0F1726':'#0C1825'} stroke={night?'#3A2A12':'#1A2838'} strokeWidth="2"/>
          <text x="120" y="111" textAnchor="middle" fill={txtDim} fontSize="11" fontFamily="Share Tech Mono">⊕</text>
          <line x1="120" y1="73" x2="120" y2="58" stroke={night?'#3A2A12':'#1A2838'} strokeWidth="3"/>
          <line x1="92" y1="115" x2="50" y2="135" stroke={night?'#3A2A12':'#1A2838'} strokeWidth="3"/>
          <line x1="148" y1="115" x2="190" y2="135" stroke={night?'#3A2A12':'#1A2838'} strokeWidth="3"/>
          {/* Left pad: volume + voice */}
          <rect x="42" y="78" width="40" height="54" rx="3" fill={night?'#0F1726':'#0C1825'} stroke={night?'#3A2A12':'#1A2838'}/>
          <text x="62" y="92" textAnchor="middle" fill={txt} fontSize="9" fontFamily="Share Tech Mono">VOL +</text>
          <text x="62" y="107" textAnchor="middle" fill={txt} fontSize="9" fontFamily="Share Tech Mono">VOL −</text>
          <text x="62" y="124" textAnchor="middle" fill={txt} fontSize="8" fontFamily="Share Tech Mono">VOICE</text>
          {/* Right pad: cruise */}
          <rect x="158" y="78" width="40" height="54" rx="3" fill={night?'#0F1726':'#0C1825'} stroke={night?'#3A2A12':'#1A2838'}/>
          <text x="178" y="92" textAnchor="middle" fill={txt} fontSize="7" fontFamily="Share Tech Mono">CRS ON</text>
          <text x="178" y="107" textAnchor="middle" fill={txt} fontSize="7" fontFamily="Share Tech Mono">SET +</text>
          <text x="178" y="122" textAnchor="middle" fill={txt} fontSize="7" fontFamily="Share Tech Mono">RES −</text>
          {/* Paddles */}
          <rect x="40" y="148" width="50" height="11" rx="3" fill={night?'#0F1726':'#0C1825'} stroke={night?'#3A2A12':'#1A2838'}/>
          <rect x="150" y="148" width="50" height="11" rx="3" fill={night?'#0F1726':'#0C1825'} stroke={night?'#3A2A12':'#1A2838'}/>
          <text x="65" y="157" textAnchor="middle" fill={txtDim} fontSize="7" fontFamily="Share Tech Mono">◄ −1</text>
          <text x="175" y="157" textAnchor="middle" fill={txtDim} fontSize="7" fontFamily="Share Tech Mono">+1 ►</text>
          {/* Horn target on center pad */}
          <circle cx="120" cy="105" r="32" fill="transparent" style={{cursor:'pointer'}}
            onMouseDown={()=>set('Body.Horn.IsActive',true)}
            onMouseUp={()=>set('Body.Horn.IsActive',false)}
            onMouseLeave={()=>set('Body.Horn.IsActive',false)}>
            <title>Press and hold for horn</title>
          </circle>
          {horn&&<circle cx="120" cy="105" r="34" fill="none" stroke="#EF4444" strokeWidth="2" className="blink"/>}
        </svg>
        {/* Right stalk: wiper + washer */}
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,letterSpacing:1}}>WIPER STALK</span>
          <Btn night={night} on={wf&&wf!=='OFF'} onClick={()=>set('Body.Windshield.Front.Wiping.Mode', WIPER_CYCLE[wf||'OFF']||'OFF')}>WIPE: {wf||'OFF'}</Btn>
          <Btn night={night} on={false} onClick={()=>{}}>WASHER ⇣</Btn>
          <Btn night={night} on={horn} onMouseDown={()=>set('Body.Horn.IsActive',true)} onMouseUp={()=>set('Body.Horn.IsActive',false)} onMouseLeave={()=>set('Body.Horn.IsActive',false)}>🔊 HORN</Btn>
        </div>
        {/* Ignition control — circular Start/Stop button on PEPS builds,
            4-position rotary key cylinder on KeyCylinder builds.  Sits
            to the right of the wiper stalk, mirroring real-world
            dashboard layouts where the ignition lives outboard of the
            wiper stalk on the driver side. */}
        {(()=>{
          const keySource = cfg?.vehicle_line?.key_source_cfg || 'PEPS';
          const power     = s['Vehicle.LowVoltageSystemState'] || 'OFF';
          const running   = power === 'ON' || power === 'START';
          if (keySource === 'PEPS') {
            const pressed = !!s['Body.Switches.StartStop.IsPressed'];
            const ringColor = pressed ? '#EF4444'
                            : running ? '#10B981'
                            : night   ? '#3A2A12' : '#1A2838';
            const fillColor = pressed
              ? (night?'#3a0e0e':'#fee2e2')
              : (night?'#0F1726':'#0C1825');
            const textColor = pressed ? '#EF4444'
                            : running ? '#10B981'
                            : night   ? '#7A5A1A' : '#9CA3AF';
            return <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <span style={{fontFamily:'Share Tech Mono',fontSize:7,
                color:night?'#7A5A1A':'#6B7E99',letterSpacing:1}}>START / STOP</span>
              <svg viewBox="0 0 70 70" style={{width:68,height:68,cursor:'pointer',userSelect:'none'}}
                onMouseDown={()=>set('Body.Switches.StartStop.IsPressed',true)}
                onMouseUp={()=>set('Body.Switches.StartStop.IsPressed',false)}
                onMouseLeave={()=>set('Body.Switches.StartStop.IsPressed',false)}
                onTouchStart={(e)=>{e.preventDefault();set('Body.Switches.StartStop.IsPressed',true);}}
                onTouchEnd={()=>set('Body.Switches.StartStop.IsPressed',false)}>
                <title>Press & hold — Engine Start / Stop</title>
                <circle cx="35" cy="35" r="30" fill={fillColor}
                  stroke={ringColor} strokeWidth={pressed?3:2}/>
                <circle cx="35" cy="36" r="12" fill="none"
                  stroke={textColor} strokeWidth="2.5" strokeLinecap="round"
                  strokeDasharray="60 8" transform="rotate(-90 35 36)"/>
                <line x1="35" y1="20" x2="35" y2="34"
                  stroke={textColor} strokeWidth="2.8" strokeLinecap="round"/>
                <text x="35" y="58" textAnchor="middle"
                  fill={textColor} fontSize="6" fontFamily="Share Tech Mono"
                  fontWeight="700" letterSpacing="0.5">ENGINE</text>
                {running && !pressed && <circle cx="35" cy="35" r="33"
                  fill="none" stroke="#10B981" strokeWidth="1" opacity="0.5"
                  className="blink"/>}
              </svg>
            </div>;
          }
          // KeyCylinder — rotary knob with 4 positions.  Click a label
          // to rotate to that detent.  START is spring-loaded: mousedown
          // sets START, mouseup returns to ON (matching real cylinders).
          const pos = s['Body.Switches.IgnitionCylinder.Position'] || 'LOCK';
          // Five detents arranged like a real automotive cylinder:
          //   LOCK   at 7 o'clock   (clockwise rotation away from rest)
          //   OFF    at 9 o'clock
          //   ACC    at 10:30
          //   ON     at 12 o'clock
          //   START  at 1 o'clock   (spring-loaded — releases back to ON)
          // SVG angle convention: 0° = 3 o'clock, 90° = 6 o'clock,
          // 180° = 9 o'clock, -90° (or 270°) = 12 o'clock.  Clock-hour
          // h maps to angle (h-3)*30°.
          const POSITIONS = [
            {p:'LOCK',  angle: 120},  // 7   o'clock
            {p:'OFF',   angle: 180},  // 9   o'clock
            {p:'ACC',   angle: 225},  // 10:30
            {p:'ON',    angle: 270},  // 12  o'clock
            {p:'START', angle: 300},  // 1   o'clock
          ];
          const cur = POSITIONS.find(x=>x.p===pos) || POSITIONS[0];
          const ringColor = night?'#3A2A12':'#1A2838';
          const knobFill  = night?'#0F1726':'#0C1825';
          const accentColor = running ? '#10B981'
                            : pos==='ACC' ? '#F59E0B'
                            : '#9CA3AF';
          return <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <span style={{fontFamily:'Share Tech Mono',fontSize:7,
              color:night?'#7A5A1A':'#6B7E99',letterSpacing:1}}>IGNITION</span>
            <svg viewBox="0 0 90 90" style={{width:84,height:84,userSelect:'none'}}>
              <title>Key cylinder rotary — click a position (START is spring-loaded)</title>
              {/* Outer ring */}
              <circle cx="45" cy="45" r="28" fill={knobFill}
                stroke={ringColor} strokeWidth="2"/>
              {/* Position dots (on ring) + labels (outside ring) */}
              {(()=>{
                // Key-in-Ignition Inhibit: when the transmission isn't
                // in PARK, the LOCK detent is blocked (the bridge will
                // bounce the rotation to OFF anyway).  Render LOCK in
                // a muted red and short-circuit its click so the user
                // sees the disabled state and doesn't trigger the
                // bridge revert.
                const removalInhibited = !!s['Body.Switches.IgnitionCylinder.RemovalInhibited'];
                return POSITIONS.map(({p,angle})=>{
                const rad = angle * Math.PI/180;
                const dotR = 28;
                const labR = 39;
                const dx = 45 + Math.cos(rad)*dotR;
                const dy = 45 + Math.sin(rad)*dotR;
                const lx = 45 + Math.cos(rad)*labR;
                const ly = 45 + Math.sin(rad)*labR + 2; // baseline tweak
                const active = p === pos;
                const lockBlocked = p === 'LOCK' && removalInhibited;
                const c = lockBlocked
                  ? (night?'#5A2828':'#8A4848')
                  : (active ? accentColor : (night?'#5A4416':'#5A6878'));
                const isStart = p === 'START';
                const handlers = lockBlocked
                  ? { onClick: ()=>{/* swallowed — gear interlock */} }
                  : isStart
                  ? {
                      onMouseDown: ()=>set('Body.Switches.IgnitionCylinder.Position','START'),
                      onMouseUp:   ()=>set('Body.Switches.IgnitionCylinder.Position','ON'),
                      onMouseLeave:()=>set('Body.Switches.IgnitionCylinder.Position','ON'),
                      onTouchStart:(e)=>{e.preventDefault();set('Body.Switches.IgnitionCylinder.Position','START');},
                      onTouchEnd:  ()=>set('Body.Switches.IgnitionCylinder.Position','ON'),
                    }
                  : { onClick: ()=>set('Body.Switches.IgnitionCylinder.Position',p) };
                return <g key={p}
                  style={{cursor:lockBlocked?'not-allowed':'pointer',
                          opacity:lockBlocked?0.55:1}}
                  {...handlers}>
                  {lockBlocked && <title>Shift to PARK to remove the key</title>}
                  {/* Larger transparent hitbox so the small dots are easy to tap. */}
                  <circle cx={dx} cy={dy} r="9" fill="transparent"/>
                  <circle cx={dx} cy={dy} r={active?3:2} fill={c}/>
                  <text x={lx} y={ly} textAnchor="middle" fill={c}
                    fontSize="6" fontFamily="Share Tech Mono" fontWeight="700">{p}</text>
                </g>;
                });
              })()}
              {/* Pointer needle — rotates to indicate current position.
                  Pivot is at the cylinder centre (45,45). */}
              <g transform={`rotate(${cur.angle} 45 45)`}>
                <line x1="45" y1="45" x2="68" y2="45"
                  stroke={accentColor} strokeWidth="2.8" strokeLinecap="round"/>
                <circle cx="45" cy="45" r="4" fill={accentColor}/>
              </g>
              {/* Key bow — small notched flange at the centre to evoke a key */}
              <rect x="42" y="42" width="6" height="6" rx="1"
                fill="none" stroke={night?'#3A2A12':'#1A2838'} strokeWidth="0.8"/>
            </svg>
          </div>;
        })()}
      </div>
    </CockpitZone>

    {/* ── Headlamp / lighting switches ── */}
    <CockpitZone title="LIGHTING SWITCHES" subtitle="left dash cluster" night={night}>
      <div style={{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        {/* Headlamp rotary — cycles Body.Lights.LightSwitch.
            Static white ISO-style icons sit just outside the knob at
            each valid position so the driver sees what each detent
            does without having to read the enum text.  The amber
            pointer + the printed enum below give the current value. */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,letterSpacing:1}}>HEADLAMP</span>
          <svg viewBox="0 0 130 130" style={{width:110,height:110,cursor:'pointer'}} onClick={()=>set('Body.Lights.LightSwitch', LIGHT_CYCLE[lightSw]||'OFF')}>
            {/* Knob disc */}
            <circle cx="65" cy="65" r="34" fill={night?'#0F1726':'#0C1825'} stroke={night?'#3A2A12':'#1A2838'} strokeWidth="2"/>
            <circle cx="65" cy="65" r="5" fill="#F59E0B" opacity={lightSw==='OFF'?.2:.9}/>
            {/* Static position icons (white).  The matching enum lights
                amber.  Where no widely-recognised ISO icon exists we
                fall back to a short text label per the user spec. */}
            {[
              {p:'OFF',      kind:'text',   label:'OFF'},
              {p:'DRL',      kind:'text',   label:'DRL'},
              {p:'POSITION', kind:'parking'},
              {p:'AUTO',     kind:'text',   label:'AUTO'},
              {p:'BEAM',     kind:'beam'},
            ].map(({p,kind,label},i)=>{
              const a=-Math.PI/2 + i*(2*Math.PI/5);
              // Place icons just outside the knob disc (radius 48).
              const x=65+Math.cos(a)*48, y=65+Math.sin(a)*48;
              const active=lightSw===p;
              const c = active ? '#F59E0B' : '#E5E7EB';
              if (kind==='text'){
                return <text key={p} x={x} y={y+3} textAnchor="middle" fontSize="7"
                  fontFamily="Share Tech Mono" fontWeight="700" fill={c}>{label}</text>;
              }
              if (kind==='parking'){
                // ISO parking / position-light icon — two lamps facing
                // outward (mirror images of each other), like the
                // headlamp telltale duplicated.  Each lamp is a
                // semicircle with 3 short rays emanating outward.
                return <g key={p}>
                  {/* Left lamp — body bulges left, rays point left */}
                  <path d={`M ${x-2},${y-4} A 4,4 0 0,0 ${x-2},${y+4} Z`} fill={c} stroke={c} strokeWidth="0.4"/>
                  <line x1={x-3} y1={y-3} x2={x-8}  y2={y-3} stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
                  <line x1={x-3} y1={y}   x2={x-9}  y2={y}   stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
                  <line x1={x-3} y1={y+3} x2={x-8}  y2={y+3} stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
                  {/* Right lamp — body bulges right, rays point right */}
                  <path d={`M ${x+2},${y-4} A 4,4 0 0,1 ${x+2},${y+4} Z`} fill={c} stroke={c} strokeWidth="0.4"/>
                  <line x1={x+3} y1={y-3} x2={x+8}  y2={y-3} stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
                  <line x1={x+3} y1={y}   x2={x+9}  y2={y}   stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
                  <line x1={x+3} y1={y+3} x2={x+8}  y2={y+3} stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
                </g>;
              }
              if (kind==='beam'){
                // Low-beam telltale — same geometry as the cluster
                // telltale (semicircle + 3 down-slanted beams) but in
                // miniature.  Always points left.
                return <g key={p}>
                  <path d={`M ${x+1},${y-5} A 5,5 0 0,1 ${x+1},${y+5} Z`} fill={c} stroke={c} strokeWidth="0.5"/>
                  <line x1={x-1} y1={y-3} x2={x-9} y2={y-1}  stroke={c} strokeWidth="1.3" strokeLinecap="round"/>
                  <line x1={x-1} y1={y}   x2={x-9} y2={y+2}  stroke={c} strokeWidth="1.3" strokeLinecap="round"/>
                  <line x1={x-1} y1={y+3} x2={x-9} y2={y+5}  stroke={c} strokeWidth="1.3" strokeLinecap="round"/>
                </g>;
              }
              return null;
            })}
            {/* Amber pointer — points from the center toward the active position. */}
            {(()=>{const i=['OFF','DRL','POSITION','AUTO','BEAM'].indexOf(lightSw);
              const a=-Math.PI/2 + (i<0?0:i)*(2*Math.PI/5);
              return <line x1="65" y1="65" x2={65+Math.cos(a)*26} y2={65+Math.sin(a)*26}
                stroke="#F59E0B" strokeWidth="2.5" strokeLinecap="round"/>;})()}
          </svg>
          <span style={{fontFamily:'Share Tech Mono',fontSize:8,color:txt,fontWeight:600}}>{lightSw}</span>
        </div>
        {/* Switch column */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,auto)',gap:6}}>
          <Btn night={night} on={ffogSw} onClick={()=>set('Body.Switches.Fog.Front.IsEngaged',!ffogSw)} min={110}>FOG FRONT {ffogSw?'●':'○'}</Btn>
          <Btn night={night} on={rfogSw} onClick={()=>set('Body.Switches.Fog.Rear.IsEngaged',!rfogSw)} min={110}>FOG REAR {rfogSw?'●':'○'}</Btn>
          <Btn night={night} on={hazSw} onClick={()=>set('Body.Switches.Hazard.IsEngaged',!hazSw)} min={110}>⚠ HAZARD {hazSw?'●':'○'}</Btn>
        </div>
        {/* Status readout */}
        <div style={{fontFamily:'Share Tech Mono',fontSize:8,color:txtDim,display:'flex',flexDirection:'column',gap:3}}>
          <span>LO BEAM: <b style={{color:lo?'#22C55E':txtDim}}>{lo?'ON':'-'}</b></span>
          <span>HI BEAM: <b style={{color:hi?'#4A9EF5':txtDim}}>{hi?'ON':'-'}</b></span>

          <span>DRL: <b style={{color:s['Body.Lights.Running.IsOn']?'#22C55E':txtDim}}>{s['Body.Lights.Running.IsOn']?'ON':'-'}</b></span>
        </div>
      </div>
    </CockpitZone>

        <Btn night={night} on={heatR>0} onClick={()=>set('Cabin.Seat.Row1.Right.HeatingLevel',[3,0,1,2][heatR])}>PAS HEAT {heatR}</Btn>

            <Btn night={night} on={false} onClick={()=>{}} sz={10} pad={'3px 9px'}>⏮</Btn>
            <Btn night={night} on={false} onClick={()=>{}} sz={10} pad={'3px 9px'}>▶</Btn>
            <Btn night={night} on={false} onClick={()=>{}} sz={10} pad={'3px 9px'}>⏭</Btn>
