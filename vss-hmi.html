<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSS Body HMI · COVESA v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080F;--s1:#080E18;--s2:#0C1420;--s3:#111B28;--s4:#18243A;
  --bdr:#1A2540;--bdr2:#243055;
  --amber:#F59E0B;--amber2:rgba(245,158,11,.15);--amber3:rgba(245,158,11,.07);
  --teal:#0DC8C8;--teal2:rgba(13,200,200,.13);
  --green:#10D98A;--green2:rgba(16,217,138,.12);
  --red:#F04040;--red2:rgba(240,64,64,.12);
  --blue:#4A9EF5;--blue2:rgba(74,158,245,.12);
  --violet:#9B6DFF;--violet2:rgba(155,109,255,.12);
  --white:#DCE8F5;--dim:#6B7E99;--muted:#2E3E55;
  --fd:'Orbitron',monospace;--fm:'Share Tech Mono',monospace;--fu:'Inter',sans-serif;
  --r4:4px;--r6:6px;--r8:8px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--fu)}
.hdr{height:44px;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:14px;flex-shrink:0;position:relative;z-index:10}
.logo{font-family:var(--fd);font-size:13px;font-weight:900;letter-spacing:.22em;color:var(--amber);white-space:nowrap}
.logo span{color:var(--muted);font-weight:400}
.hdiv{width:1px;height:22px;background:var(--bdr2)}
.hchip{display:flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--bdr2);background:var(--s2);color:var(--dim);white-space:nowrap}
.hchip .dot{width:5px;height:5px;border-radius:50%}
.dot-mock{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.dot-ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.hright{margin-left:auto;display:flex;align-items:center;gap:12px}
.clk{font-family:var(--fm);font-size:12px;color:var(--dim)}
.sigcount{font-family:var(--fm);font-size:10px;color:var(--teal);padding:3px 8px;border:1px solid var(--teal2);border-radius:3px;background:var(--teal2)}
.layout{display:flex;height:calc(100vh - 44px)}
.sb{width:80px;background:var(--s1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0}
.vbtn{width:64px;height:56px;border-radius:var(--r6);border:1.5px solid transparent;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--dim);font-family:var(--fm);font-size:9px;letter-spacing:.06em;transition:all .15s;font-weight:500}
.vbtn:hover{background:var(--s2);color:var(--white)}
.vbtn.active{background:var(--amber2);border-color:rgba(245,158,11,.35);color:var(--amber)}
.vbtn svg{width:20px;height:20px;stroke-width:1.5}
.canvas{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);position:relative}
.ctbar{height:32px;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.ctlabel{font-family:var(--fd);font-size:11px;letter-spacing:.14em;color:var(--white);font-weight:500}
.ctlabel b{color:var(--amber)}
.ctright{margin-left:auto;font-family:var(--fm);font-size:10px;color:var(--dim)}
.svgwrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px}
.cp{width:340px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.cphdr{height:32px;display:flex;align-items:center;padding:0 12px;gap:7px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.cptitle{font-family:var(--fd);font-size:10px;letter-spacing:.18em;color:var(--white);font-weight:500}
.cpscroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent}
.cpscroll::-webkit-scrollbar{width:3px}
.cpscroll::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.sg{border-bottom:1px solid var(--bdr)}
.sghdr{padding:8px 12px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;font-size:11px;font-weight:600;color:var(--white);text-transform:uppercase;letter-spacing:.09em;transition:color .13s}
.sghdr:hover{color:var(--amber)}
.sghdr.lit{color:var(--amber)}
.vsstag{font-family:var(--fm);font-size:8px;color:var(--dim);background:var(--s2);padding:2px 6px;border-radius:2px;margin-left:auto;border:1px solid var(--bdr)}
.chv{color:var(--muted);transition:transform .13s;font-size:12px;margin-left:4px}
.chv.o{transform:rotate(90deg)}
.sgbody{padding:6px 12px 10px;display:flex;flex-direction:column;gap:6px}
.cr{display:flex;align-items:center;gap:6px;min-height:28px}
.cn{font-family:var(--fm);font-size:11px;color:var(--dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .13s}
.cn.on{color:var(--white)}
.tog{width:42px;height:22px;border-radius:11px;border:1.5px solid var(--bdr2);background:var(--s3);cursor:pointer;position:relative;transition:all .16s;flex-shrink:0}
.tog.on{border-color:var(--green)}.tog.on.a{border-color:var(--amber)}.tog.on.r{border-color:var(--red)}.tog.on.b{border-color:var(--blue)}.tog.on.t{border-color:var(--teal)}.tog.on.v{border-color:var(--violet)}
.tog.on{background:var(--green2)}.tog.on.a{background:var(--amber2)}.tog.on.r{background:var(--red2)}.tog.on.b{background:var(--blue2)}.tog.on.t{background:var(--teal2)}.tog.on.v{background:var(--violet2)}
.knob{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--dim);top:3px;left:3px;transition:transform .16s,background .16s}
.tog.on .knob{transform:translateX(20px);background:var(--green)}
.tog.on.a .knob{background:var(--amber)}.tog.on.r .knob{background:var(--red)}.tog.on.b .knob{background:var(--blue)}.tog.on.t .knob{background:var(--teal)}.tog.on.v .knob{background:var(--violet)}
.slrow{display:flex;flex-direction:column;gap:4px}
.slhdr{display:flex;justify-content:space-between;align-items:center}
.slr{flex:1;height:6px;-webkit-appearance:none;background:var(--s4);border-radius:4px;outline:none;cursor:pointer;margin-top:4px}
.slr::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--amber);cursor:pointer;box-shadow:0 0 6px rgba(245,158,11,.7)}
.sv{font-family:var(--fm);font-size:11px;color:var(--amber);min-width:35px;text-align:right;font-weight:500}
.sel{flex:1;background:var(--s3);border:1px solid var(--bdr2);border-radius:var(--r4);color:var(--white);font-family:var(--fm);font-size:10px;padding:4px 6px;outline:none;cursor:pointer}
.sel:focus{border-color:var(--amber)}
.dcgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dcard{background:var(--s2);border-radius:var(--r6);padding:8px 10px;border:1px solid var(--bdr);display:flex;flex-direction:column;gap:4px}
.dctitle{font-family:var(--fm);font-size:10px;color:var(--amber);margin-bottom:2px;font-weight:600}
.dcr{display:flex;align-items:center;justify-content:space-between;gap:4px}
.dcl{font-family:var(--fm);font-size:10px;color:var(--dim)}
.hdiv2{height:1px;background:var(--bdr);margin:3px 0}
.ebrow{display:flex;gap:4px;flex-wrap:wrap}
.eb{padding:4px 8px;border-radius:4px;font-family:var(--fm);font-size:9px;border:1px solid var(--bdr2);background:var(--s3);color:var(--dim);cursor:pointer;transition:all .13s}
.eb:hover{color:var(--white);border-color:var(--white)}
.eb.on{background:var(--amber2);border-color:rgba(245,158,11,.4);color:var(--amber)}
.stbar{height:24px;background:var(--s1);border-top:1px solid var(--bdr);display:flex;align-items:center;padding:0 12px;gap:16px;flex-shrink:0}
.sti{display:flex;align-items:center;gap:4px;font-family:var(--fm);font-size:10px;color:var(--muted)}
.stid{width:6px;height:6px;border-radius:50%}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.1}}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:.7}}
@keyframes hornPulse{0%{transform:scale(1);opacity:.9}80%{transform:scale(2.4);opacity:0}100%{transform:scale(2.4);opacity:0}}
@keyframes relockPulseBg{0%,100%{background:rgba(245,158,11,.18)}50%{background:rgba(245,158,11,.32)}}
.blink{animation:blink .7s infinite}
.blinks{animation:blink 1.4s infinite}
.pulse{animation:pulse .5s infinite}
.relock-banner{display:flex;align-items:center;gap:8px;padding:3px 10px;border-radius:14px;border:1px solid rgba(245,158,11,.55);font-family:var(--fm);font-size:10px;color:#FCD34D;font-weight:600;letter-spacing:.04em;animation:relockPulseBg 1.6s infinite;text-shadow:0 0 6px rgba(252,211,77,.4)}
/* Hydration overlay — dims the canvas + shows a "Connecting…" banner
   while the WS snapshot is being delivered.  Pointer events stay live
   so the user can still see the layout but can't act on stale data. */
.hyd-overlay{position:absolute;inset:0;background:rgba(8,15,24,.60);display:flex;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(1px);font-family:var(--fm);font-size:11px;color:var(--amber);letter-spacing:.08em;pointer-events:none}
.hyd-overlay .hyd-card{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;padding:14px 22px;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 4px 22px rgba(0,0,0,.45)}
.hyd-overlay .hyd-card .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);animation:pulse .9s infinite}
.hyd-overlay .hyd-card .sub{color:var(--muted);font-size:9px;letter-spacing:.04em;text-transform:uppercase}
.relock-banner b{color:#FFEDD5;font-weight:800;font-size:12px}
.horn-viz{position:relative;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px}
.horn-viz svg{position:relative;z-index:2}
.horn-viz .ripple{position:absolute;inset:0;border:2px solid #EF4444;border-radius:50%;opacity:0;pointer-events:none}
.horn-viz.active .ripple{animation:hornPulse .42s ease-out infinite}
.horn-viz.active .ripple.r2{animation-delay:.15s}
.horn-viz.active .ripple.r3{animation-delay:.30s}
.peps-card{background:var(--s2);border-radius:var(--r6);padding:8px 10px;border:1px solid var(--bdr);display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.peps-card.intruder{border-color:rgba(240,64,64,.4);background:var(--red2)}
.peps-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:8px;padding:2px 6px;border-radius:3px;font-weight:600}
.peps-badge.paired{background:var(--green2);color:var(--green);border:1px solid rgba(16,217,138,.3)}
.peps-badge.unpaired{background:var(--red2);color:var(--red);border:1px solid rgba(240,64,64,.3)}
.peps-title{font-family:var(--fm);font-size:10px;color:var(--amber);font-weight:600;display:flex;align-items:center;gap:6px}
.peps-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.peps-label{font-family:var(--fm);font-size:10px;color:var(--dim)}
.peps-btnrow{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.peps-btn{padding:3px 7px;border-radius:3px;font-family:var(--fm);font-size:8px;border:1px solid var(--bdr2);background:var(--s3);color:var(--dim);cursor:pointer;transition:all .13s;font-weight:600}
.peps-btn:hover{color:var(--white);border-color:var(--white)}
.peps-section{font-family:var(--fd);font-size:9px;letter-spacing:.14em;color:var(--dim);padding:8px 12px 4px;font-weight:500}
/* ── Device panel ── */
.devpanel{width:180px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.devpanel-inner{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent}
.devpanel-inner::-webkit-scrollbar{width:3px}
.devpanel-inner::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.devpanel-hdr{height:32px;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.devpanel-title{font-family:var(--fm);font-size:9px;color:var(--amber);font-weight:700;letter-spacing:.12em}
.devchip{font-family:var(--fm);font-size:8px;padding:3px 7px;border-radius:3px;border:1px solid var(--bdr2);color:var(--dim);cursor:pointer;transition:all .15s;font-weight:600;text-align:center}
.devchip.active{font-weight:800}
.devchip.inrange{box-shadow:0 0 5px currentColor}
.devpanel-section{font-family:var(--fm);font-size:8px;color:var(--muted);font-weight:600;letter-spacing:.08em;padding:2px 0;border-top:1px solid var(--bdr);margin-top:2px}
.devpanel-zone{display:flex;flex-direction:column;gap:3px}
.devpanel-zoneval{font-family:var(--fm);font-size:12px;font-weight:700;line-height:1}
.devpanel-prox{display:flex;gap:2px;margin-top:2px}
.devpanel-proxseg{flex:1;height:5px;border-radius:2px;transition:all .3s}
.devpanel-rssi{font-family:var(--fm);font-size:7px;color:var(--muted);word-break:break-all;line-height:1.4}
.devpanel-btns{display:flex;flex-direction:column;gap:4px}
.devpanel-btn{padding:6px 4px;border-radius:3px;font-family:var(--fm);font-size:8px;border:1px solid var(--bdr2);background:var(--s3);color:var(--dim);cursor:pointer;font-weight:600;transition:all .13s;text-align:center}
.devpanel-btn:hover{color:var(--white);border-color:rgba(255,255,255,.4)}
.devpanel-btn.fired{background:var(--amber2);border-color:rgba(245,158,11,.6);color:var(--amber)}
.zonepick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.zpbtn{padding:4px 2px;border-radius:3px;font-family:var(--fm);font-size:7px;border:1px solid var(--bdr2);background:var(--s3);color:var(--dim);cursor:pointer;font-weight:600;transition:all .13s;text-align:center;line-height:1.3;white-space:pre-line}
.zpbtn:hover{color:var(--white);border-color:rgba(255,255,255,.35)}
.zpbtn.zp-active{color:var(--bg);font-weight:800}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ══════ STATE ══════ */
const INIT_STATE={
  'Vehicle.LowVoltageSystemState':'OFF',
  'Vehicle.Powertrain.Type':'COMBUSTION',
  // Lights — outputs
  'Body.Lights.Beam.Low.IsOn':false,
  'Body.Lights.Beam.High.IsOn':false,
  'Body.Lights.Running.IsOn':false,
  'Body.Lights.Parking.IsOn':false,
  'Body.Lights.Fog.Front.IsOn':false,
  'Body.Lights.Fog.Rear.IsOn':false,
  'Body.Lights.Brake.IsActive':false,
  'Body.Lights.Backup.IsActive':false,
  'Body.Lights.LicensePlate.IsOn':false,
  'Body.Lights.DirectionIndicator.Left.IsSignaling':false,
  'Body.Lights.DirectionIndicator.Right.IsSignaling':false,
  'Body.Lights.Hazard.IsSignaling':false,
  'Body.Lights.DirectionIndicator.Left.Lamp.Front.IsOn':false,
  'Body.Lights.DirectionIndicator.Right.Lamp.Front.IsOn':false,
  // Light switches — inputs
  'Body.Lights.LightSwitch':'OFF',
  'Body.Lights.AmbientLightSensor.Illuminance':10000,
  'Body.Switches.HighBeam.IsEngaged':false,
  'Body.Switches.Fog.Front.IsEngaged':false,
  'Body.Switches.Fog.Rear.IsEngaged':false,
  'Body.Switches.Hazard.IsEngaged':false,
  'Body.Switches.TurnIndicator.Direction':'OFF',
  // Braking & transmission
  'Chassis.Brake.PedalPosition':0,
  'Chassis.ParkingBrake.IsEngaged':true,
  'Powertrain.Transmission.CurrentGear':0,
  // ADAS
  'Vehicle.ADAS.HighBeam.OncomingVehicleDetected':false,
  // Safety
  'Vehicle.Safety.CrashDetected':false,
  // PEPS
  'Body.PEPS.KeyPresent':false,
  'Body.Switches.Keyfob.LockButton':'IDLE',
  'Body.Switches.DoorTrim.Row1.Left.LockButton':'IDLE',
  'Body.Switches.DoorTrim.Row1.Right.LockButton':'IDLE',
  'Body.Switches.DoorTrim.Row2.Left.LockButton':'IDLE',
  'Body.Switches.DoorTrim.Row2.Right.LockButton':'IDLE',
  'Body.Connectivity.RemoteLock':'IDLE',
  'Body.Connectivity.BleLock':'IDLE',
  'Body.Connectivity.NfcCardPresent':false,
  'Body.Connectivity.NfcPhonePresent':false,
  // PEPS plant model
  'Body.PEPS.Plant.KeyFob.1.Zone':'OutOfRange','Body.PEPS.Plant.KeyFob.1.ButtonPress':'NONE','Body.PEPS.Plant.KeyFob.1.Paired':true,'Body.PEPS.Plant.KeyFob.1.RssiResponse':'','Body.PEPS.Plant.KeyFob.1.RfMessage':'',
  'Body.PEPS.Plant.KeyFob.2.Zone':'OutOfRange','Body.PEPS.Plant.KeyFob.2.ButtonPress':'NONE','Body.PEPS.Plant.KeyFob.2.Paired':true,'Body.PEPS.Plant.KeyFob.2.RssiResponse':'','Body.PEPS.Plant.KeyFob.2.RfMessage':'',
  'Body.PEPS.Plant.KeyFob.3.Zone':'OutOfRange','Body.PEPS.Plant.KeyFob.3.ButtonPress':'NONE','Body.PEPS.Plant.KeyFob.3.Paired':true,'Body.PEPS.Plant.KeyFob.3.RssiResponse':'','Body.PEPS.Plant.KeyFob.3.RfMessage':'',
  'Body.PEPS.Plant.KeyFob.4.Zone':'OutOfRange','Body.PEPS.Plant.KeyFob.4.ButtonPress':'NONE','Body.PEPS.Plant.KeyFob.4.Paired':true,'Body.PEPS.Plant.KeyFob.4.RssiResponse':'','Body.PEPS.Plant.KeyFob.4.RfMessage':'',
  'Body.PEPS.Plant.KeyFob.5.Zone':'OutOfRange','Body.PEPS.Plant.KeyFob.5.Paired':false,'Body.PEPS.Plant.KeyFob.5.RssiResponse':'',
  'Body.PEPS.Plant.KeyFob.6.Zone':'OutOfRange','Body.PEPS.Plant.KeyFob.6.Paired':false,'Body.PEPS.Plant.KeyFob.6.RssiResponse':'',
  'Body.PEPS.Plant.BlePhone.1.Zone':'OutOfRange','Body.PEPS.Plant.BlePhone.1.RssiResponse':'',
  'Body.PEPS.Plant.BlePhone.2.Zone':'OutOfRange','Body.PEPS.Plant.BlePhone.2.RssiResponse':'',
  'Body.PEPS.Plant.NfcCard.1.Position':'NotPresent',
  'Body.PEPS.Plant.NfcCard.2.Position':'NotPresent',
  // ── Doors — HMI-owned inputs only ────────────────────────────────────
  // Bridge-owned door state (IsLocked, IsDoubleLocked, IsOpen,
  // Latch.IsLatched, Soldier.IsUnlocked) is INTENTIONALLY OMITTED from
  // INIT_STATE per docs/signal-ownership-and-state-hydration.md — the
  // door-lock plant model owns those values and the WS bridge delivers
  // them in the first snapshot.  Step 2 of that plan adds wsHydrated
  // gating so the HMI doesn't render owned-signal visuals until the
  // snapshot has arrived.  Until then those reads return `undefined`,
  // which React renders as the "off" state — better than asserting a
  // wrong default that may briefly conflict with reality.
  // (LatchStatus exists in the signal catalog but has no consumers
  // today — see DoorCard comment for context.)
  // Front doors don't have child-lock — only rear (Row 2) doors do.
  'Body.Doors.Row1.Left.Window.Position':0,'Body.Doors.Row1.Left.Handle.Inside.IsPulled':false,'Body.Doors.Row1.Left.Handle.Outside.IsPulled':false,
  'Body.Doors.Row1.Right.Window.Position':0,'Body.Doors.Row1.Right.Handle.Inside.IsPulled':false,'Body.Doors.Row1.Right.Handle.Outside.IsPulled':false,
  'Body.Doors.Row2.Left.IsChildLockActive':false,'Body.Doors.Row2.Left.Window.Position':0,'Body.Doors.Row2.Left.Handle.Inside.IsPulled':false,'Body.Doors.Row2.Left.Handle.Outside.IsPulled':false,
  'Body.Doors.Row2.Right.IsChildLockActive':false,'Body.Doors.Row2.Right.Window.Position':0,'Body.Doors.Row2.Right.Handle.Inside.IsPulled':false,'Body.Doors.Row2.Right.Handle.Outside.IsPulled':false,

  // Body.Trunk.IsOpen, Body.Trunk.IsLocked, Body.Horn.IsActive are

  'Body.Hood.IsOpen':false,'Body.FuelLid.IsOpen':false,'Body.ChargeLid.IsOpen':false,
  // Anti-theft alarm + auto-relock status (project extensions) — bridge-owned,
  // omitted.  PanicAlarm and AutoRelock features publish them.
  // Sunroof
  'Body.Sunroof.Position':0,'Body.Sunroof.Shade.Position':0,
  // Wipers
  'Body.Windshield.Front.Wiping.Mode':'OFF','Body.Windshield.Front.Wiping.Intensity':0,'Body.Windshield.Front.Washing.IsActive':false,

/* MirrorAdjustControls — Side selector + 4-way DPad driving the
   stateful Body.Switches.Mirror.{Select,Direction} signals.  Press
   sets Direction to the matching enum value; release sets it back to
   NONE.  The plant model integrates while non-NONE. */
function MirrorAdjustControls({s,set}){
  const sel=s['Body.Switches.Mirror.Select']||'NONE';
  const setSel=v=>set('Body.Switches.Mirror.Select', v===sel?'NONE':v);
  const dir=s['Body.Switches.Mirror.Direction']||'NONE';
  const press=v=>set('Body.Switches.Mirror.Direction', v);
  const release=()=>set('Body.Switches.Mirror.Direction', 'NONE');
  // dpadBtnStyle factored out so each pad button is identical except
  // for grid placement.
  const padBtn={width:32,height:32,padding:0,borderRadius:6,
    border:'1px solid var(--bdr2)',background:'var(--s3)',
    color:'var(--white)',fontFamily:'var(--fm)',fontSize:14,
    fontWeight:700,cursor:sel==='NONE'?'not-allowed':'pointer',
    opacity:sel==='NONE'?0.4:1,userSelect:'none',touchAction:'none'};
  const lit=v=>dir===v?{background:'var(--amber2)',color:'var(--amber)',
    borderColor:'rgba(245,158,11,0.6)'}:{};
  const sideBtn=(v)=>{
    const active=sel===v;
    return <button onClick={()=>setSel(v)}
      style={{flex:1,padding:'5px 0',borderRadius:4,
        border:'1px solid '+(active?'rgba(245,158,11,0.6)':'var(--bdr2)'),
        background:active?'var(--amber2)':'var(--s3)',
        color:active?'var(--amber)':'var(--dim)',
        fontFamily:'var(--fm)',fontSize:9,fontWeight:700,cursor:'pointer'}}>
      {v}
    </button>;
  };
  // Wire mouse + touch events to the same press/release handlers so
  // the pad behaves consistently on desktop and tablet.
  const padHandlers=v=>sel==='NONE'?{}:{
    onMouseDown:()=>press(v), onMouseUp:release, onMouseLeave:()=>{if(dir===v)release();},
    onTouchStart:e=>{e.preventDefault();press(v);},
    onTouchEnd:e=>{e.preventDefault();release();},
  };
  return <div style={{marginTop:8,padding:'8px',background:'var(--s2)',
    borderRadius:'var(--r6)',border:'1px solid var(--bdr)'}}>
    <div className="dctitle" style={{marginBottom:6}}>ADJUST</div>
    <div style={{display:'flex',gap:6,marginBottom:8}}>
      <span className="dcl" style={{flex:'0 0 auto',alignSelf:'center'}}>Side</span>
      {sideBtn('LEFT')}
      {sideBtn('RIGHT')}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'32px 32px 32px',
      gridTemplateRows:'32px 32px 32px',gap:3,justifyContent:'center'}}>
      <div/>
      <button style={{...padBtn,...lit('UP')}} {...padHandlers('UP')}>▲</button>
      <div/>
      <button style={{...padBtn,...lit('LEFT')}} {...padHandlers('LEFT')}>◀</button>
      <div style={{...padBtn,opacity:0.2,cursor:'default',display:'flex',
        alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700}}>
        {sel==='NONE'?'—':sel[0]}
      </div>
      <button style={{...padBtn,...lit('RIGHT')}} {...padHandlers('RIGHT')}>▶</button>
      <div/>
      <button style={{...padBtn,...lit('DOWN')}} {...padHandlers('DOWN')}>▼</button>
      <div/>
    </div>
  </div>;
}

function DoorCard({label,pfx,s,set}){

    <div className="dcr"><span className="dcl">Soldier</span><Tog val={s[`${p}.IsLocked`]} on={()=>set(`${p}.Soldier.IsUnlocked`,s[`${p}.IsLocked`])} c="r"/></div>
    <div className="dcr"><span className="dcl">DblLock</span><Tog val={s[`${p}.IsDoubleLocked`]} on={()=>set('Body.Doors.CentralLock.Command',s[`${p}.IsDoubleLocked`]?'release_double':'lock_double')} c="r"/></div>
    <div className="dcr"><span className="dcl">Latched</span><Tog val={s[`${p}.Latch.IsLatched`]} c="v"/></div>
    {isRearDoor && (

    )}
    <div style={{marginTop:2}}>

      <input type="range" className="slr" min={0} max={100} value={s[`${p}.Window.Position`]??0}
        onChange={e=>set(`${p}.Window.Position`,parseInt(e.target.value))}/>

    {/* The 3-button latch-state selector (UN-LATCHED / HALF / FULL) was
        removed — `Body.Doors.Row*.LatchStatus` has no consumers anywhere
        (no feature, plant model, arbiter, or ws_bridge subscribes to it),
        so the buttons were pure dead UI.  The boolean "Latched" toggle
        above is the real signal, published by DoorHandlePlantModel and
        forwarded via OUTPUT_SIGNALS.  Re-add this group if/when a
        half-latched test scenario is wired up to a real consumer. */}
  </div>;
}

/* ══════ COMBINED TOP + PEPS VIEW ══════ */
// Vehicle body center — midpoint of front panel (y=30) and rear bumper (y=580).
// Stadiums are centred here so they symmetrically enclose the car top and bottom.
// VCY shifted from 305 to 265 to track the lengthened front hood
// (now y=-50 to y=580, mid-line = 265).  Stadium shapes recentre
// here so they remain visually symmetric around the vehicle.
const VCX=180, VCY=265;

// Stadium (discorectangle) hit-test.
// halfW    — half the total width of the stadium (= semicircle radius = rx).
// The straight rectangular mid-section spans ±straightH around VCY.
// Cap semicircles of radius halfW sit above and below the straight section.
function inStadium(x, y, halfW){
  const straightH=100;
  const dx=Math.abs(x-VCX), dy=Math.abs(y-VCY);
  if(dx>halfW) return false;           // outside left/right walls
  if(dy<=straightH) return true;       // inside rectangular mid-section
  return dx*dx+(dy-straightH)*(dy-straightH)<=halfW*halfW;  // inside cap
}

function getDevicePos(zone, idx, total){
  const sp=26, off=(idx-(total-1)/2)*sp;
  switch(zone){
    case 'RfRange':{
      // Trace devices around an ellipse that approximates the RF stadium boundary.
      // halfW=340, vertical semi-axis = straightH(100) + halfW(340) = 440.
      const a=(idx/Math.max(total,1))*2*Math.PI-Math.PI/2;
      return {x:VCX+340*Math.cos(a), y:VCY+440*Math.sin(a)};
    }
    case 'Approach':{
      // halfW=300, vertical semi-axis = 100+300 = 400.
      const a=(idx/Math.max(total,1))*2*Math.PI-Math.PI/2;
      return {x:VCX+300*Math.cos(a), y:VCY+400*Math.sin(a)};
    }
    // All interior/near-body zones use absolute SVG coords so they
    // stay glued to the car regardless of VCY.
    case 'DriverDoor':   return {x:32,        y:300+idx*30}; // left of car body (x=60)
    case 'PassengerDoor':return {x:328,       y:300+idx*30}; // right of car body (x=300)
    case 'Hood':         return {x:VCX+off,   y:-66};        // above lengthened front panel (y=-50)
    case 'Trunk':        return {x:VCX+off,   y:600};        // below rear bumper (y=580)
    case 'TrunkInside':  return {x:VCX+off,   y:550};        // inside trunk rect (y=440–560)
    case 'Cabin':        return {x:VCX+off,   y:330};        // mid-cabin
    case 'OutOfRange':   return {x:-150+idx*52, y:755};
    default:             return {x:-150+idx*52, y:755};
  }
}

function hitTestZone(x,y){
  // Front hood (now lengthened to y=-50..80 to match trunk).
  if(x>=60&&x<=300&&y>=-50&&y<80) return 'Hood';
  // Inside vehicle body bounds (60–300 x, 80–580 y)
  if(x>=60&&x<=300&&y>=80&&y<=580){
    if(y<=140) return 'Hood';
    if(y>=495) return y>=545?'TrunkInside':'Trunk';
    if(x<=112) return 'DriverDoor';
    if(x>=248) return 'PassengerDoor';
    return 'Cabin';
  }
  if(inStadium(x,y,300)) return 'Approach';
  if(inStadium(x,y,340)) return 'RfRange';
  return 'OutOfRange';
}

function DeviceChip({device, pos, dimmed, onPointerDown}){
  const {type,label,color,paired}=device;
  const {x,y}=pos;
  const op=dimmed?0.22:0.92;
  const shape=type==='fob'
    ?<rect x={x-11} y={y-7} width={22} height={14} rx={3} fill={color} opacity={op}/>
    :type==='phone'
    ?<rect x={x-6} y={y-10} width={12} height={20} rx={2} fill={color} opacity={op}/>
    :<circle cx={x} cy={y} r={9} fill={color} opacity={op}/>;
  return <g style={{cursor:onPointerDown&&!dimmed?'grab':'default'}}
    onPointerDown={onPointerDown&&!dimmed?onPointerDown:undefined}>
    {!dimmed&&<circle cx={x} cy={y} r={20} fill={color} opacity={0.06}/>}
    {shape}
    <text x={x} y={y+4} textAnchor="middle" fill="#000" fontSize="8" fontFamily="Share Tech Mono" fontWeight="700">{label}</text>
    {!paired&&<text x={x+13} y={y-9} fill="#F04040" fontSize="13" fontWeight="bold">!</text>}
  </g>;
}

function CombinedView({s,set,onDeviceSelect}){
  const svgRef=useRef(null);
  const [drag,setDrag]=useState(null);
  // drag={key,type,label,color,paired,isNfc,x,y,ox,oy}

  // Build device list
  const allDevices=[];
  for(let i=1;i<=6;i++){
    allDevices.push({key:`Body.PEPS.Plant.KeyFob.${i}.Zone`,type:'fob',label:`F${i}`,
      zone:s[`Body.PEPS.Plant.KeyFob.${i}.Zone`]||'OutOfRange',
      paired:i<=4,color:i<=4?'#F59E0B':'#F04040'});
  }
  for(let i=1;i<=2;i++){
    allDevices.push({key:`Body.PEPS.Plant.BlePhone.${i}.Zone`,type:'phone',label:`P${i}`,
      zone:s[`Body.PEPS.Plant.BlePhone.${i}.Zone`]||'OutOfRange',paired:true,color:'#4A9EF5'});
  }
  for(let i=1;i<=2;i++){
    const pos=s[`Body.PEPS.Plant.NfcCard.${i}.Position`]||'NotPresent';
    const zone=pos==='DriverHandle'?'DriverDoor':pos==='PushButton'?'Cabin':'OutOfRange';
    allDevices.push({key:`Body.PEPS.Plant.NfcCard.${i}.Position`,type:'nfc',label:`N${i}`,
      zone,paired:true,color:'#0DC8C8',isNfc:true,nfcPos:pos});
  }

  // Group by zone for position indexing
  const byZone={};
  allDevices.forEach(d=>{
    if(!byZone[d.zone])byZone[d.zone]=[];
    byZone[d.zone].push(d);
  });

  function svgCoords(e){
    const svg=svgRef.current;
    if(!svg)return{x:0,y:0};
    const ctm=svg.getScreenCTM();
    if(!ctm)return{x:0,y:0};
    const pt=svg.createSVGPoint();
    pt.x=e.clientX;pt.y=e.clientY;
    const r=pt.matrixTransform(ctm.inverse());
    return{x:r.x,y:r.y};
  }

  function startDrag(e,device){
    e.preventDefault();
    const {x,y}=svgCoords(e);
    setDrag({...device,x,y,ox:x,oy:y});
  }

  function onMove(e){
    if(!drag)return;
    const {x,y}=svgCoords(e);
    setDrag(d=>({...d,x,y}));
  }

  function onDrop(e){
    if(!drag)return;
    const {x,y}=svgCoords(e);
    const dist=Math.hypot(x-drag.ox, y-drag.oy);
    // Tap (< 8 SVG units) on a fob or phone → select it in the device panel
    if(dist<8 && (drag.type==='fob'||drag.type==='phone') && drag.paired){
      const mFob=drag.key.match(/KeyFob\.(\d+)/);
      const mPh=drag.key.match(/BlePhone\.(\d+)/);
      if(mFob) onDeviceSelect({type:'fob',  index:parseInt(mFob[1])});
      if(mPh)  onDeviceSelect({type:'phone',index:parseInt(mPh[1])});
      setDrag(null);
      return;
    }
    const zone=hitTestZone(x,y);
    if(drag.isNfc){
      const nfcPos=zone==='DriverDoor'?'DriverHandle':zone==='Cabin'?'PushButton':'NotPresent';
      set(drag.key,nfcPos);
    } else {
      set(drag.key,zone);
    }
    setDrag(null);
  }

  const dropZone=drag?hitTestZone(drag.x,drag.y):null;

  // Existing top-view signals
  const lo=s['Body.Lights.Beam.Low.IsOn'],hi=s['Body.Lights.Beam.High.IsOn'];
  const drl=s['Body.Lights.Running.IsOn'],park=s['Body.Lights.Parking.IsOn'];
  const ffog=s['Body.Lights.Fog.Front.IsOn'],rfog=s['Body.Lights.Fog.Rear.IsOn'];
  const brake=s['Body.Lights.Brake.IsActive'],back=s['Body.Lights.Backup.IsActive'];
  const lp=s['Body.Lights.LicensePlate.IsOn'];
  const lLamp=s['Body.Lights.DirectionIndicator.Left.Lamp.Front.IsOn'];
  const rLamp=s['Body.Lights.DirectionIndicator.Right.Lamp.Front.IsOn'];
  const bothCmded=s['Body.Lights.Hazard.IsSignaling']||(s['Body.Lights.DirectionIndicator.Left.IsSignaling']&&s['Body.Lights.DirectionIndicator.Right.IsSignaling']);
  const li=lLamp, ri=bothCmded?lLamp:rLamp;
  const hlc=hi?'#FFFFFF':lo?'#FCD34D':drl?'#C0C8D0':park?'#FEF3C7':'#0A1420';
  const hlo=hi?.95:lo?.85:drl?.45:park?.2:.04;
  const tlc=brake?'#FF2222':lo||hi||park?'#EF4444':'#1A0808';
  const tlo=brake?.95:lo||hi||park?.75:.08;
  const rlc=back?'#FFFFFF':'#1A1A2A';
  const hood=s['Body.Hood.IsOpen'],trunk=s['Body.Trunk.IsOpen'];
  const mlf=s['Body.Mirror.Left.IsFolded'],mrf=s['Body.Mirror.Right.IsFolded'];
  const wf=s['Body.Windshield.Front.Wiping.Mode']!=='OFF';
  // Exterior puddle lamps — driven by Welcome (and future Farewell /
  // PerimeterAlarm) via the courtesy arbiter.  Rendered as soft blue
  // ovals projected on the ground outboard of each side mirror.
  const puddleL=s['Body.Lights.Puddle.Left.IsOn'];
  const puddleR=s['Body.Lights.Puddle.Right.IsOn'];
  // Interior dome / overhead courtesy lamp — claimed by Welcome via
  // the courtesy arbiter.  Rendered as a soft warm glow over the
  // front-cabin headliner area in the top view.
  const dome=s['Cabin.Lights.IsDomeOn'];

  const doorsData=[
    {pfx:'Body.Doors.Row1.Left',  open:s['Body.Doors.Row1.Left.IsOpen'],  cx:85,cy:207,dx:-65,rx:60, ry:125,rw:50,rh:165,handleSide:'left'},
    {pfx:'Body.Doors.Row1.Right', open:s['Body.Doors.Row1.Right.IsOpen'], cx:275,cy:207,dx:65, rx:250,ry:125,rw:50,rh:165,handleSide:'right'},
    {pfx:'Body.Doors.Row2.Left',  open:s['Body.Doors.Row2.Left.IsOpen'],  cx:85,cy:362,dx:-65,rx:60, ry:295,rw:50,rh:135,handleSide:'left'},
    {pfx:'Body.Doors.Row2.Right', open:s['Body.Doors.Row2.Right.IsOpen'], cx:275,cy:362,dx:65, rx:250,ry:295,rw:50,rh:135,handleSide:'right'},
  ];

  const spokes=(cx,cy,r1,r2)=>[0,51.4,102.8,154.3,205.7,257.1,308.6].map(a=>{
    const rad=a*Math.PI/180;
    return <line key={a} x1={cx+r1*Math.cos(rad)} y1={cy+r1*Math.sin(rad)}
      x2={cx+r2*Math.cos(rad)} y2={cy+r2*Math.sin(rad)} stroke="#252E3C" strokeWidth="2" strokeLinecap="round"/>;
  });

  // Zone label positions
  const ZONE_LABELS=[
    // Labels at top-right corner of each stadium (just inside the rounded cap)
    {zone:'RfRange',    x:VCX+140, y:VCY-425, color:'#4A9EF5'},
    {zone:'Approach',   x:VCX+110, y:VCY-385, color:'#F59E0B'},
    {zone:'OutOfRange', x:-150,    y:755,      color:'#2E3E55'},
  ];

  return <svg ref={svgRef}
    viewBox="-220 -200 800 1020"
    style={{maxHeight:'70vh',height:'100%',userSelect:'none',touchAction:'none',cursor:drag?'grabbing':'default'}}
    onPointerMove={onMove}
    onPointerUp={onDrop}
    onPointerLeave={()=>setDrag(null)}>

    {/* Background grid */}
    <defs>
      <pattern id="cg" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0a1420" strokeWidth="0.5"/>
      </pattern>
      <filter id="backupGlow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      {/* Top-view fog lamp beam — short wide cone, blue-white */}
      <linearGradient id="fogBeamTop" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%"   stopColor="#BAD6FE" stopOpacity="0.60"/>
        <stop offset="100%" stopColor="#BAD6FE" stopOpacity="0"/>
      </linearGradient>
      {/* Top-view headlamp beam — bright at headlight, fades forward */}
      <linearGradient id="headBeamTop" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%"   stopColor="#FCD34D" stopOpacity="0.55"/>
        <stop offset="60%"  stopColor="#FCD34D" stopOpacity="0.12"/>
        <stop offset="100%" stopColor="#FCD34D" stopOpacity="0"/>
      </linearGradient>
    </defs>
    <rect x="-220" y="-200" width="800" height="1020" fill="url(#cg)" opacity="0.07"/>

    {/* OutOfRange tray — positioned BELOW the vehicle, just outside
        the RfRange stadium's rear cap (which now ends at y≈705).
        Devices dragged here are released from the vehicle's PEPS
        zones entirely. */}
    <rect x="-215" y="730" width="790" height="50"
      fill={dropZone==='OutOfRange'?'rgba(46,62,85,0.25)':'none'}
      stroke={dropZone==='OutOfRange'?'#4A9EF5':'#2E3E55'} strokeWidth={dropZone==='OutOfRange'?1.5:1}
      strokeDasharray="5,3" rx="4"/>
    <text x="-180" y="760" fill={dropZone==='OutOfRange'?'#4A9EF5':'#2E3E55'} fontSize="9" fontFamily="Share Tech Mono" fontWeight="600">OUT OF RANGE — drag here to remove from vehicle</text>

    {/* RF Range stadium — halfW=340, straightH=100, centred at (VCX, VCY=265)
         rect: x=VCX-340, y=VCY-100-340, width=680, height=880, rx=340.
         Vertical extent y=-175..705 — enclosing the lengthened
         vehicle (hood front y=-50 to liftgate y=580) with ~125 px
         margin top/bottom. */}
    <rect x={VCX-340} y={VCY-100-340} width={680} height={880} rx={340}
      fill={dropZone==='RfRange'?'rgba(74,158,245,0.07)':'none'}
      stroke="#4A9EF5" strokeWidth={dropZone==='RfRange'?2:1}
      opacity={dropZone==='RfRange'?0.6:0.2} strokeDasharray="8,4"/>
    <text x={VCX+140} y={VCY-100-340+20} fill="#4A9EF5" fontSize="9" fontFamily="Share Tech Mono" opacity={dropZone==='RfRange'?0.8:0.4}>RF RANGE</text>

    {/* Approach stadium — halfW=300, straightH=100, centred at (VCX, VCY).
         40 px gap from RfRange both horizontally and vertically so
         the two boundaries stay clearly distinct. */}
    <rect x={VCX-300} y={VCY-100-300} width={600} height={800} rx={300}
      fill={dropZone==='Approach'?'rgba(245,158,11,0.07)':'none'}
      stroke="#F59E0B" strokeWidth={dropZone==='Approach'?2:1}
      opacity={dropZone==='Approach'?0.6:0.2} strokeDasharray="5,3"/>
    <text x={VCX+110} y={VCY-100-300+20} fill="#F59E0B" fontSize="9" fontFamily="Share Tech Mono" opacity={dropZone==='Approach'?0.8:0.4}>APPROACH</text>

    {/* ── Vehicle top view ── */}
    {/* Headlamp beam cones — fan forward from each headlight in top
        view.  Shifted up 80 px (headlight at y=-35) to track the
        lengthened hood. */}
    {(drl||lo||hi)&&<>
      <path d={hi
        ? "M 78,-35 L 25,-175 L 148,-175 Z"
        : lo
        ? "M 78,-35 L 12,-132 L 158,-132 Z"
        : "M 78,-35 L 42,-78 L 122,-78 Z"}
        fill="url(#headBeamTop)" opacity={hi?0.58:lo?0.40:0.16}/>
      <path d={hi
        ? "M 282,-35 L 212,-175 L 335,-175 Z"
        : lo
        ? "M 282,-35 L 202,-132 L 348,-132 Z"
        : "M 282,-35 L 238,-78 L 318,-78 Z"}
        fill="url(#headBeamTop)" opacity={hi?0.58:lo?0.40:0.16}/>
    </>}

    {/* SUV body */}
    <rect x="60" y="80" width="240" height="480" rx="8" fill="#0C1825" stroke="#1A2838" strokeWidth="1"/>
    <line x1="60" y1="150" x2="300" y2="150" stroke="#182030" strokeWidth="1" opacity=".6"/>
    <line x1="60" y1="290" x2="300" y2="290" stroke="#182030" strokeWidth="1" opacity=".6"/>
    <line x1="60" y1="430" x2="300" y2="430" stroke="#182030" strokeWidth="1" opacity=".6"/>

    {/* Front section / hood — extended forward so the hood length
        (~130 px from y=-50 to y=80) matches the trunk length, giving
        the side-mirror positions visual sense at the A-pillar /
        beltline junction.  All front-fascia lamps shift up by 80 px
        to stay anchored at the front bumper. */}
    <rect x="60" y="-50" width="240" height="130" fill="#0D1628" stroke="#1A2838" strokeWidth="1" rx="4"/>
    {hood&&<rect x="70" y="-45" width="220" height="8" fill="#F59E0B" opacity=".4"/>}
    <rect x="70" y="-40" width="220" height="120" fill="#09111E" stroke="#182030" strokeWidth="0.5"/>

    {/* Headlights */}
    <g><title>{`Left headlight — ${hi?'HIGH BEAM':lo?'LOW BEAM':drl?'DRL':park?'PARKING':'off'}`}</title>
      <rect x="70" y="-35" width="30" height="28" rx="3" fill={hlc} opacity={hlo/1.5}/>
      <text x="85" y="-15" textAnchor="middle" fill={hlc} fontSize="10" fontWeight="bold" opacity={hlo}>{lo?'●':'○'}</text>
    </g>
    <g><title>{`Right headlight — ${hi?'HIGH BEAM':lo?'LOW BEAM':drl?'DRL':park?'PARKING':'off'}`}</title>
      <rect x="260" y="-35" width="30" height="28" rx="3" fill={hlc} opacity={hlo/1.5}/>
      <text x="275" y="-15" textAnchor="middle" fill={hlc} fontSize="10" fontWeight="bold" opacity={hlo}>{lo?'●':'○'}</text>
    </g>

    {/* Turn indicators front — outboard of the headlights at the
        bumper corners. */}
    <rect x="65" y="-5" width="32" height="10" rx="2" fill={li?'#F59E0B':'#1A1208'} opacity={li?1:.25}>
      <title>{li?'Left front turn indicator — signaling':'Left front turn indicator — off'}</title>
    </rect>
    <rect x="263" y="-5" width="32" height="10" rx="2" fill={ri?'#F59E0B':'#1A1208'} opacity={ri?1:.25}>
      <title>{ri?'Right front turn indicator — signaling':'Right front turn indicator — off'}</title>
    </rect>

    {/* Front fog — indicator strip centred inside each headlight assembly (well clear of edges) */}
    <rect x="78" y="-30" width="6" height="20" rx="2" fill={ffog?'#BAD6FE':'#0A1828'} opacity={ffog?0.90:.30}>
      <title>{ffog?'Left front fog lamp — on':'Left front fog lamp — off'}</title>
    </rect>
    <rect x="272" y="-30" width="6" height="20" rx="2" fill={ffog?'#BAD6FE':'#0A1828'} opacity={ffog?0.90:.30}>
      <title>{ffog?'Right front fog lamp — on':'Right front fog lamp — off'}</title>
    </rect>
    {/* Front fog beams — short wide cones projecting forward, apex at fog strip centre */}
    {ffog&&<>
      <path d="M 81,-30 L 10,-98 L 152,-98 Z" fill="url(#fogBeamTop)" opacity="0.72"/>
      <path d="M 275,-30 L 204,-98 L 346,-98 Z" fill="url(#fogBeamTop)" opacity="0.72"/>
    </>}

    {/* Parking corners front */}
    <circle cx="65" cy="-45" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.9:.3}>
      <title>{park?'Left front parking light — on':'Left front parking light — off'}</title>
    </circle>
    <circle cx="295" cy="-45" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.9:.3}>
      <title>{park?'Right front parking light — on':'Right front parking light — off'}</title>
    </circle>

    {/* Windshield */}
    <rect x="70" y="78" width="220" height="45" rx="3" fill="#152840" stroke="#1E3650" strokeWidth="0.5" opacity=".85"/>
    {wf&&<text x="180" y="103" textAnchor="middle" fill="#4A9EF5" fontSize="9" className="blinks">〰〰</text>}

    {/* Door zones — highlight drop target */}
    {['DriverDoor','PassengerDoor','Hood','Trunk','TrunkInside','Cabin'].map(z=>{
      if(dropZone!==z) return null;
      const rects={
        DriverDoor:   {x:60, y:125,w:55,h:305},
        PassengerDoor:{x:245,y:125,w:55,h:305},
        Hood:         {x:60, y:-50,w:240,h:130},
        Trunk:        {x:60, y:480,w:240,h:100},
        TrunkInside:  {x:65, y:440,w:230,h:100},
        Cabin:        {x:115,y:125,w:130,h:305},
      }[z];
      if(!rects) return null;
      return <rect key={z} x={rects.x} y={rects.y} width={rects.w} height={rects.h}
        fill="rgba(16,217,138,0.1)" stroke="#10D98A" strokeWidth="1.5" rx="3" opacity="0.7"/>;
    })}

    {/* Doors */}
    {doorsData.map(({pfx,open,cx,cy,dx,rx,ry,rw,rh,handleSide})=>{
      const locked=s[pfx+'.IsLocked'];
      const dblLock=s[pfx+'.IsDoubleLocked'];
      const latched=s[pfx+'.Latch.IsLatched'];
      const inPulled=s[pfx+'.Handle.Inside.IsPulled'];
      const outPulled=s[pfx+'.Handle.Outside.IsPulled'];
      const childLock=s[pfx+'.IsChildLockActive'];
      const isLeft=handleSide==='left';
      const isRow2=pfx.includes('Row2');
      const hInX=isLeft?rx+rw-10:rx+4;
      const hOutX=isLeft?rx+4:rx+rw-10;
      // Inside handle stays near the middle of the door panel
      // (where a seated occupant naturally reaches).
      const hInY=ry+Math.floor(rh*0.45);
      // Outside handle is near the door's trailing edge (B-pillar
      // for front doors, C-pillar for rear doors) — that's where
      // it lives on real production vehicles.
      const hOutY=ry+Math.floor(rh*0.82);
      // Soldier sill-pin: narrow vertical rect on inner window-sill edge
      // dblLock takes priority over locked in colour
      const soldW=4, soldH=16;
      const soldX=isLeft?rx+rw-soldW-1:rx+1;
      const soldY=ry+Math.floor(rh*0.18);
      const lockFill=dblLock?'#581C87':locked?'#7F1D1D':'#1A3A28';
      const lockStroke=dblLock?'#A855F7':locked?'#EF4444':'#22C55E';
      // Child-lock indicator position (inner-edge, bottom quarter of door)
      const clX=isLeft?rx+rw-7:rx+7;
      const clY=ry+Math.floor(rh*0.82);
      return <g key={pfx}>
        {/* Door body — purely visual (fill + stroke).  Clicks are
            handled by an explicit transparent click-catcher below
            so we don't have to fight pointer-events propagation
            through stacked rects. */}
        <rect x={rx} y={ry} width={rw} height={rh}
          fill="#0E1825"
          stroke={open?'#F59E0B':dblLock?'rgba(168,85,247,0.5)':locked?'rgba(239,68,68,0.4)':'#1A2838'}
          strokeWidth={open?2:locked||dblLock?1.5:1} rx="2"
          style={{pointerEvents:'none'}}/>
        <rect x={rx+2} y={ry+2} width={rw-4} height={rh-4} fill="#08111f"
          style={{pointerEvents:'none'}}/>
        {open&&<>
          <path d={`M ${cx+dx*0.2},${cy} L ${cx+dx},${cy}`}
            stroke="#F59E0B" strokeWidth="2" opacity=".6" strokeDasharray="3,2"
            style={{pointerEvents:'none'}}/>
          <text x={cx} y={ry+rh+12} textAnchor="middle"
            fill="#F59E0B" fontSize="6" fontWeight="bold"
            style={{pointerEvents:'none'}}>▣ TAP</text>
        </>}
        {/* Click-catcher — covers the entire door body.  Renders
            BEFORE the handle hit-areas / soldier pin so those are
            on top and capture their own events first.  This rect
            is the close-door affordance: clicking anywhere on the
            door (except on a handle / soldier) fires CloseCmd while
            the door is open.  When the door is closed, the rect is
            inert so handle hit-areas / soldier pin still work. */}
        <rect x={rx} y={ry} width={rw} height={rh} rx="2"
          fill="transparent" pointerEvents={open?'all':'none'}
          style={{cursor:open?'pointer':'default'}}
          onClick={open?()=>set(pfx+'.CloseCmd',true):undefined}>
          {open && <title>Door is open · click anywhere on the door body to close</title>}
        </rect>
        {/* Outer handle — physically pullable in any state.  When the
            door is locked the pull won't open the door (plant model
            decides), but it still triggers PassiveEntry auth, so the
            HMI must let the user pull regardless of lock state.  A
            small red 🔒 badge above the handle warns "won't open"
            when locked.  When open, click to close. */}
        {/* Outer handle.  The visible rect is small (6×8 px); to make
            press-and-hold reliable in spite of mouse jitter, an
            invisible padded hit-area rect (16×18 px) absorbs the
            pointer events on top.  `pointer-events:visible` on the
            invisible rect ensures it still registers clicks despite
            having `fill: transparent`. */}
        <g>
          <rect x={hOutX} y={hOutY-4} width="6" height="8" rx="1"
            fill={open?'#0DC8C8':outPulled?'#7DD3FC':'#1E4060'}
            stroke={open?'#5EEAD4':outPulled?'#FFFFFF':'#2A5070'}
            strokeWidth={outPulled?'0.9':'0.5'}
            style={{pointerEvents:'none'}}/>
          {/* Pulled-state glow indicator — sits next to the visual
              handle when held.  Pointer-events:none so it doesn't
              steal the hit area. */}
          {outPulled && (
            <rect x={isLeft?hOutX-3:hOutX+7} y={hOutY-4} width="2" height="8"
              rx="1" fill="#7DD3FC" opacity="0.85"
              style={{pointerEvents:'none'}}/>
          )}
          {!open && (locked || dblLock) && (
            <text x={hOutX+3} y={hOutY-6} textAnchor="middle"
              fill={dblLock?'#FCA5A5':'#F87171'} fontSize="6" fontWeight="bold"
              style={{pointerEvents:'none'}}>🔒</text>
          )}
          {/* Invisible hit area — much larger than the visual handle
              so press-and-hold survives mouse jitter (essential for the
              PassiveEntry challenge-response window of ~80 ms). */}
          {/* Hit-area is unconditional press-and-hold.  Do NOT register
              onClick here — when a press-and-hold opens the door
              mid-press (PassiveEntry), the trailing click event would
              otherwise fire CloseCmd and immediately re-close the
              just-opened door.  To close an open door, click the
              door body itself (it carries the "▣ TAP" close hint). */}
          <rect x={hOutX-5} y={hOutY-9} width="16" height="18" rx="2"
            fill="transparent" pointerEvents="all"
            style={{cursor:'pointer'}}
            onMouseDown={()=>set(pfx+'.Handle.Outside.IsPulled',true)}
            onMouseUp={()=>set(pfx+'.Handle.Outside.IsPulled',false)}
            onMouseLeave={()=>set(pfx+'.Handle.Outside.IsPulled',false)}>
            <title>{open?'Outside handle — door is open · click door body to close':dblLock?'Outside handle — door is double-locked; pull will not open':locked?'Outside handle — door is locked; pull will not open (PassiveEntry may unlock if a paired device is in proximity zone)':'Outside handle — hold to pull open'}</title>
          </rect>
        </g>
        {/* Inner handle — same padded-hit-area approach. */}
        <g>
          <rect x={hInX} y={hInY-4} width="6" height="8" rx="1"
            fill={open?'#0DC8C8':inPulled?'#6EE7B7':'#1E3A28'}
            stroke={open?'#5EEAD4':inPulled?'#FFFFFF':'#2A5040'}
            strokeWidth={inPulled?'0.9':'0.5'}
            style={{pointerEvents:'none'}}/>
          {inPulled && (
            <rect x={isLeft?hInX+7:hInX-3} y={hInY-4} width="2" height="8"
              rx="1" fill="#6EE7B7" opacity="0.85"
              style={{pointerEvents:'none'}}/>
          )}
          {!open && dblLock && (
            <text x={hInX+3} y={hInY-6} textAnchor="middle"
              fill="#FCA5A5" fontSize="6" fontWeight="bold"
              style={{pointerEvents:'none'}}>🔒</text>
          )}
          <rect x={hInX-5} y={hInY-9} width="16" height="18" rx="2"
            fill="transparent" pointerEvents="all"
            style={{cursor:'pointer'}}
            onMouseDown={()=>set(pfx+'.Handle.Inside.IsPulled',true)}
            onMouseUp={()=>set(pfx+'.Handle.Inside.IsPulled',false)}
            onMouseLeave={()=>set(pfx+'.Handle.Inside.IsPulled',false)}>
            <title>{open?'Inside handle — door is open · click door body to close':dblLock?'Inside handle — double-locked; interior linkage physically disconnected, pull will not open':'Inside handle — hold to pull open'}</title>
          </rect>
        </g>
        {/* Soldier sill-pin — vertical rect, inner window-sill edge */}
        <rect x={soldX} y={soldY} width={soldW} height={soldH} rx="1"
          fill={lockFill} stroke={lockStroke} strokeWidth="0.8"
          style={{cursor:dblLock?'not-allowed':'pointer'}}
          onClick={dblLock?undefined:()=>set(pfx+'.Soldier.IsUnlocked',locked)}>
          <title>{dblLock?'Sill pin — double-locked, release via RKE first':locked?'Sill pin — locked · click to unlock':'Sill pin — unlocked · click to lock'}</title>
        </rect>
        {/* Latch indicator — leading edge of door.  Decorative only —
            pointer-events:none so it doesn't absorb clicks meant for
            the close-door body. */}
        <rect x={isLeft?rx:rx+rw-3} y={ry+Math.floor(rh*0.6)} width="3" height="6" rx="1"
          fill={latched?'#22C55E':'#F59E0B'} opacity="0.8"
          pointerEvents="none"/>
        {/* Child lock indicator — inner edge, lower portion, Row 2 + when active */}
        {childLock&&<g style={{cursor:'default'}}>
          <circle cx={clX} cy={clY} r="4.5" fill="rgba(168,85,247,0.18)" stroke="#A855F7" strokeWidth="0.8"/>
          <text x={clX} y={clY+3.5} textAnchor="middle" fill="#A855F7" fontSize="6" fontWeight="bold">C</text>
        </g>}
      </g>;
    })}

    {/* Cargo / trunk area */}
    <rect x="60" y="440" width="240" height="120"
      fill="#070E18" stroke={trunk?'#F59E0B':'#182030'} strokeWidth={trunk?2:1} rx="2"
      style={{cursor:trunk?'pointer':'default'}}
      onClick={trunk?()=>set('Body.Trunk.CloseCmd',true):undefined}/>
    {trunk&&<rect x="70" y="560" width="220" height="8" fill="#F59E0B" opacity=".5"/>}
    <rect x="60" y="560" width="240" height="20" fill="#0E1828" stroke="#1A2535" strokeWidth=".5" rx="2"
      style={{cursor:trunk?'pointer':'default'}}
      onClick={trunk?()=>set('Body.Trunk.CloseCmd',true):undefined}/>
    <circle cx="180" cy="466" r="3.5" fill={s['Body.Trunk.IsLocked']?'#7F1D1D':'#1A3A28'}
      stroke={s['Body.Trunk.IsLocked']?'#EF4444':'#22C55E'} strokeWidth="0.8"/>
    {trunk&&<text x="180" y="625" textAnchor="middle" fill="#F59E0B" fontSize="6" fontWeight="bold">▣ TAP TRUNK</text>}

    {/* License plate */}
    <rect x="160" y="575" width="40" height="8" rx="2" fill={lp?'#FFF8DC':'#0A0F18'} opacity={lp?0.85:.25}>
      <title>{lp?'License plate lamp — on':'License plate lamp — off'}</title>
    </rect>

    {/* Taillights — narrowed to 26 px to leave room for backup lamp beside each */}
    <rect x="70"  y="568" width="26" height="10" rx="2" fill={tlc} opacity={tlo}>
      <title>{brake?'Left taillight — brake active':lo||hi||park?'Left taillight — tail on':'Left taillight — off'}</title>
    </rect>
    <rect x="264" y="568" width="26" height="10" rx="2" fill={tlc} opacity={tlo}>
      <title>{brake?'Right taillight — brake active':lo||hi||park?'Right taillight — tail on':'Right taillight — off'}</title>
    </rect>
    {/* Backup / reverse lights — in taillight band, inboard of taillights */}
    <g opacity={back?1:0.8} filter={back?'url(#backupGlow)':undefined}>
      <title>{back?'Left backup / reverse light — ACTIVE (reversing)':'Left backup / reverse light — off'}</title>
      <rect x="97" y="567" width="24" height="12" rx="2"
        fill={back?'#F0F8FF':'#2A4A6A'} stroke={back?'#FFFFFF':'#4A7AA0'} strokeWidth="1.2"/>
      <text x="109" y="576" textAnchor="middle" fontSize="6" fontWeight="bold"
        fill={back?'#001830':'#7AB0D0'} fontFamily="monospace">R</text>
    </g>
    <g opacity={back?1:0.8} filter={back?'url(#backupGlow)':undefined}>
      <title>{back?'Right backup / reverse light — ACTIVE (reversing)':'Right backup / reverse light — off'}</title>
      <rect x="239" y="567" width="24" height="12" rx="2"
        fill={back?'#F0F8FF':'#2A4A6A'} stroke={back?'#FFFFFF':'#4A7AA0'} strokeWidth="1.2"/>
      <text x="251" y="576" textAnchor="middle" fontSize="6" fontWeight="bold"
        fill={back?'#001830':'#7AB0D0'} fontFamily="monospace">R</text>
    </g>

    {/* Rear turn */}
    <rect x="65"  y="580" width="32" height="8" rx="2" fill={li?'#F59E0B':'#1A1208'} opacity={li?1:.25}>
      <title>{li?'Left rear turn indicator — signaling':'Left rear turn indicator — off'}</title>
    </rect>
    <rect x="263" y="580" width="32" height="8" rx="2" fill={ri?'#F59E0B':'#1A1208'} opacity={ri?1:.25}>
      <title>{ri?'Right rear turn indicator — signaling':'Right rear turn indicator — off'}</title>
    </rect>

    {/* Rear fog */}
    <rect x="120" y="568" width="20" height="10" rx="2" fill={rfog?'#CC0000':'#1A0808'} opacity={rfog?0.9:.25}>
      <title>{rfog?'Left rear fog lamp — on':'Left rear fog lamp — off'}</title>
    </rect>
    <rect x="220" y="568" width="20" height="10" rx="2" fill={rfog?'#CC0000':'#1A0808'} opacity={rfog?0.9:.25}>
      <title>{rfog?'Right rear fog lamp — on':'Right rear fog lamp — off'}</title>
    </rect>

    {/* Parking corners rear */}
    <circle cx="65"  cy="595" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.9:.3}>
      <title>{park?'Left rear parking light — on':'Left rear parking light — off'}</title>
    </circle>
    <circle cx="295" cy="595" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.9:.3}>
      <title>{park?'Right rear parking light — on':'Right rear parking light — off'}</title>
    </circle>


    {/* Exterior puddle lamps — under-mirror courtesy lamps that
        project a pool of light onto the ground outboard of each
        front door.  Driven by the Welcome feature on PEPS approach
        entry.  Rendered as soft blue ovals offset outward from the
        mirror centres so they read as ground projection. */}
    <defs>
      <radialGradient id="puddleGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stopColor="#7CC8FF" stopOpacity="0.85"/>
        <stop offset="60%" stopColor="#3D85C6" stopOpacity="0.45"/>
        <stop offset="100%" stopColor="#3D85C6" stopOpacity="0"/>
      </radialGradient>
    </defs>
    {puddleL && (
      <g>
        <title>Left puddle lamp — on</title>
        <ellipse cx="24" cy="210" rx="20" ry="12" fill="url(#puddleGlow)"/>
        <ellipse cx="24" cy="210" rx="6" ry="3" fill="#BAD6FE" opacity="0.95"/>
      </g>
    )}
    {puddleR && (
      <g>
        <title>Right puddle lamp — on</title>
        <ellipse cx="336" cy="210" rx="20" ry="12" fill="url(#puddleGlow)"/>
        <ellipse cx="336" cy="210" rx="6" ry="3" fill="#BAD6FE" opacity="0.95"/>
      </g>
    )}

    {/* Interior dome / overhead courtesy lamp — claimed by Welcome
        on PEPS approach (and by manual switch).  Rendered as a warm
        amber glow over the front-cabin headliner area, centered
        between the two front seats. */}
    <defs>
      <radialGradient id="domeGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stopColor="#FFF6C8" stopOpacity="1"/>
        <stop offset="40%" stopColor="#FCD34D" stopOpacity="0.85"/>
        <stop offset="80%" stopColor="#F59E0B" stopOpacity="0.35"/>
        <stop offset="100%" stopColor="#F59E0B" stopOpacity="0"/>
      </radialGradient>
    </defs>
    {dome && (
      <g style={{pointerEvents:'none'}}>
        <title>Dome / overhead courtesy lamp — on</title>
        <ellipse cx="180" cy="240" rx="48" ry="32" fill="url(#domeGlow)"/>
        <rect x="172" y="234" width="16" height="10" rx="2" fill="#FFF3C4" stroke="#B45309" strokeWidth="0.6" opacity="0.98"/>
      </g>
    )}

    {/* Mirrors — top view (elongated housing + trailing-edge turn
        indicator).  Fold pivots at the housing's inboard-rearward
        corner — (54, 206) for left, (306, 206) for right.  This
        keeps the entire rotation arc strictly outboard of the body
        skin (x ≤ 60 left / x ≥ 300 right) at every interpolated
        angle, matching the way real fold motors swing the housing
        rearward against the door without the mirror appearing to
        cross through the cabin. */}
    <g transform={mlf?'rotate(-60 54 206)':undefined} style={{transition:'transform 0.6s ease'}}>
      <title>{mlf?'Left side mirror — folded':'Left side mirror'}</title>
      <rect x="38" y="194" width="16" height="12" rx="2" fill="#0F1A28" stroke="#1A2838" strokeWidth="0.5"/>
      <rect x="38" y="198" width="5" height="6" rx="1" fill={li?'#F59E0B':'#1A1208'} opacity={(mlf?0:1)*(li?0.95:.28)}>
        <title>{li?'Left mirror turn indicator — signaling':'Left mirror turn indicator — off'}</title>
      </rect>
    </g>
    <g transform={mrf?'rotate(60 306 206)':undefined} style={{transition:'transform 0.6s ease'}}>
      <title>{mrf?'Right side mirror — folded':'Right side mirror'}</title>
      <rect x="306" y="194" width="16" height="12" rx="2" fill="#0F1A28" stroke="#1A2838" strokeWidth="0.5"/>
      <rect x="317" y="198" width="5" height="6" rx="1" fill={ri?'#F59E0B':'#1A1208'} opacity={(mrf?0:1)*(ri?0.95:.28)}>
        <title>{ri?'Right mirror turn indicator — signaling':'Right mirror turn indicator — off'}</title>
      </rect>
    </g>
    {s['Body.Mirror.Left.IsHeatingOn']&&<circle cx="46" cy="200" r="10" fill="none" stroke="#FF4040" strokeWidth="1" opacity=".6" className="pulse"><title>Left mirror heating — active</title></circle>}
    {s['Body.Mirror.Right.IsHeatingOn']&&<circle cx="314" cy="200" r="10" fill="none" stroke="#FF4040" strokeWidth="1" opacity=".6" className="pulse"><title>Right mirror heating — active</title></circle>}

    <text x="180" y="-58" textAnchor="middle" fill="#1E2C3C" fontSize="8" fontFamily="Share Tech Mono" fontWeight="bold">▲ FRONT</text>
    <text x="180" y="605" textAnchor="middle" fill="#1E2C3C" fontSize="8" fontFamily="Share Tech Mono" fontWeight="bold">REAR ▼</text>

    {/* ── PEPS Device icons ── */}
    {allDevices.map(device=>{
      const group=byZone[device.zone]||[];
      const idx=group.indexOf(device);
      const pos=getDevicePos(device.zone,idx,group.length);
      const isDragging=drag&&drag.key===device.key;
      return <g key={device.key}>
        {/* Icon at zone position — dimmed while dragging */}
        <DeviceChip device={device} pos={pos} dimmed={!!isDragging}
          onPointerDown={(e)=>startDrag(e,device)}/>
      </g>;
    })}

    {/* Drag ghost follows pointer */}
    {drag&&<DeviceChip device={drag} pos={{x:drag.x,y:drag.y}} dimmed={false}/>}

    {/* Legend — below the OutOfRange tray (which is at y=730..780). */}
    <g transform="translate(-175,800)">
      <rect x={0} y={-4} width={18} height={11} rx={3} fill="#F59E0B" opacity={.85}/>
      <text x={22} y={5} fill="#6B7E99" fontSize="9" fontFamily="Share Tech Mono">Fob</text>
      <rect x={62} y={-7} width={10} height={17} rx={2} fill="#4A9EF5" opacity={.85}/>
      <text x={76} y={5} fill="#6B7E99" fontSize="9" fontFamily="Share Tech Mono">Phone</text>
      <circle cx={138} cy={1} r={8} fill="#0DC8C8" opacity={.85}/>
      <text x={150} y={5} fill="#6B7E99" fontSize="9" fontFamily="Share Tech Mono">NFC</text>
      <rect x={210} y={-4} width={18} height={11} rx={3} fill="#F04040" opacity={.85}/>
      <text x={212} y={1} fill="#000" fontSize="8" fontWeight="bold">!</text>
      <text x={232} y={5} fill="#F04040" fontSize="9" fontFamily="Share Tech Mono">Unpaired</text>
      <text x={330} y={5} fill="#2E3E55" fontSize="9" fontFamily="Share Tech Mono">— drag fobs/phones/NFC to zones</text>
    </g>
  </svg>;
}

/* ══════ SIDE VIEW ══════ */
function SideView({s,set}){
  const [flipped,setFlipped]=React.useState(false);
  // "◁ LEFT SIDE" = viewing from the left = seeing the RIGHT side doors (and vice-versa)
  const side=flipped?'Right':'Left';
  const lo=s['Body.Lights.Beam.Low.IsOn'],hi=s['Body.Lights.Beam.High.IsOn'];
  const drl=s['Body.Lights.Running.IsOn'],park=s['Body.Lights.Parking.IsOn'];
  // Turn indicator — track the side that is currently visible
  const li=s[`Body.Lights.DirectionIndicator.${side}.Lamp.Front.IsOn`];
  const ffog=s['Body.Lights.Fog.Front.IsOn'],rfog=s['Body.Lights.Fog.Rear.IsOn'];
  const brake=s['Body.Lights.Brake.IsActive'],back=s['Body.Lights.Backup.IsActive'];
  const lp=s['Body.Lights.LicensePlate.IsOn'];
  // Door signals — read from the visible side
  const r1pfx=`Body.Doors.Row1.${side}`, r2pfx=`Body.Doors.Row2.${side}`;
  const d1=s[r1pfx+'.IsOpen'], d2=s[r2pfx+'.IsOpen'];
  const r1locked=s[r1pfx+'.IsLocked'], r1dbl=s[r1pfx+'.IsDoubleLocked'];
  const r2locked=s[r2pfx+'.IsLocked'], r2dbl=s[r2pfx+'.IsDoubleLocked'];
  const r1pulled=s[r1pfx+'.Handle.Outside.IsPulled'];
  const r2pulled=s[r2pfx+'.Handle.Outside.IsPulled'];
  const hood=s['Body.Hood.IsOpen'],trunk=s['Body.Trunk.IsOpen'];
  const wf=s['Body.Windshield.Front.Wiping.Mode']!=='OFF';
  const sr=s['Body.Sunroof.Position'];
  // Mirror — read from the visible side
  const mlf=s[`Body.Mirror.${side}.IsFolded`];
  const mheat=s[`Body.Mirror.${side}.IsHeatingOn`];
  // Puddle lamp on the visible side — Welcome / Farewell drive these
  // via the puddle arbiter.  Rendered as a soft cone projecting down
  // from the mirror housing onto the ground.
  const puddleSide=s[`Body.Lights.Puddle.${side}.IsOn`];
  const hlc=hi?'#FFF':lo?'#FCD34D':drl?'#C0C8D0':park?'#FEF3C7':'#0A1420';
  const hlo=hi?.95:lo?.85:drl?.45:park?.2:.06;
  const tlc=brake?'#FF2222':lo||hi||park?'#EF4444':'#1A0808';
  const tlo=brake?.95:lo||hi||park?.75:.1;
  const spokes=(cx,cy)=>[0,51.4,102.8,154.3,205.7,257.1,308.6].map(a=>{
    const r=a*Math.PI/180;
    return <line key={a} x1={cx+16*Math.cos(r)} y1={cy+16*Math.sin(r)} x2={cx+31*Math.cos(r)} y2={cy+31*Math.sin(r)} stroke="#1E2A3C" strokeWidth="2.5" strokeLinecap="round"/>;
  });
  const front=flipped?'REAR':'FRONT', rear=flipped?'FRONT':'REAR';
  return <div style={{position:'relative',width:'100%',maxWidth:'1000px'}}>
    {/* FRONT / REAR labels — outside the SVG so they stay readable when flipped */}
    <span style={{position:'absolute',bottom:'12%',left:'3%',color:'#16243A',fontSize:11,fontFamily:'Share Tech Mono',fontWeight:700,pointerEvents:'none',zIndex:1}}>{front}</span>
    <span style={{position:'absolute',bottom:'12%',right:'3%',color:'#16243A',fontSize:11,fontFamily:'Share Tech Mono',fontWeight:700,pointerEvents:'none',zIndex:1}}>{rear}</span>
    {/* Flip toggle */}
    <button onClick={()=>setFlipped(f=>!f)}
      style={{position:'absolute',top:6,right:8,zIndex:2,background:'#0C1825',border:'1px solid #2A4468',color:'#4A9EF5',padding:'3px 10px',borderRadius:4,cursor:'pointer',fontSize:9,fontFamily:'Share Tech Mono',letterSpacing:'0.05em'}}>
      {flipped?'◁ LEFT SIDE':'RIGHT SIDE ▷'}
    </button>
  <svg viewBox="-80 0 1080 450" style={{width:'100%',display:'block',transform:flipped?'scaleX(-1)':'none'}}>
    <defs>
      <filter id="backupGlowSide" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      {/* Fog lamp beam — bright at source, fades toward road */}
      <linearGradient id="fogBeamGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stopColor="#BAD6FE" stopOpacity="0.65"/>
        <stop offset="100%" stopColor="#BAD6FE" stopOpacity="0"/>
      </linearGradient>
      {/* Headlamp beam — bright at source, fades to transparent at far end */}
      <linearGradient id="beamGradSide" x1="1" y1="0" x2="0" y2="0">
        <stop offset="0%"   stopColor="#FCD34D" stopOpacity="0.55"/>
        <stop offset="60%"  stopColor="#FCD34D" stopOpacity="0.12"/>
        <stop offset="100%" stopColor="#FCD34D" stopOpacity="0"/>

    </defs>
    {/* Ground shadow line */}
    <line x1="20" y1="400" x2="980" y2="400" stroke="#182030" strokeWidth="2" opacity=".5"/>

    {/* ── Main body silhouette — SUV/crossover profile ──────────────────────
         Key points:
           Front bumper:   (88,395)–(82,372)–(87,338)
           Front fascia:   (87,310)–(120,265)–(150,248)
           Hood flat:      (150,248)–(268,228)
           A-pillar:       (268,228)–(355,108)
           Roof:           (370,104)–(775,104)
           C-pillar:       (775,104)–(845,128)–(878,218)

    <path d="M 88,395 L 82,372 L 87,310 L 120,265 L 150,248 L 268,228

    {/* ── Front door panel & open status ── */}

    {d1&&<text x="497" y="322" textAnchor="middle" fill="#F59E0B" fontSize="8" fontWeight="bold">DOOR OPEN</text>}

    {/* ── Rear door panel & open status ── */}
    <rect x="589" y="233" width="183" height="157" fill="#0C1825"

    {/* ── Door handles — always pullable.  When the door is locked the

    {/* Handles sit near the trailing edge of each door panel — front

        panel spans 430→565 (135 wide) and rear-door panel spans

        of the trailing edge. */}
    {[
      {pfx:r1pfx, x:520, open:d1, locked:r1locked, dbl:r1dbl, pulled:r1pulled, label:'Row 1'},
      {pfx:r2pfx, x:723, open:d2, locked:r2locked, dbl:r2dbl, pulled:r2pulled, label:'Row 2'},
    ].map(({pfx,x,open,locked,dbl,pulled,label})=>{
      const tip=open?`${label} outside handle — door is open`
               :dbl ?`${label} outside handle — door is double-locked; pull will not open`

               :pulled?`${label} outside handle — pulling…`

      const hfill=pulled?'#4A9EF5':'#1E3250';

        {/* Hit target stays in fixed position — a translate transform
            would push the rect out from under the cursor and trigger

            plus a small "pulled" indicator chip beside the handle. */}
        <g fill={hfill} stroke={hstroke} strokeWidth={pulled?'1.2':'0.8'}
          style={{cursor:'pointer'}}
          onMouseDown={()=>set(pfx+'.Handle.Outside.IsPulled',true)}
          onMouseUp={()=>set(pfx+'.Handle.Outside.IsPulled',false)}
          onMouseLeave={()=>set(pfx+'.Handle.Outside.IsPulled',false)}>
          <title>{tip}</title>

          <rect x={x+40} y="277" width="3" height="7" rx="1"

    {/* ── Headlight — visible on front fascia in side profile ── */}

      <ellipse cx="102" cy="298" rx="4" ry="11" fill={hlc} opacity={hlo*1.4}

          ? "M 100,293 L -45,260 L -45,336 L 100,303 Z"

        opacity={hi?0.55:lo?0.38:0.16}

    {/* ── Front turn indicator ── */}
    <rect x="84" y="322" width="20" height="11" rx="2" fill={li?'#F59E0B':'#1A1208'} opacity={li?0.95:.25}>

    {/* ── Front fog lamp ── */}
    {ffog&&<rect x="84" y="337" width="20" height="10" rx="2" fill="#BAD6FE" opacity=".88">

    {/* Front fog beam — wide flat cone straight down to road */}
    {ffog&&<path d="M 88,347 L -18,400 L 128,400 Z" fill="url(#fogBeamGrad)" opacity="0.55"/>}

    {/* ── Rear taillight — on vertical rear face ── */}
    <ellipse cx="913" cy="318" rx="6" ry="22" fill={tlc} opacity={tlo}>
      <title>{brake?'Taillight — brake active':lo||hi||park?'Taillight — tail on':'Taillight — off'}</title>
    </ellipse>

    {/* ── Rear turn indicator ── */}
    <rect x="907" y="344" width="20" height="11" rx="2" fill={li?'#F59E0B':'#1A1208'} opacity={li?0.95:.25}>
      <title>{li?'Rear turn indicator — signaling':'Rear turn indicator — off'}</title>
    </rect>

    {/* ── Rear fog lamp ── */}
    {rfog&&<rect x="907" y="358" width="20" height="10" rx="2" fill="#EF2020" opacity=".88">
      <title>Rear fog lamp — on</title>
    </rect>}
    {/* Rear fog beam — wide flat cone straight down to road (red tint) */}
    {rfog&&<path d="M 917,368 L 882,400 L 1005,400 Z" fill="#EF2020" opacity="0.18"/>}

    {/* ── Backup / reverse light ── */}
    <g opacity={back?1:0.8} filter={back?'url(#backupGlowSide)':undefined}>
      <title>{back?'Backup / reverse light — ACTIVE (reversing)':'Backup / reverse light — off'}</title>
      <rect x="906" y="371" width="26" height="12" rx="2"
        fill={back?'#F0F8FF':'#2A4A6A'} stroke={back?'#FFFFFF':'#4A7AA0'} strokeWidth="1.2"/>
      <text x="919" y="381" textAnchor="middle" fontSize="6" fontWeight="bold"
        fill={back?'#001830':'#7AB0D0'} fontFamily="monospace">REV</text>

        <title>{li?'Mirror turn indicator — signaling':'Mirror turn indicator — off'}</title>
      </rect>
    </g>
    {mheat&&<circle cx="238" cy="215" r="14" fill="none" stroke="#FF4040" strokeWidth="1.2" opacity=".7" className="pulse">
      <title>Mirror heating — active</title>

    {/* ── Puddle lamp beam — projects down from mirror housing onto

         this side.  Trapezoid for the beam cone + bright pool ellipse
         at ground level. ── */}
    <defs>
      <linearGradient id="puddleBeamSide" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stopColor="#BAD6FE" stopOpacity="0.55"/>
        <stop offset="60%" stopColor="#7CC8FF" stopOpacity="0.30"/>
        <stop offset="100%" stopColor="#3D85C6" stopOpacity="0.05"/>
      </linearGradient>
      <radialGradient id="puddleGroundSide" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stopColor="#BAD6FE" stopOpacity="0.85"/>
        <stop offset="60%" stopColor="#3D85C6" stopOpacity="0.40"/>
        <stop offset="100%" stopColor="#3D85C6" stopOpacity="0"/>
      </radialGradient>
    </defs>
    {puddleSide && !mlf && (
      <g style={{pointerEvents:'none'}}>
        <title>{side} puddle lamp — on</title>
        {/* Beam cone: narrow at mirror underside (~238, 222),
            spreading to a ~80 px pool at ground level (y≈445). */}
        <path d="M 230,224 L 200,448 L 276,448 L 246,224 Z"
          fill="url(#puddleBeamSide)"/>
        {/* Bright ground pool */}
        <ellipse cx="238" cy="448" rx="38" ry="6" fill="url(#puddleGroundSide)"/>
        <ellipse cx="238" cy="448" rx="10" ry="2" fill="#E0EEFF" opacity="0.85"/>
      </g>
    )}

    {/* ── Wheels ── */}
    <circle cx="180" cy="400" r="55" fill="#07101A" stroke="#161E2C" strokeWidth="2.2"/>
    <circle cx="180" cy="400" r="42" fill="#0D1520"/>
    <circle cx="180" cy="400" r="28" fill="#111820" stroke="#202C3C" strokeWidth="1"/>

    <circle cx="800" cy="400" r="55" fill="#07101A" stroke="#161E2C" strokeWidth="2.2"/>
    <circle cx="800" cy="400" r="42" fill="#0D1520"/>
    <circle cx="800" cy="400" r="28" fill="#111820" stroke="#202C3C" strokeWidth="1"/>
    <circle cx="800" cy="400" r="10" fill="#08101A"/>{spokes(800,400)}

    {/* ── Parking corner lights ── */}
    <circle cx="96" cy="342" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.85:.3}>
      <title>{park?'Front parking light — on':'Front parking light — off'}</title>
    </circle>
    <circle cx="917" cy="360" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.85:.3}>
      <title>{park?'Rear parking light — on':'Rear parking light — off'}</title>
    </circle>

    {/* ── Wiper animation — blades sweep across windshield ── */}
    {wf&&<g className="blinks">
      <path d="M 348,108 L 310,200" stroke="#4A9EF5" strokeWidth="2" strokeLinecap="round" opacity=".75"/>
      <path d="M 416,108 L 390,200" stroke="#4A9EF5" strokeWidth="2" strokeLinecap="round" opacity=".75"/>
    </g>}

    {/* ── Sunroof (slides open from center toward rear) ── */}
    {sr>0&&<rect x={460+sr*1.8} y="104" width={110*(sr/100)} height="12" fill="#0A1828" stroke="#0DC8C8" strokeWidth="1.2" opacity={sr/100*0.8} rx="2"/>}

  </svg>
  </div>;
}

/* ══════ COCKPIT VIEW ══════ */
function CockpitView({s,set}){
  const lo=s['Body.Lights.Beam.Low.IsOn'],hi=s['Body.Lights.Beam.High.IsOn'];
  const lLamp=s['Body.Lights.DirectionIndicator.Left.Lamp.Front.IsOn'];
  const rLamp=s['Body.Lights.DirectionIndicator.Right.Lamp.Front.IsOn'];
  const bothCmded=s['Body.Lights.Hazard.IsSignaling']||(s['Body.Lights.DirectionIndicator.Left.IsSignaling']&&s['Body.Lights.DirectionIndicator.Right.IsSignaling']);
  const li=lLamp,ri=bothCmded?lLamp:rLamp;
  const doorAjar=['Body.Doors.Row1.Left.IsOpen','Body.Doors.Row1.Right.IsOpen','Body.Doors.Row2.Left.IsOpen','Body.Doors.Row2.Right.IsOpen'].some(k=>s[k]);
  const ffog=s['Body.Lights.Fog.Front.IsOn'],rfog=s['Body.Lights.Fog.Rear.IsOn'];
  const brake=s['Body.Lights.Brake.IsActive'];
  const ac=s['Cabin.HVAC.IsAirConditioningActive'];
  const defF=s['Cabin.HVAC.IsFrontDefrosterActive'],defR=s['Cabin.HVAC.IsRearDefrosterActive'];
  const recirc=s['Cabin.HVAC.IsRecirculationActive'];
  const dT=s['Cabin.HVAC.Station.Row1.Left.Temperature']??22;
