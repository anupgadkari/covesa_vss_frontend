      <path d="M 275,-30 L 204,-98 L 346,-98 Z" fill="url(#fogBeamTop)" opacity="0.72"/>
    </>}

    {/* Parking corners front */}
    <circle cx="65" cy="-45" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.9:.3}>
      <title>{park?'Left front parking light — on':'Left front parking light — off'}</title>
    </circle>
    <circle cx="295" cy="-45" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.9:.3}>
      <title>{park?'Right front parking light — on':'Right front parking light — off'}</title>
    </circle>

    {/* Windshield */}
    <rect x="70" y="78" width="220" height="45" rx="3" fill="#152840" stroke="#1E3650" strokeWidth="0.5" opacity=".85"/>
    {wf&&<text x="180" y="103" textAnchor="middle" fill="#4A9EF5" fontSize="9" className="blinks">〰〰</text>}

    {/* Doors */}
    {doorsData.map(({pfx,open,cx,cy,dx,rx,ry,rw,rh,handleSide})=>{
      const locked=s[pfx+'.IsLocked'];
      const dblLock=s[pfx+'.IsDoubleLocked'];
      const latched=s[pfx+'.Latch.IsLatched'];
      const inPulled=s[pfx+'.Handle.Inside.IsPulled'];
      const outPulled=s[pfx+'.Handle.Outside.IsPulled'];
      const childLock=s[pfx+'.IsChildLockActive'];
      const isLeft=handleSide==='left';
      const isRow2=pfx.includes('Row2');
      const hInX=isLeft?rx+rw-10:rx+4;
      const hOutX=isLeft?rx+4:rx+rw-10;
      // Inside handle stays near the middle of the door panel
      // (where a seated occupant naturally reaches).
      const hInY=ry+Math.floor(rh*0.45);
      // Outside handle is near the door's trailing edge (B-pillar
      // for front doors, C-pillar for rear doors) — that's where
      // it lives on real production vehicles.
      const hOutY=ry+Math.floor(rh*0.82);
      // Soldier sill-pin: narrow vertical rect on inner window-sill edge
      // dblLock takes priority over locked in colour
      const soldW=4, soldH=16;
      const soldX=isLeft?rx+rw-soldW-1:rx+1;
      const soldY=ry+Math.floor(rh*0.18);
      const lockFill=dblLock?'#581C87':locked?'#7F1D1D':'#1A3A28';
      const lockStroke=dblLock?'#A855F7':locked?'#EF4444':'#22C55E';
      // Child-lock indicator position (inner-edge, bottom quarter of door)
      const clX=isLeft?rx+rw-7:rx+7;
      const clY=ry+Math.floor(rh*0.82);
      return <g key={pfx}>
        {/* Door body — purely visual (fill + stroke).  Clicks are
            handled by an explicit transparent click-catcher below
            so we don't have to fight pointer-events propagation
            through stacked rects. */}
        <rect x={rx} y={ry} width={rw} height={rh}
          fill="#0E1825"
          stroke={open?'#F59E0B':dblLock?'rgba(168,85,247,0.5)':locked?'rgba(239,68,68,0.4)':'#1A2838'}
          strokeWidth={open?2:locked||dblLock?1.5:1} rx="2"
          style={{pointerEvents:'none'}}/>
        <rect x={rx+2} y={ry+2} width={rw-4} height={rh-4} fill="#08111f"
          style={{pointerEvents:'none'}}/>
        {open&&<>
          <path d={`M ${cx+dx*0.2},${cy} L ${cx+dx},${cy}`}
            stroke="#F59E0B" strokeWidth="2" opacity=".6" strokeDasharray="3,2"
            style={{pointerEvents:'none'}}/>
          <text x={cx} y={ry+rh+12} textAnchor="middle"
            fill="#F59E0B" fontSize="6" fontWeight="bold"
            style={{pointerEvents:'none'}}>▣ TAP</text>
        </>}
        {/* Click-catcher — covers the entire door body.  Renders
            BEFORE the handle hit-areas / soldier pin so those are
            on top and capture their own events first.  This rect
            is the close-door affordance: clicking anywhere on the
            door (except on a handle / soldier) fires CloseCmd while
            the door is open.  When the door is closed, the rect is
            inert so handle hit-areas / soldier pin still work. */}
        <rect x={rx} y={ry} width={rw} height={rh} rx="2"
          fill="transparent" pointerEvents={open?'all':'none'}
          style={{cursor:open?'pointer':'default'}}
          onClick={open?()=>set(pfx+'.CloseCmd',true):undefined}>
          {open && <title>Door is open · click anywhere on the door body to close</title>}
        </rect>
        {/* Outer handle — physically pullable in any state.  When the
            door is locked the pull won't open the door (plant model
            decides), but it still triggers PassiveEntry auth, so the
            HMI must let the user pull regardless of lock state.  A
            small red 🔒 badge above the handle warns "won't open"
            when locked.  When open, click to close. */}
        {/* Outer handle.  The visible rect is small (6×8 px); to make
            press-and-hold reliable in spite of mouse jitter, an
            invisible padded hit-area rect (16×18 px) absorbs the
            pointer events on top.  `pointer-events:visible` on the
            invisible rect ensures it still registers clicks despite
            having `fill: transparent`. */}
        <g>
          <rect x={hOutX} y={hOutY-4} width="6" height="8" rx="1"
            fill={open?'#0DC8C8':outPulled?'#7DD3FC':'#1E4060'}
            stroke={open?'#5EEAD4':outPulled?'#FFFFFF':'#2A5070'}
            strokeWidth={outPulled?'0.9':'0.5'}
            style={{pointerEvents:'none'}}/>
          {/* Pulled-state glow indicator — sits next to the visual
              handle when held.  Pointer-events:none so it doesn't
              steal the hit area. */}
          {outPulled && (
            <rect x={isLeft?hOutX-3:hOutX+7} y={hOutY-4} width="2" height="8"
              rx="1" fill="#7DD3FC" opacity="0.85"
              style={{pointerEvents:'none'}}/>
          )}
          {!open && (locked || dblLock) && (
            <text x={hOutX+3} y={hOutY-6} textAnchor="middle"
              fill={dblLock?'#FCA5A5':'#F87171'} fontSize="6" fontWeight="bold"
              style={{pointerEvents:'none'}}>🔒</text>
          )}
          {/* Invisible hit area — much larger than the visual handle
              so press-and-hold survives mouse jitter (essential for the
              PassiveEntry challenge-response window of ~80 ms). */}
          {/* Hit-area is unconditional press-and-hold.  Do NOT register
              onClick here — when a press-and-hold opens the door
              mid-press (PassiveEntry), the trailing click event would
              otherwise fire CloseCmd and immediately re-close the
              just-opened door.  To close an open door, click the
              door body itself (it carries the "▣ TAP" close hint). */}
          <rect x={hOutX-5} y={hOutY-9} width="16" height="18" rx="2"
            fill="transparent" pointerEvents="all"
            style={{cursor:'pointer'}}
            onMouseDown={()=>set(pfx+'.Handle.Outside.IsPulled',true)}
            onMouseUp={()=>set(pfx+'.Handle.Outside.IsPulled',false)}
            onMouseLeave={()=>set(pfx+'.Handle.Outside.IsPulled',false)}>
            <title>{open?'Outside handle — door is open · click door body to close':dblLock?'Outside handle — door is double-locked; pull will not open':locked?'Outside handle — door is locked; pull will not open (PassiveEntry may unlock if a paired device is in proximity zone)':'Outside handle — hold to pull open'}</title>
          </rect>
        </g>
        {/* Inner handle — same padded-hit-area approach. */}
        <g>
          <rect x={hInX} y={hInY-4} width="6" height="8" rx="1"
            fill={open?'#0DC8C8':inPulled?'#6EE7B7':'#1E3A28'}
            stroke={open?'#5EEAD4':inPulled?'#FFFFFF':'#2A5040'}
            strokeWidth={inPulled?'0.9':'0.5'}
            style={{pointerEvents:'none'}}/>
          {inPulled && (
            <rect x={isLeft?hInX+7:hInX-3} y={hInY-4} width="2" height="8"
              rx="1" fill="#6EE7B7" opacity="0.85"
              style={{pointerEvents:'none'}}/>
          )}
          {!open && dblLock && (
            <text x={hInX+3} y={hInY-6} textAnchor="middle"
              fill="#FCA5A5" fontSize="6" fontWeight="bold"
              style={{pointerEvents:'none'}}>🔒</text>
          )}
          <rect x={hInX-5} y={hInY-9} width="16" height="18" rx="2"
            fill="transparent" pointerEvents="all"
            style={{cursor:'pointer'}}
            onMouseDown={()=>set(pfx+'.Handle.Inside.IsPulled',true)}
            onMouseUp={()=>set(pfx+'.Handle.Inside.IsPulled',false)}
            onMouseLeave={()=>set(pfx+'.Handle.Inside.IsPulled',false)}>
            <title>{open?'Inside handle — door is open · click door body to close':dblLock?'Inside handle — double-locked; interior linkage physically disconnected, pull will not open':'Inside handle — hold to pull open'}</title>
          </rect>
        </g>
        {/* Soldier sill-pin — vertical rect, inner window-sill edge */}
        <rect x={soldX} y={soldY} width={soldW} height={soldH} rx="1"
          fill={lockFill} stroke={lockStroke} strokeWidth="0.8"
          style={{cursor:dblLock?'not-allowed':'pointer'}}
          onClick={dblLock?undefined:()=>set(pfx+'.Soldier.IsUnlocked',locked)}>
          <title>{dblLock?'Sill pin — double-locked, release via RKE first':locked?'Sill pin — locked · click to unlock':'Sill pin — unlocked · click to lock'}</title>
        </rect>
        {/* Latch indicator — leading edge of door.  Decorative only —
            pointer-events:none so it doesn't absorb clicks meant for
            the close-door body. */}
        <rect x={isLeft?rx:rx+rw-3} y={ry+Math.floor(rh*0.6)} width="3" height="6" rx="1"
          fill={latched?'#22C55E':'#F59E0B'} opacity="0.8"
          pointerEvents="none"/>
        {/* Child lock indicator — inner edge, lower portion, Row 2 + when active */}
        {childLock&&<g style={{cursor:'default'}}>
          <circle cx={clX} cy={clY} r="4.5" fill="rgba(168,85,247,0.18)" stroke="#A855F7" strokeWidth="0.8"/>
          <text x={clX} y={clY+3.5} textAnchor="middle" fill="#A855F7" fontSize="6" fontWeight="bold">C</text>
        </g>}
      </g>;
    })}

    {/* Cargo / trunk area */}
    <rect x="60" y="440" width="240" height="120"
      fill="#070E18" stroke={trunk?'#F59E0B':'#182030'} strokeWidth={trunk?2:1} rx="2"
      style={{cursor:trunk?'pointer':'default'}}
      onClick={trunk?()=>set('Body.Trunk.CloseCmd',true):undefined}/>
    {trunk&&<rect x="70" y="560" width="220" height="8" fill="#F59E0B" opacity=".5"/>}
    <rect x="60" y="560" width="240" height="20" fill="#0E1828" stroke="#1A2535" strokeWidth=".5" rx="2"
      style={{cursor:trunk?'pointer':'default'}}
      onClick={trunk?()=>set('Body.Trunk.CloseCmd',true):undefined}/>
    {/* Exterior trunk-button enabled indicator.  Green = pressing the
        button right now would open the trunk (cabin unlocked OR a
        paired fob is in the Trunk zone, AND valet is off).  Red =
        press would be silently denied by the bridge.  Tooltip
        explains why. */}
    <circle cx="180" cy="466" r="3.5"
      fill={trunkBtnEnabled?'#1A3A28':'#3A1818'}
      stroke={trunkBtnEnabled?'#22C55E':'#F87171'} strokeWidth="0.8">
      <title>{
        trunkBtnValet
          ? 'Trunk button — DENIED (valet mode active)'
          : trunkBtnEnabled
            ? (trunkBtnUnlocked
                ? 'Trunk button — enabled (cabin unlocked, direct open)'
                : 'Trunk button — enabled (paired fob in Trunk zone, will authenticate)')
            : (trunkBtnLocked
                ? 'Trunk button — disabled (cabin locked, no paired fob in Trunk zone)'
                : 'Trunk button — disabled (lock status unknown)')
      }</title>
    </circle>
    {trunk&&<text x="180" y="625" textAnchor="middle" fill="#F59E0B" fontSize="6" fontWeight="bold">▣ TAP TRUNK</text>}

    {/* License plate */}
    <rect x="160" y="575" width="40" height="8" rx="2" fill={lp?'#FFF8DC':'#0A0F18'} opacity={lp?0.85:.25}>
      <title>{lp?'License plate lamp — on':'License plate lamp — off'}</title>
    </rect>

    {/* Exterior trunk-release button — capacitive pad just above the
        licence plate.  Mousedown publishes Body.Trunk.ExteriorButton.IsPressed=true,
        mouseup/leave publishes false.  The bridge-side ExteriorTrunkButton
        feature decides what to do (direct pulse if cabin unlocked,
        deferral to PassiveEntry if locked, silent deny if valet active). */}
    <g opacity={trunkBtnEnabled?1:0.55}>
      <rect x="172" y="566" width="16" height="6" rx="1.5"
        fill={s['Body.Trunk.ExteriorButton.IsPressed']?'#0DC8C8':'#1E2D40'}
        stroke={s['Body.Trunk.ExteriorButton.IsPressed']?'#5EEAD4':(trunkBtnEnabled?'#3A5570':'#5A2A2A')}
        strokeWidth="0.6"
        style={{pointerEvents:'none'}}/>
      <text x="180" y="570.5" textAnchor="middle"
        fill={s['Body.Trunk.ExteriorButton.IsPressed']?'#021A1A':(trunkBtnEnabled?'#7BB3D9':'#9A6060')}
        fontSize="3" fontWeight="bold"
        style={{pointerEvents:'none'}}>OPEN</text>
      <rect x="170" y="563" width="20" height="11" rx="2"
        fill="transparent" pointerEvents="all"
        style={{cursor:'pointer'}}
        onMouseDown={()=>set('Body.Trunk.ExteriorButton.IsPressed',true)}
        onMouseUp={()=>set('Body.Trunk.ExteriorButton.IsPressed',false)}
        onMouseLeave={()=>set('Body.Trunk.ExteriorButton.IsPressed',false)}>
        <title>{
          trunkBtnValet
            ? 'Trunk button — DENIED (valet mode active)'
            : trunkBtnEnabled
              ? (trunkBtnUnlocked
                  ? 'Trunk button — press to open (cabin unlocked, direct)'
                  : 'Trunk button — press to open (paired fob in Trunk zone, auth)')
              : 'Trunk button — press will be denied (cabin locked, no fob in Trunk zone)'
        }</title>
      </rect>
    </g>

    {/* Taillights — narrowed to 26 px to leave room for backup lamp beside each */}
    <rect x="70"  y="568" width="26" height="10" rx="2" fill={tlc} opacity={tlo}>
      <title>{brake?'Left taillight — brake active':lo||hi||park?'Left taillight — tail on':'Left taillight — off'}</title>
    </rect>
    <rect x="264" y="568" width="26" height="10" rx="2" fill={tlc} opacity={tlo}>
      <title>{brake?'Right taillight — brake active':lo||hi||park?'Right taillight — tail on':'Right taillight — off'}</title>
    </rect>
    {/* Backup / reverse lights — in taillight band, inboard of taillights */}
    <g opacity={back?1:0.8} filter={back?'url(#backupGlow)':undefined}>
      <title>{back?'Left backup / reverse light — ACTIVE (reversing)':'Left backup / reverse light — off'}</title>
      <rect x="97" y="567" width="24" height="12" rx="2"
        fill={back?'#F0F8FF':'#2A4A6A'} stroke={back?'#FFFFFF':'#4A7AA0'} strokeWidth="1.2"/>
      <text x="109" y="576" textAnchor="middle" fontSize="6" fontWeight="bold"
        fill={back?'#001830':'#7AB0D0'} fontFamily="monospace">R</text>
    </g>
    <g opacity={back?1:0.8} filter={back?'url(#backupGlow)':undefined}>
      <title>{back?'Right backup / reverse light — ACTIVE (reversing)':'Right backup / reverse light — off'}</title>
      <rect x="239" y="567" width="24" height="12" rx="2"
        fill={back?'#F0F8FF':'#2A4A6A'} stroke={back?'#FFFFFF':'#4A7AA0'} strokeWidth="1.2"/>
      <text x="251" y="576" textAnchor="middle" fontSize="6" fontWeight="bold"
        fill={back?'#001830':'#7AB0D0'} fontFamily="monospace">R</text>
    </g>

    {/* Rear turn */}
    <rect x="65"  y="580" width="32" height="8" rx="2" fill={li?'#F59E0B':'#1A1208'} opacity={li?1:.25}>
      <title>{li?'Left rear turn indicator — signaling':'Left rear turn indicator — off'}</title>
    </rect>
    <rect x="263" y="580" width="32" height="8" rx="2" fill={ri?'#F59E0B':'#1A1208'} opacity={ri?1:.25}>
      <title>{ri?'Right rear turn indicator — signaling':'Right rear turn indicator — off'}</title>
    </rect>

    {/* Rear fog */}
    <rect x="120" y="568" width="20" height="10" rx="2" fill={rfog?'#CC0000':'#1A0808'} opacity={rfog?0.9:.25}>
      <title>{rfog?'Left rear fog lamp — on':'Left rear fog lamp — off'}</title>
    </rect>
    <rect x="220" y="568" width="20" height="10" rx="2" fill={rfog?'#CC0000':'#1A0808'} opacity={rfog?0.9:.25}>
      <title>{rfog?'Right rear fog lamp — on':'Right rear fog lamp — off'}</title>
    </rect>

    {/* Parking corners rear */}
    <circle cx="65"  cy="595" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.9:.3}>
      <title>{park?'Left rear parking light — on':'Left rear parking light — off'}</title>
    </circle>
    <circle cx="295" cy="595" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.9:.3}>
      <title>{park?'Right rear parking light — on':'Right rear parking light — off'}</title>
    </circle>


    {/* Exterior puddle lamps — under-mirror courtesy lamps that
        project a pool of light onto the ground outboard of each
        front door.  Driven by the Welcome feature on PEPS approach
        entry.  Rendered as soft blue ovals offset outward from the
        mirror centres so they read as ground projection. */}
    <defs>
      <radialGradient id="puddleGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stopColor="#7CC8FF" stopOpacity="0.85"/>
        <stop offset="60%" stopColor="#3D85C6" stopOpacity="0.45"/>
        <stop offset="100%" stopColor="#3D85C6" stopOpacity="0"/>
      </radialGradient>
    </defs>
    {puddleL && (
      <g>
        <title>Left puddle lamp — on</title>
        <ellipse cx="24" cy="210" rx="20" ry="12" fill="url(#puddleGlow)"/>
        <ellipse cx="24" cy="210" rx="6" ry="3" fill="#BAD6FE" opacity="0.95"/>
      </g>
    )}
    {puddleR && (
      <g>
        <title>Right puddle lamp — on</title>
        <ellipse cx="336" cy="210" rx="20" ry="12" fill="url(#puddleGlow)"/>
        <ellipse cx="336" cy="210" rx="6" ry="3" fill="#BAD6FE" opacity="0.95"/>
      </g>
    )}

    {/* Interior dome / overhead courtesy lamp — claimed by Welcome
        on PEPS approach (and by manual switch).  Rendered as a warm
        amber glow over the front-cabin headliner area, centered
        between the two front seats. */}
    <defs>
      <radialGradient id="domeGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stopColor="#FFF6C8" stopOpacity="1"/>
        <stop offset="40%" stopColor="#FCD34D" stopOpacity="0.85"/>
        <stop offset="80%" stopColor="#F59E0B" stopOpacity="0.35"/>
        <stop offset="100%" stopColor="#F59E0B" stopOpacity="0"/>
      </radialGradient>
    </defs>
    {dome && (
      <g style={{pointerEvents:'none'}}>
        <title>Dome / overhead courtesy lamp — on</title>
        <ellipse cx="180" cy="240" rx="48" ry="32" fill="url(#domeGlow)"/>
        <rect x="172" y="234" width="16" height="10" rx="2" fill="#FFF3C4" stroke="#B45309" strokeWidth="0.6" opacity="0.98"/>
      </g>
    )}

    {/* Mirrors — top view (elongated housing + trailing-edge turn
        indicator).  Fold pivots at the housing's inboard-rearward
        corner — (54, 206) for left, (306, 206) for right.  This
        keeps the entire rotation arc strictly outboard of the body
        skin (x ≤ 60 left / x ≥ 300 right) at every interpolated
        angle, matching the way real fold motors swing the housing
        rearward against the door without the mirror appearing to
        cross through the cabin. */}
    <g transform={mlf?'rotate(-60 54 206)':undefined} style={{transition:'transform 0.6s ease'}}>
      <title>{mlf?'Left side mirror — folded':'Left side mirror'}</title>
      <rect x="38" y="194" width="16" height="12" rx="2" fill="#0F1A28" stroke="#1A2838" strokeWidth="0.5"/>
      <rect x="38" y="198" width="5" height="6" rx="1" fill={li?'#F59E0B':'#1A1208'} opacity={(mlf?0:1)*(li?0.95:.28)}>
        <title>{li?'Left mirror turn indicator — signaling':'Left mirror turn indicator — off'}</title>
      </rect>
    </g>
    <g transform={mrf?'rotate(60 306 206)':undefined} style={{transition:'transform 0.6s ease'}}>
      <title>{mrf?'Right side mirror — folded':'Right side mirror'}</title>
      <rect x="306" y="194" width="16" height="12" rx="2" fill="#0F1A28" stroke="#1A2838" strokeWidth="0.5"/>
      <rect x="317" y="198" width="5" height="6" rx="1" fill={ri?'#F59E0B':'#1A1208'} opacity={(mrf?0:1)*(ri?0.95:.28)}>
        <title>{ri?'Right mirror turn indicator — signaling':'Right mirror turn indicator — off'}</title>
      </rect>
    </g>
    {s['Body.Mirror.Left.IsHeatingOn']&&<circle cx="46" cy="200" r="10" fill="none" stroke="#FF4040" strokeWidth="1" opacity=".6" className="pulse"><title>Left mirror heating — active</title></circle>}
    {s['Body.Mirror.Right.IsHeatingOn']&&<circle cx="314" cy="200" r="10" fill="none" stroke="#FF4040" strokeWidth="1" opacity=".6" className="pulse"><title>Right mirror heating — active</title></circle>}

    <text x="180" y="-58" textAnchor="middle" fill="#1E2C3C" fontSize="8" fontFamily="Share Tech Mono" fontWeight="bold">▲ FRONT</text>
    <text x="180" y="605" textAnchor="middle" fill="#1E2C3C" fontSize="8" fontFamily="Share Tech Mono" fontWeight="bold">REAR ▼</text>

    {/* Drop-zone highlight — drawn AFTER all vehicle bodywork so
        zones whose slab sits inside the body (Cabin, TrunkInside) are
        visible instead of being covered by the door / cargo fills.
        Uses pointer-events:none so it doesn't intercept drag. */}
    {['LeftFront','RightFront','Hood','Trunk','TrunkInside','Cabin'].map(z=>{
      if(dropZone!==z) return null;
      const rects={
        // Outboard side slabs — chips park at x=32 / x=328.
        LeftFront:   {x:5,  y:125,w:55, h:305},
        RightFront:{x:300,y:125,w:55, h:305},
        // Hood / Trunk slabs sit OUTSIDE the vehicle body — Hood ahead
        // of the front bumper (chip parks at y=-66), Trunk behind the
        // rear bumper (chip parks at y=600).
        Hood:         {x:60, y:-110,w:240,h:60},
        Trunk:        {x:60, y:585, w:240,h:55},
        // TrunkInside fills the cargo volume inside the body.
        TrunkInside:  {x:65, y:440, w:230,h:140},
        Cabin:        {x:115,y:125, w:130,h:305},
      }[z];
      if(!rects) return null;
      return <rect key={z} x={rects.x} y={rects.y} width={rects.w} height={rects.h}
        fill="rgba(16,217,138,0.18)" stroke="#10D98A" strokeWidth="2"
        rx="3" opacity="0.9" style={{pointerEvents:'none'}}/>;
    })}

    {/* ── PEPS Device icons ── */}
    {allDevices.map(device=>{
      const group=byZone[device.zone]||[];
      const idx=group.indexOf(device);
      const pos=getDevicePos(device.zone,idx,group.length);
      const isDragging=drag&&drag.key===device.key;
      return <g key={device.key}>
        {/* Icon at zone position — dimmed while dragging */}
        <DeviceChip device={device} pos={pos} dimmed={!!isDragging}
          onPointerDown={(e)=>startDrag(e,device)}/>
      </g>;
    })}

    {/* Drag ghost follows pointer */}
    {drag&&<DeviceChip device={drag} pos={{x:drag.x,y:drag.y}} dimmed={false}/>}

    {/* Legend — below the OutOfRange tray (which is at y=730..780). */}
    <g transform="translate(-175,800)">
      <rect x={0} y={-4} width={18} height={11} rx={3} fill="#F59E0B" opacity={.85}/>
      <text x={22} y={5} fill="#6B7E99" fontSize="9" fontFamily="Share Tech Mono">Fob</text>
      <rect x={62} y={-7} width={10} height={17} rx={2} fill="#4A9EF5" opacity={.85}/>
      <text x={76} y={5} fill="#6B7E99" fontSize="9" fontFamily="Share Tech Mono">Phone</text>
      <circle cx={138} cy={1} r={8} fill="#0DC8C8" opacity={.85}/>
      <text x={150} y={5} fill="#6B7E99" fontSize="9" fontFamily="Share Tech Mono">NFC</text>
      <rect x={210} y={-4} width={18} height={11} rx={3} fill="#F04040" opacity={.85}/>
      <text x={212} y={1} fill="#000" fontSize="8" fontWeight="bold">!</text>
      <text x={232} y={5} fill="#F04040" fontSize="9" fontFamily="Share Tech Mono">Unpaired</text>
      <text x={330} y={5} fill="#2E3E55" fontSize="9" fontFamily="Share Tech Mono">— drag fobs/phones/NFC to zones</text>
    </g>
  </svg>;
}

/* ══════ SIDE VIEW ══════ */
function SideView({s,set}){
  const [flipped,setFlipped]=React.useState(false);
  // "◁ LEFT SIDE" = viewing from the left = seeing the RIGHT side doors (and vice-versa)
  const side=flipped?'Right':'Left';
  const lo=s['Body.Lights.Beam.Low.IsOn'],hi=s['Body.Lights.Beam.High.IsOn'];
  const drl=s['Body.Lights.Running.IsOn'],park=s['Body.Lights.Parking.IsOn'];
  // Turn indicator — track the side that is currently visible
  const li=s[`Body.Lights.DirectionIndicator.${side}.Lamp.Front.IsOn`];
  const ffog=s['Body.Lights.Fog.Front.IsOn'],rfog=s['Body.Lights.Fog.Rear.IsOn'];
  const brake=s['Body.Lights.Brake.IsActive'],back=s['Body.Lights.Backup.IsActive'];
  const lp=s['Body.Lights.LicensePlate.IsOn'];
  // Door signals — read from the visible side
  const r1pfx=`Body.Doors.Row1.${side}`, r2pfx=`Body.Doors.Row2.${side}`;
  const d1=s[r1pfx+'.IsOpen'], d2=s[r2pfx+'.IsOpen'];
  const r1locked=s[r1pfx+'.IsLocked'], r1dbl=s[r1pfx+'.IsDoubleLocked'];
  const r2locked=s[r2pfx+'.IsLocked'], r2dbl=s[r2pfx+'.IsDoubleLocked'];
  const r1pulled=s[r1pfx+'.Handle.Outside.IsPulled'];
  const r2pulled=s[r2pfx+'.Handle.Outside.IsPulled'];
  const hood=s['Body.Hood.IsOpen'],trunk=s['Body.Trunk.IsOpen'];
  // Hood tri-state latch (LATCHED / HALF_LATCHED / OPEN).
  // Top-view click logic uses this to gate the OpenCmd / CloseCmd dispatch.
  const hoodLatch = s['Body.Hood.LatchState'] || 'LATCHED';
  const hoodHalf  = hoodLatch === 'HALF_LATCHED';
  const wf=s['Body.Windshield.Front.Wiping.Mode']!=='OFF';
  const sr=s['Body.Sunroof.Position'];
  // Mirror — read from the visible side
  const mlf=s[`Body.Mirror.${side}.IsFolded`];
  const mheat=s[`Body.Mirror.${side}.IsHeatingOn`];
  // Puddle lamp on the visible side — Welcome / Farewell drive these
  // via the puddle arbiter.  Rendered as a soft cone projecting down
  // from the mirror housing onto the ground.
  const puddleSide=s[`Body.Lights.Puddle.${side}.IsOn`];
  const hlc=hi?'#FFF':lo?'#FCD34D':drl?'#C0C8D0':park?'#FEF3C7':'#0A1420';
  const hlo=hi?.95:lo?.85:drl?.45:park?.2:.06;
  const tlc=brake?'#FF2222':lo||hi||park?'#EF4444':'#1A0808';
  const tlo=brake?.95:lo||hi||park?.75:.1;
  const spokes=(cx,cy)=>[0,51.4,102.8,154.3,205.7,257.1,308.6].map(a=>{
    const r=a*Math.PI/180;
    return <line key={a} x1={cx+16*Math.cos(r)} y1={cy+16*Math.sin(r)} x2={cx+31*Math.cos(r)} y2={cy+31*Math.sin(r)} stroke="#1E2A3C" strokeWidth="2.5" strokeLinecap="round"/>;
  });
  const front=flipped?'REAR':'FRONT', rear=flipped?'FRONT':'REAR';
  return <div style={{position:'relative',width:'100%',maxWidth:'1000px'}}>
    {/* FRONT / REAR labels — outside the SVG so they stay readable when flipped */}
    <span style={{position:'absolute',bottom:'12%',left:'3%',color:'#16243A',fontSize:11,fontFamily:'Share Tech Mono',fontWeight:700,pointerEvents:'none',zIndex:1}}>{front}</span>
    <span style={{position:'absolute',bottom:'12%',right:'3%',color:'#16243A',fontSize:11,fontFamily:'Share Tech Mono',fontWeight:700,pointerEvents:'none',zIndex:1}}>{rear}</span>
    {/* Flip toggle */}
    <button onClick={()=>setFlipped(f=>!f)}
      style={{position:'absolute',top:6,right:8,zIndex:2,background:'#0C1825',border:'1px solid #2A4468',color:'#4A9EF5',padding:'3px 10px',borderRadius:4,cursor:'pointer',fontSize:9,fontFamily:'Share Tech Mono',letterSpacing:'0.05em'}}>
      {flipped?'◁ LEFT SIDE':'RIGHT SIDE ▷'}
    </button>
  <svg viewBox="-80 0 1080 450" style={{width:'100%',display:'block',transform:flipped?'scaleX(-1)':'none'}}>
    <defs>
      <filter id="backupGlowSide" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      {/* Fog lamp beam — bright at source, fades toward road */}
      <linearGradient id="fogBeamGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stopColor="#BAD6FE" stopOpacity="0.65"/>
        <stop offset="100%" stopColor="#BAD6FE" stopOpacity="0"/>
      </linearGradient>
      {/* Headlamp beam — bright at source, fades to transparent at far end */}
      <linearGradient id="beamGradSide" x1="1" y1="0" x2="0" y2="0">
        <stop offset="0%"   stopColor="#FCD34D" stopOpacity="0.55"/>
        <stop offset="60%"  stopColor="#FCD34D" stopOpacity="0.12"/>
        <stop offset="100%" stopColor="#FCD34D" stopOpacity="0"/>
      </linearGradient>
    </defs>
    {/* Ground shadow line */}
    <line x1="20" y1="400" x2="980" y2="400" stroke="#182030" strokeWidth="2" opacity=".5"/>

    {/* ── Main body silhouette — SUV/crossover profile ──────────────────────
         Key points:
           Front bumper:   (88,395)–(82,372)–(87,338)
           Front fascia:   (87,310)–(120,265)–(150,248)
           Hood flat:      (150,248)–(268,228)
           A-pillar:       (268,228)–(355,108)
           Roof:           (370,104)–(775,104)
           C-pillar:       (775,104)–(845,128)–(878,218)
           Rear hatch:     (878,218)–(895,278)–(908,335)
           Rear bumper:    (908,335)–(914,362)–(920,395)
    ──────────────────────────────────────────────────────────────────────── */}
    <path d="M 88,395 L 82,372 L 87,310 L 120,265 L 150,248 L 268,228
             L 355,108 L 370,104 L 775,104 L 845,128 L 878,218
             L 895,278 L 908,335 L 914,362 L 920,395 L 920,400 L 78,400 Z"
      fill="#0C1825" stroke="#1A2838" strokeWidth="2"/>

    {/* ── Windshield glass — wide trapezoid: beltline y=231, roof y=108 ── */}
    <path d="M 272,231 L 358,108 L 416,108 L 424,231 Z"
      fill="#0D2235" stroke="#1E3A56" strokeWidth="1" opacity=".88"/>

    {/* ── Front door glass (A → B pillar) ── */}
    <path d="M 430,108 L 565,108 L 565,231 L 430,231 Z"
      fill="#0A1E30" stroke="#1A3348" strokeWidth="0.8" opacity=".85"/>

    {/* ── B-pillar ── */}
    <rect x="567" y="104" width="18" height="127" fill="#0C1825" stroke="#111B28" strokeWidth="0.5"/>

    {/* ── Rear door glass (B → C pillar) ── */}
    <path d="M 589,108 L 772,108 L 772,231 L 589,231 Z"
      fill="#0A1E30" stroke="#1A3348" strokeWidth="0.8" opacity=".85"/>

    {/* ── Rear quarter glass (C-pillar arc to D-pillar) ── */}
    <path d="M 780,108 L 845,128 L 878,218 L 854,231 L 780,231 Z"
      fill="#091C2E" stroke="#1A3348" strokeWidth="0.8" opacity=".80"/>

    {/* ── Hood open indicator — traces the front fascia + hood line ── */}
    {hood&&<path d="M 82,372 L 87,310 L 120,265 L 150,248 L 268,228"
      stroke="#F59E0B" strokeWidth="3" fill="none" opacity=".6"/>}

    {/* ── Front door panel & open status ──
         When the door is open, the whole panel becomes a click target
         that fires CloseCmd via the DoorHandle plant model (same path
         the top view uses for door-clicks).  Cursor + tooltip cue
         appears only while open so we don't imply the panel does
         anything when the door is shut. */}
    <rect x="430" y="233" width="135" height="157" fill="#0C1825"
      stroke={d1?'#F59E0B':'#1A2838'} strokeWidth={d1?2.5:1.2} rx="2"
      style={d1?{cursor:'pointer'}:undefined}
      onClick={d1?()=>set(r1pfx+'.CloseCmd',true):undefined}>
      {d1 && <title>Click to close {side} Row 1 door</title>}
    </rect>
    {d1&&<text x="497" y="322" textAnchor="middle" fill="#F59E0B" fontSize="8" fontWeight="bold"
              style={{pointerEvents:'none'}}>DOOR OPEN — CLICK TO CLOSE</text>}

    {/* ── Rear door panel & open status ── */}
    <rect x="589" y="233" width="183" height="157" fill="#0C1825"
      stroke={d2?'#F59E0B':'#1A2838'} strokeWidth={d2?2.5:1.2} rx="2"
      style={d2?{cursor:'pointer'}:undefined}
      onClick={d2?()=>set(r2pfx+'.CloseCmd',true):undefined}>
      {d2 && <title>Click to close {side} Row 2 door</title>}
    </rect>
    {d2&&<text x="680" y="322" textAnchor="middle" fill="#F59E0B" fontSize="8" fontWeight="bold"
              style={{pointerEvents:'none'}}>DOOR OPEN — CLICK TO CLOSE</text>}

    {/* ── Door handles — always pullable.  When the door is locked the
         pull won't open the door (plant model decides), but it still
         triggers PassiveEntry auth, so the HMI must allow it
         regardless of lock state.  A small red 🔒 badge to the left
         of the handle warns "won't open" when locked. ── */}
    {/* Handles sit near the trailing edge of each door panel — front
        door handle by the B-pillar, rear door handle by the C-pillar
        — to match how production vehicles are laid out.  Front-door
        panel spans 430→565 (135 wide) and rear-door panel spans
        589→772 (183 wide); the 38 px handle is parked ~10 px inboard
        of the trailing edge. */}
    {[
      {pfx:r1pfx, x:520, open:d1, locked:r1locked, dbl:r1dbl, pulled:r1pulled, label:'Row 1'},
      {pfx:r2pfx, x:723, open:d2, locked:r2locked, dbl:r2dbl, pulled:r2pulled, label:'Row 2'},
    ].map(({pfx,x,open,locked,dbl,pulled,label})=>{
      const tip=open?`${label} outside handle — door is open`
               :dbl ?`${label} outside handle — door is double-locked; pull will not open`
               :locked?`${label} outside handle — door is locked; pull will not open (PassiveEntry may unlock if a paired device is in proximity zone)`
               :pulled?`${label} outside handle — pulling…`
               :`${label} outside handle — hold to pull open`;
      const hfill=pulled?'#4A9EF5':'#1E3250';
      const hstroke=pulled?'#6BB8FF':'#2A4468';
      const kfill=pulled?'#6BB8FF':'#253A58';
      return <g key={pfx}>
        {/* Hit target stays in fixed position — a translate transform
            would push the rect out from under the cursor and trigger
            an immediate onMouseLeave, breaking the PassiveEntry
            hold-and-unlock flow.  Visual cue is fill/stroke change
            plus a small "pulled" indicator chip beside the handle. */}
        <g fill={hfill} stroke={hstroke} strokeWidth={pulled?'1.2':'0.8'}
          style={{cursor:'pointer'}}
          onMouseDown={()=>set(pfx+'.Handle.Outside.IsPulled',true)}
          onMouseUp={()=>set(pfx+'.Handle.Outside.IsPulled',false)}
          onMouseLeave={()=>set(pfx+'.Handle.Outside.IsPulled',false)}>
          <title>{tip}</title>
          <rect x={x}   y="276" width="38" height="9" rx="3"/>
          <rect x={x}   y="276" width="5"  height="9" rx="2" fill={kfill}/>
        </g>
        {pulled && (
          /* Trailing chip indicating the handle is being held.  Uses
             pointer-events:none so it can't steal mouseleave events. */
          <rect x={x+40} y="277" width="3" height="7" rx="1"
            fill="#6BB8FF" opacity="0.9"
            style={{pointerEvents:'none'}}/>
        )}
        {!open && (locked || dbl) && (
          <text x={x-6} y="284" textAnchor="middle"
            fill={dbl?'#FCA5A5':'#F87171'} fontSize="9" fontWeight="bold"
            style={{pointerEvents:'none'}}>🔒</text>
        )}
      </g>;
    })}

    {/* ── Trunk / liftgate open indicator — highlights rear hatch edge ── */}
    {trunk&&<g>
      <path d="M 895,278 L 908,335 L 914,362" stroke="#F59E0B" strokeWidth="3" fill="none" opacity=".6"/>
      <text x="950" y="330" textAnchor="middle" fill="#F59E0B" fontSize="8" fontWeight="bold">TRUNK</text>
    </g>}

    {/* ── Headlight — visible on front fascia in side profile ── */}
    <g>
      <title>{`Headlight — ${hi?'HIGH BEAM':lo?'LOW BEAM':drl?'DRL':park?'PARKING':'off'}`}</title>
      <ellipse cx="102" cy="298" rx="8" ry="22" fill={hlc} opacity={hlo*0.78}
        transform="rotate(-15,102,298)"/>
      <ellipse cx="102" cy="298" rx="4" ry="11" fill={hlc} opacity={hlo*1.4}
        transform="rotate(-15,102,298)"/>
      {/* Beam cone — DRL: faint short cone; Low: medium; High: wide long cone */}
      {(drl||lo||hi)&&<path
        d={hi
          ? "M 100,293 L -75,252 L -75,344 L 100,303 Z"
          : lo
          ? "M 100,293 L -45,260 L -45,336 L 100,303 Z"
          : /* drl */ "M 100,293 L -10,272 L -10,324 L 100,303 Z"}
        fill="url(#beamGradSide)"
        opacity={hi?0.55:lo?0.38:0.16}
      />}
    </g>

    {/* ── Front turn indicator ── */}
    <rect x="84" y="322" width="20" height="11" rx="2" fill={li?'#F59E0B':'#1A1208'} opacity={li?0.95:.25}>
      <title>{li?'Front turn indicator — signaling':'Front turn indicator — off'}</title>
    </rect>

    {/* ── Front fog lamp ── */}
    {ffog&&<rect x="84" y="337" width="20" height="10" rx="2" fill="#BAD6FE" opacity=".88">
      <title>Front fog lamp — on</title>
    </rect>}
    {/* Front fog beam — wide flat cone straight down to road */}
    {ffog&&<path d="M 88,347 L -18,400 L 128,400 Z" fill="url(#fogBeamGrad)" opacity="0.55"/>}

    {/* ── Rear taillight — on vertical rear face ── */}
    <ellipse cx="913" cy="318" rx="6" ry="22" fill={tlc} opacity={tlo}>
      <title>{brake?'Taillight — brake active':lo||hi||park?'Taillight — tail on':'Taillight — off'}</title>
    </ellipse>

    {/* ── Rear turn indicator ── */}
    <rect x="907" y="344" width="20" height="11" rx="2" fill={li?'#F59E0B':'#1A1208'} opacity={li?0.95:.25}>
      <title>{li?'Rear turn indicator — signaling':'Rear turn indicator — off'}</title>
    </rect>

    {/* ── Rear fog lamp ── */}
    {rfog&&<rect x="907" y="358" width="20" height="10" rx="2" fill="#EF2020" opacity=".88">
      <title>Rear fog lamp — on</title>
    </rect>}
    {/* Rear fog beam — wide flat cone straight down to road (red tint) */}
    {rfog&&<path d="M 917,368 L 882,400 L 1005,400 Z" fill="#EF2020" opacity="0.18"/>}

    {/* ── Backup / reverse light ── */}
    <g opacity={back?1:0.8} filter={back?'url(#backupGlowSide)':undefined}>
      <title>{back?'Backup / reverse light — ACTIVE (reversing)':'Backup / reverse light — off'}</title>
      <rect x="906" y="371" width="26" height="12" rx="2"
        fill={back?'#F0F8FF':'#2A4A6A'} stroke={back?'#FFFFFF':'#4A7AA0'} strokeWidth="1.2"/>
      <text x="919" y="381" textAnchor="middle" fontSize="6" fontWeight="bold"
        fill={back?'#001830':'#7AB0D0'} fontFamily="monospace">REV</text>
    </g>

    {/* ── License plate lamp ── */}
    {lp&&<rect x="906" y="385" width="24" height="7" rx="2" fill="#FFF8DC" opacity=".85">
      <title>License plate lamp — on</title>
    </rect>}

    {/* ── Side mirror — tracks visible side.  When folded, the whole
         arm + head group rotates around the body-side anchor (268,
         225) so the mirror swings rearward against the front door
         skin — the side-view equivalent of the top-view fold. ── */}
    <g transform={mlf?'rotate(60 268 225)':undefined} style={{transition:'transform 0.6s ease'}}>
      <title>{mlf?`${side} side mirror — folded`:`${side} side mirror`}</title>
      {/* Mirror arm from A-pillar base outward */}
      <line x1="268" y1="225" x2="248" y2="218" stroke="#1A2838" strokeWidth="2.5"/>
      {/* Mirror head — horizontal teardrop just ahead of A-pillar */}
      <ellipse cx="238" cy="215" rx="18" ry="11" fill="#0F1A28" stroke="#1A2838" strokeWidth="1"/>
      <rect x="228" y="222" width="18" height="3" rx="1" fill={li?'#F59E0B':'#1A1208'} opacity={(mlf?0:1)*(li?.95:.25)}>
        <title>{li?'Mirror turn indicator — signaling':'Mirror turn indicator — off'}</title>
      </rect>
    </g>
    {mheat&&<circle cx="238" cy="215" r="14" fill="none" stroke="#FF4040" strokeWidth="1.2" opacity=".7" className="pulse">
      <title>Mirror heating — active</title>
    </circle>}

    {/* ── Puddle lamp beam — projects down from mirror housing onto
         the ground when Welcome / Farewell claim the puddle lamp on
         this side.  Trapezoid for the beam cone + bright pool ellipse
         at ground level. ── */}
    <defs>
      <linearGradient id="puddleBeamSide" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stopColor="#BAD6FE" stopOpacity="0.55"/>
        <stop offset="60%" stopColor="#7CC8FF" stopOpacity="0.30"/>
        <stop offset="100%" stopColor="#3D85C6" stopOpacity="0.05"/>
      </linearGradient>
      <radialGradient id="puddleGroundSide" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stopColor="#BAD6FE" stopOpacity="0.85"/>
        <stop offset="60%" stopColor="#3D85C6" stopOpacity="0.40"/>
        <stop offset="100%" stopColor="#3D85C6" stopOpacity="0"/>
      </radialGradient>
    </defs>
    {puddleSide && !mlf && (
      <g style={{pointerEvents:'none'}}>
        <title>{side} puddle lamp — on</title>
        {/* Beam cone: narrow at mirror underside (~238, 222),
            spreading to a ~80 px pool at ground level (y≈445). */}
        <path d="M 230,224 L 200,448 L 276,448 L 246,224 Z"
          fill="url(#puddleBeamSide)"/>
        {/* Bright ground pool */}
        <ellipse cx="238" cy="448" rx="38" ry="6" fill="url(#puddleGroundSide)"/>
        <ellipse cx="238" cy="448" rx="10" ry="2" fill="#E0EEFF" opacity="0.85"/>
      </g>
    )}

    {/* ── Wheels ── */}
    <circle cx="180" cy="400" r="55" fill="#07101A" stroke="#161E2C" strokeWidth="2.2"/>
    <circle cx="180" cy="400" r="42" fill="#0D1520"/>
    <circle cx="180" cy="400" r="28" fill="#111820" stroke="#202C3C" strokeWidth="1"/>
    <circle cx="180" cy="400" r="10" fill="#08101A"/>{spokes(180,400)}
    <circle cx="800" cy="400" r="55" fill="#07101A" stroke="#161E2C" strokeWidth="2.2"/>
    <circle cx="800" cy="400" r="42" fill="#0D1520"/>
    <circle cx="800" cy="400" r="28" fill="#111820" stroke="#202C3C" strokeWidth="1"/>
    <circle cx="800" cy="400" r="10" fill="#08101A"/>{spokes(800,400)}

    {/* ── Parking corner lights ── */}
    <circle cx="96" cy="342" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.85:.3}>
      <title>{park?'Front parking light — on':'Front parking light — off'}</title>
    </circle>
    <circle cx="917" cy="360" r="4" fill={park?'#F59E0B':'#1A1208'} opacity={park?0.85:.3}>
      <title>{park?'Rear parking light — on':'Rear parking light — off'}</title>
    </circle>

    {/* ── Wiper animation — blades sweep across windshield ── */}
    {wf&&<g className="blinks">
      <path d="M 348,108 L 310,200" stroke="#4A9EF5" strokeWidth="2" strokeLinecap="round" opacity=".75"/>
      <path d="M 416,108 L 390,200" stroke="#4A9EF5" strokeWidth="2" strokeLinecap="round" opacity=".75"/>
    </g>}

    {/* ── Sunroof (slides open from center toward rear) ── */}
    {sr>0&&<rect x={460+sr*1.8} y="104" width={110*(sr/100)} height="12" fill="#0A1828" stroke="#0DC8C8" strokeWidth="1.2" opacity={sr/100*0.8} rx="2"/>}

  </svg>
  </div>;
}

/* ══════ COCKPIT VIEW ══════
 *
 * Scrollable vertical layout of zones an occupant in the front row can
 * see and reach.  Zones are stubbed with placeholder content today and
 * fleshed out in follow-up commits.  Each zone is dimmed/tinted when
 * the bus is in NIGHT mode (published by the DayNightModePlant from
 * `Body.Lights.Beam.Low.IsOn`).
 */
// Module-scope so its component identity is stable across renders.
// (If defined inside CockpitView it would be re-created on every state
// update, causing React to unmount/remount every button — which made
// the panel feel sluggish and could drop mouse-up events on

// pulls.)
const cockpitBtnSty=(on,night,opts={})=>({
  background: on?(night?'#3A2C0A':'#1E3A52'):(night?'#0A1018':'#0E1625'),
  border: `1px solid ${on?(night?'#F59E0B':'#4A9EF5'):(night?'#2A3A50':'#1A2838')}`,
  color: on?(night?'#F59E0B':'#4A9EF5'):(night?'#D7A03A':'#3A5070'),
  fontFamily:'Share Tech Mono',fontSize:opts.sz||9,fontWeight:600,
  padding:opts.pad||'6px 10px',borderRadius:3,cursor:'pointer',
  minWidth:opts.min||0,letterSpacing:.5,whiteSpace:'nowrap',
});
function Btn({on,night,onClick,onMouseDown,onMouseUp,onMouseLeave,children,sz,pad,min}){
  return <button onClick={onClick} onMouseDown={onMouseDown} onMouseUp={onMouseUp}
    onMouseLeave={onMouseLeave} style={cockpitBtnSty(on,night,{sz,pad,min})}>{children}</button>;

// ISO/SAE-style headlamp telltale icons for the instrument cluster.
//
// The lamp body points LEFT — curve on the right side, flat diameter
// on the left, with 3 "beam" lines emanating leftward.  This matches
// the standard ISO 2575 telltale orientation seen in real clusters.
//
//   kind="lo"   — beams slope down-and-out (low beam aim).
//   kind="hi"   — beams are horizontal (high beam reach).
//   kind="fog"  — low-beam style + a vertical wavy line through the
//                 beams representing fog (front fog, green).
//   kind="rfog" — high-beam-style horizontal beams + the same wavy
//                 fog line (rear fog, amber).  Distinguished from
//                 front fog only by the beam geometry, per ISO 2575.
//
// Drawn in a 24×16 local box centred on the caller's (cx, cy).  The
// caller passes `on` and the active/inactive colours; we render the
// faint inactive icon when off so the cluster layout stays stable.
function HeadlampTelltale({cx, cy, kind, on, onColor, offColor='#1F2C40'}){
  const c = on ? onColor : offColor;
  const op = on ? 1 : 0.45;
  const sw = 1.6;
  // Semicircle body — flat side on the left (x = cx-1), curve on
  // the right.  Filled so it reads as a solid lamp lens.
  const body = `M ${cx-1},${cy-7} A 7,7 0 0,1 ${cx-1},${cy+7} Z`;
  // Three beam endpoints differ per kind.  All beams start at the
  // flat diameter on the left and extend further left.
  // Horizontal for hi/rfog, slanted down-and-out for lo/fog.
  const horiz = kind === 'hi' || kind === 'rfog';
  const beams = horiz
    ? [[cx-1,cy-4,cx-13,cy-4],[cx-1,cy,cx-13,cy],[cx-1,cy+4,cx-13,cy+4]]
    : [[cx-1,cy-4,cx-13,cy-1],[cx-1,cy,  cx-13,cy+3],[cx-1,cy+4,cx-13,cy+7]];
  return <g opacity={op}>
    <path d={body} fill={c} stroke={c} strokeWidth="0.6"/>
    {beams.map(([x1,y1,x2,y2],i)=>(
      <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
        stroke={c} strokeWidth={sw} strokeLinecap="round"/>
    ))}
    {(kind === 'fog' || kind === 'rfog') && (
      // Wavy vertical line cutting across the 3 beams to indicate fog.
      <path d={`M ${cx-7},${cy-7} Q ${cx-11},${cy-3.5} ${cx-7},${cy} T ${cx-7},${cy+7}`}
        fill="none" stroke={c} strokeWidth={sw} strokeLinecap="round"/>
    )}
  </g>;
}

// Turn-signal telltale — a solid filled triangle arrow pointing in
// the direction of travel (ISO 2575 convention).  Amber, blinks
// while active, dim grey when off so the cluster layout stays
// stable.  Drawn in a 30×30 local box centred on (cx, cy).
function TurnArrowTelltale({cx, cy, direction, on, onColor='#F59E0B', offColor='#1F2C40'}){
  const c = on ? onColor : offColor;
  const r = 9;
  const points = direction === 'right'
    ? `${cx-r},${cy-r} ${cx-r},${cy+r} ${cx+r},${cy}`
    : `${cx+r},${cy-r} ${cx+r},${cy+r} ${cx-r},${cy}`;
  return <polygon points={points} fill={c} opacity={on ? 1 : 0.45}
    className={on ? 'blink' : undefined}/>;
}

// TPMS (tire-pressure-low) telltale — ISO 2575 convention.  A thick
// "(!) " bracket shape representing a tire viewed from the side
// (open at the top, walls curving down to the contact patch), with
// a short wavy "tread / road" line across the bottom and an
// exclamation mark centred inside.  Amber when active, dim grey
// when not.  Drawn in a 30×30 local box centred on (cx, cy).
function TpmsTelltale({cx, cy, on, onColor='#F59E0B', offColor='#1F2C40'}){
  const c = on ? onColor : offColor;
  const op = on ? 1 : 0.45;
  const tx = cx - 15, ty = cy - 15;
  return <g opacity={op} transform={`translate(${tx} ${ty})`}>
    {/* Tire-section U-shape — open at the top, rounded shoulders, sits
        flat on the ground at the bottom. */}
    <path d="M 6 8 L 6 17 Q 6 23 13 23 L 17 23 Q 24 23 24 17 L 24 8"
      fill="none" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
    {/* Wavy tread / road line at the contact patch. */}
    <path d="M 9.5 25 q 1.3 -1.6 2.6 0 t 2.6 0 t 2.6 0 t 2.6 0"
      fill="none" stroke={c} strokeWidth="1.3" strokeLinecap="round"/>
    {/* Exclamation mark centred inside the U. */}
    <line x1="15" y1="11" x2="15" y2="17.5" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
    <circle cx="15" cy="20" r="0.95" fill={c}/>
  </g>;
}

// Door-ajar telltale — top-view car silhouette with the driver-side
// front door swung outward.  The drawing is intentionally fixed
// (single open door) regardless of which actual doors are open;
// the lamp is the "any door open" warning, not a per-door indicator.
// Drawn inside a 30x30 local box centred on (cx, cy).
function DoorAjarTelltale({cx, cy, on, onColor='#EF4444', offColor='#1F2C40'}){
  const c = on ? onColor : offColor;
  const op = on ? 1 : 0.45;
  // Translate the 30x30 icon so its centre sits at (cx, cy).
  const tx = cx - 15, ty = cy - 15;
  return <g opacity={op} transform={`translate(${tx} ${ty})`}>
    {/* Car body — rounded rect, longer than wide (top view). */}
    <rect x="11" y="6" width="8" height="18" rx="2" fill="none" stroke={c} strokeWidth="1.4"/>
    {/* Windshield + rear-glass split lines. */}
    <line x1="11" y1="11" x2="19" y2="11" stroke={c} strokeWidth="0.9"/>
    <line x1="11" y1="20" x2="19" y2="20" stroke={c} strokeWidth="0.9"/>
    {/* Faint door-split mid line. */}
    <line x1="11" y1="15.5" x2="19" y2="15.5" stroke={c} strokeWidth="0.6" opacity="0.55"/>
    {/* Driver-side front door swung outward ~55°. */}
    <g transform="rotate(55 11 12)">
      <rect x="9.2" y="12" width="1.8" height="4" fill={c} stroke={c} strokeWidth="0.5"/>
    </g>
  </g>;
}

// Compact vertical 5-detent rocker for window switches.  Press writes
// the corresponding Detent enum value; release returns to NEUTRAL
// (spring action).  The PowerWindow feature owns the state machine
// and writes the motor command via the window arbiter — this
// component is purely UI.
function WindowRocker({ s, set, night, detentKey, posKey, motorKey, label, dimmed = false }) {
  const detent = s[detentKey] || 'NEUTRAL';
  const pos = s[posKey] ?? 0;
  const motor = motorKey ? (s[motorKey] || 'STOPPED') : 'STOPPED';
  const press = (v) => ({
    onMouseDown:  () => set(detentKey, v),
    onMouseUp:    () => set(detentKey, 'NEUTRAL'),
    onMouseLeave: () => set(detentKey, 'NEUTRAL'),
    onTouchStart: (e) => { e.preventDefault(); set(detentKey, v); },
    onTouchEnd:   (e) => { e.preventDefault(); set(detentKey, 'NEUTRAL'); },
  });
  // Handle Y offset per detent — spring-back animation handled by CSS transition.
  const handleY = {
    UP_AUTO:   -22,
    UP_HOLD:   -10,
    NEUTRAL:     0,
    DOWN_HOLD:  10,
    DOWN_AUTO:  22,
  }[detent] ?? 0;
  const zone = (v) => ({
    fill: detent === v ? '#F59E0B' : (night ? '#0A1018' : '#0E1625'),
    stroke: detent === v ? '#F59E0B' : (night ? '#2A3A50' : '#1A2838'),
  });
  const txtDim = night ? '#5A7090' : '#3A5070';
  const accent = motor === 'UP'   ? '#F59E0B'
               : motor === 'DOWN' ? '#4A9EF5'
               :                    txtDim;
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2, opacity: dimmed ? 0.55 : 1, userSelect:'none' }}>
      {label && <span style={{ fontFamily:'Share Tech Mono', fontSize:7, color:txtDim, letterSpacing:.5 }}>{label}</span>}
      <svg viewBox="0 0 36 88" style={{ width:32, height:80, touchAction:'none' }}>
        {/* Outer track */}
        <rect x="10" y="4" width="16" height="80" rx="4"
          fill={night?'#070F1C':'#070F1C'} stroke={night?'#2A3A50':'#1A2838'} strokeWidth="1"/>
        {/* 2nd-detent UP (close) */}
        <rect x="11" y="6"  width="14" height="12" rx="2" {...press('UP_AUTO')}
          fill={zone('UP_AUTO').fill} stroke={zone('UP_AUTO').stroke} strokeWidth="0.8"
          style={{ cursor:'pointer' }}>
          <title>2nd detent — AUTO CLOSE (latches; runs to fully closed)</title>
        </rect>
        {/* 1st-detent UP */}
        <rect x="11" y="20" width="14" height="12" rx="2" {...press('UP_HOLD')}
          fill={zone('UP_HOLD').fill} stroke={zone('UP_HOLD').stroke} strokeWidth="0.8"
          style={{ cursor:'pointer' }}>
          <title>Hold to close (proportional)</title>
        </rect>
        {/* 1st-detent DOWN */}
        <rect x="11" y="56" width="14" height="12" rx="2" {...press('DOWN_HOLD')}
          fill={zone('DOWN_HOLD').fill} stroke={zone('DOWN_HOLD').stroke} strokeWidth="0.8"
          style={{ cursor:'pointer' }}>
          <title>Hold to open (proportional)</title>
        </rect>
        {/* 2nd-detent DOWN (open) */}
        <rect x="11" y="70" width="14" height="12" rx="2" {...press('DOWN_AUTO')}
          fill={zone('DOWN_AUTO').fill} stroke={zone('DOWN_AUTO').stroke} strokeWidth="0.8"
          style={{ cursor:'pointer' }}>
          <title>2nd detent — AUTO OPEN (latches; runs to fully open)</title>
        </rect>
        {/* Arrow hints up = close, down = open */}
        <polygon points="18,2 15,6 21,6" fill={txtDim}/>
        <polygon points="18,86 15,82 21,82" fill={txtDim}/>
        {/* Spring-returning handle bar */}
        <rect x="9" y={42 + handleY} width="18" height="6" rx="2"
          fill={night?'#D7A03A':'#F59E0B'} opacity="0.95"
          style={{ transition:'y 80ms ease-out' }}/>
      </svg>
      <span style={{ fontFamily:'Share Tech Mono', fontSize:8, fontWeight:600, color:accent }}>
        {pos|0}%
      </span>
    </div>
  );
}

// VSS Powertrain.Transmission.CurrentGear / SelectedGear encoding:
//   126 = Park, -1 = Reverse, 0 = Neutral, 127 = Drive, 128 = Sport
//   (custom).  Positive 1..N are forward gears (manual transmission).
//   Hoisted to module scope so any view (cockpit cluster, sidebar Gear
//   row, etc.) can use the same label rendering.
function gearLabelGlobal(g){
  if(g===126) return 'P';
  if(g===127) return 'D';
  if(g===128) return 'S';
  if(g===0)   return 'N';
  if(g<0)     return 'R';
  return String(g);
}

function CockpitZone({title,subtitle,night,children}){

function CockpitView({s,set,cfg}){
  // Driver-door side — drives trim-zone labelling and which Local
  // window switch the cockpit exposes for the front passenger door.
  // Defaults to Left (LHD) when cfg is missing for any reason.
  const driverSide = cfg?.dealer?.driver_door_side === 'Right' ? 'Right' : 'Left';
  const passengerSide = driverSide === 'Right' ? 'Left' : 'Right';
  const mode=s['Vehicle.Cabin.Infotainment.HMI.DayNightMode'];
  const night=mode==='NIGHT';
  const lo=s['Body.Lights.Beam.Low.IsOn'],hi=s['Body.Lights.Beam.High.IsOn'];
  const lLamp=s['Body.Lights.DirectionIndicator.Left.Lamp.Front.IsOn'];
  const rLamp=s['Body.Lights.DirectionIndicator.Right.Lamp.Front.IsOn'];
  const bothCmded=s['Body.Lights.Hazard.IsSignaling']||(s['Body.Lights.DirectionIndicator.Left.IsSignaling']&&s['Body.Lights.DirectionIndicator.Right.IsSignaling']);
  const li=lLamp,ri=bothCmded?lLamp:rLamp;
  const doorAjar=['Body.Doors.Row1.Left.IsOpen','Body.Doors.Row1.Right.IsOpen','Body.Doors.Row2.Left.IsOpen','Body.Doors.Row2.Right.IsOpen'].some(k=>s[k]);
  const ffog=s['Body.Lights.Fog.Front.IsOn'],rfog=s['Body.Lights.Fog.Rear.IsOn'];
  const brake=s['Body.Lights.Brake.IsActive'];
  const ac=s['Cabin.HVAC.IsAirConditioningActive'];
  const defF=s['Cabin.HVAC.IsFrontDefrosterActive'],defR=s['Cabin.HVAC.IsRearDefrosterActive'];
  const recirc=s['Cabin.HVAC.IsRecirculationActive'];
  const dT=s['Cabin.HVAC.Station.Row1.Left.Temperature']??22;
  const pT=s['Cabin.HVAC.Station.Row1.Right.Temperature']??22;
  const heatL=s['Cabin.Seat.Row1.Left.HeatingLevel']||0;
  const heatR=s['Cabin.Seat.Row1.Right.HeatingLevel']||0;
  const vent1L=s['Cabin.Seat.Row1.Left.IsVentilationOn'];
  const vent1R=s['Cabin.Seat.Row1.Right.IsVentilationOn'];
  const trunk=s['Body.Trunk.IsOpen'],fuel=s['Body.FuelLid.IsOpen'];
  const wf=s['Body.Windshield.Front.Wiping.Mode'];
  const horn=s['Body.Horn.IsActive'],dome=s['Cabin.Lights.IsDomeOn'];
  // 3-position dome switch — drives `Cabin.Lights.IsDomeOn` via the
  // DomeSwitch feature (OFF / DOOR=on-when-any-door-open / ON).
  const domeSw=s['Cabin.Lights.Dome.SwitchPosition']||'OFF';
  // TPMS: lamp lights if ANY of the 4 wheels reports low pressure.
  const tpms=['Vehicle.Chassis.Axle.Row1.Wheel.Left.Tire.IsPressureLow',
              'Vehicle.Chassis.Axle.Row1.Wheel.Right.Tire.IsPressureLow',
              'Vehicle.Chassis.Axle.Row2.Wheel.Left.Tire.IsPressureLow',
              'Vehicle.Chassis.Axle.Row2.Wheel.Right.Tire.IsPressureLow'].some(k=>s[k]);
  // Interior door release pulls — mirror the inside handle signals.
  const pullL=s['Body.Doors.Row1.Left.Handle.Inside.IsPulled'];
  const pullR=s['Body.Doors.Row1.Right.Handle.Inside.IsPulled'];
  // Switches + supplementary state for the fleshed-out zones.
  const sigDir=s['Body.Switches.TurnIndicator.Direction']||'OFF';
  const hbSw=s['Body.Switches.HighBeam.IsEngaged'];
  const hazSw=s['Body.Switches.Hazard.IsEngaged'];
  const ffogSw=s['Body.Switches.Fog.Front.IsEngaged'];
  const rfogSw=s['Body.Switches.Fog.Rear.IsEngaged'];
  const lightSw=s['Body.Lights.LightSwitch']||'OFF';
  // CurrentGear = actual engaged gear (published by TransmissionPlant);
  // drives the instrument-cluster PRND readout.
  // SelectedGear = driver's selector position (what the HMI writes);
  // drives the gear-selector highlight for instant feedback before
  // the plant catches up.
  const gear=s['Powertrain.Transmission.CurrentGear']??126;
  const selGear=s['Powertrain.Transmission.SelectedGear']??126;
  const lockL=s['Body.Doors.Row1.Left.IsLocked'];
  const lockR=s['Body.Doors.Row1.Right.IsLocked'];
  const dblL=s['Body.Doors.Row1.Left.IsDoubleLocked'];
  const fanL=s['Cabin.HVAC.Station.Row1.Left.FanSpeed']??0;
  const distL=s['Cabin.HVAC.Station.Row1.Left.AirDistribution']||'AUTO';
  const mirL=s['Body.Mirror.Left.IsFolded'],mirR=s['Body.Mirror.Right.IsFolded'];
  // Mirror selector — String enum "NONE" / "LEFT" / "RIGHT".  Same
  // signal as the top-view MirrorAdjustControls; clicking SEL toggles
  // the chosen side, second click clears.
  const mirSel=s['Body.Switches.Mirror.Select']||'NONE';
  const mirDir=s['Body.Switches.Mirror.Direction']||'NONE';
  // Power child-lock state — written by the PowerChildLock feature.
  // `masterChildLock` drives the cockpit indicator LED; the per-door
  // fan-out signals drive per-window indicator dimming and (via the
  // door-handle plant on the bridge) inside-pull suppression.
  const masterChildLock=s['Body.PowerChildLock.MasterStatus'];
  const childRL=s['Body.Doors.Row2.Left.IsChildLockActive'];
  const childRR=s['Body.Doors.Row2.Right.IsChildLockActive'];
  // Per-window motor + position read-back (plant outputs).
  const winPos=(k)=>s[k]??0;
  const winMotor=(motor)=>s[motor]||'STOPPED';
  // Press-and-hold helpers for a switch signal: write true on press,
  // false on release / leave.  Returns the event handler bundle so
  // it can be spread onto a `<button>`.
  const holdSwitch=(switchKey)=>({
    onMouseDown:()=>set(switchKey,true),
    onMouseUp:  ()=>set(switchKey,false),
    onMouseLeave:()=>set(switchKey,false),
  });

  const txt = night?'#F59E0B':'#1C3050';
  const txtDim = night?'#8A6020':'#2A3A50';
  // Btn is hoisted to module scope so its component identity is stable
  // across renders (a locally-defined wrapper would be re-created each
  // render and force React to unmount/remount every button, which
  // dropped mouse-up events on press-and-hold buttons).  Pass
  // `night={night}` at every call site.
  const WIPER_CYCLE={OFF:'INTERMITTENT',INTERMITTENT:'SLOW',SLOW:'MEDIUM',MEDIUM:'FAST',FAST:'OFF'};
  // OFF → DRL → POSITION → AUTO → BEAM → OFF (matches the angular
  // order of the icons around the rotary knob).
  const LIGHT_CYCLE={OFF:'DRL',DRL:'POSITION',POSITION:'AUTO',AUTO:'BEAM',BEAM:'OFF'};
  const DIST_CYCLE={AUTO:'FACE',FACE:'FACE_FEET',FACE_FEET:'FEET',FEET:'FEET_DEF',FEET_DEF:'DEF',DEF:'AUTO'};
  // Friendlier display labels for the VSS AirDistribution enum.
  // The on-wire signal value still uses the canonical VSS strings
  // (AUTO / FACE / FACE_FEET / FEET / FEET_DEF / DEF); only the HMI
  // label is rewritten.
  const DIST_LABEL={AUTO:'Auto',FACE:'Panel',FACE_FEET:'Floor+Panel',FEET:'Floor',FEET_DEF:'Windshield_Floor',DEF:'Windshield'};
  const DOME_CYCLE={OFF:'DOOR',DOOR:'ON',ON:'OFF'};
  const gearLabel=gearLabelGlobal;
  // Word + tint for the under-speedo readout.
  const gearWord=g=>{
    const lab=gearLabel(g);
    if(lab==='P') return {t:'PARK',  c:'#10D98A'};
    if(lab==='R') return {t:'REVERSE',c:'#EF4444'};
    if(lab==='N') return {t:'NEUTRAL',c:'#4A9EF5'};
    if(lab==='D') return {t:'DRIVE',  c:'#F59E0B'};
    if(lab==='S') return {t:'SPORT',  c:'#EF6020'};
    return {t:`GEAR ${lab}`,c:'#F59E0B'};   // manual 1..N
  };
  const gw=gearWord(gear);
  const placeholder=(label)=><div style={{
    fontFamily:'Share Tech Mono', fontSize:9, color:night?'#5A7090':'#2A3A50',
    fontStyle:'italic', padding:'14px 0', textAlign:'center',
    border:`1px dashed ${night?'#1A2A3E':'#15202F'}`, borderRadius:4,

  return <div style={{
    width:'100%', maxWidth:800, height:'calc(100vh - 100px)',
    overflowY:'auto', paddingRight:6,
    background: night?'#040810':'#06101C',
    transition:'background 200ms ease',
  }}>

    {/* ── Overhead console: 3-position dome switch + map lights placeholder ── */}
    <CockpitZone title="OVERHEAD CONSOLE" subtitle={night?'NIGHT':'DAY'} night={night}>
      <div style={{display:'flex',gap:10,alignItems:'center',justifyContent:'space-around',flexWrap:'wrap'}}>
        {/* 3-position dome switch: tap to cycle OFF → DOOR → ON.  The
            DomeSwitch feature converts position + door state into the
            actual `Cabin.Lights.IsDomeOn` claim via the courtesy
            arbiter — Welcome / Farewell / PerimeterAlarm pre-empt. */}
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <span style={{fontFamily:'Share Tech Mono',fontSize:7,color:txtDim,letterSpacing:1,marginRight:4}}>DOME:</span>
          {['OFF','DOOR','ON'].map(p=>(
            <Btn night={night} key={p} on={domeSw===p}
              onClick={()=>set('Cabin.Lights.Dome.SwitchPosition',p)}
              sz={9} pad={'6px 10px'} min={48}>{p}</Btn>
          ))}
          <span style={{fontFamily:'Share Tech Mono',fontSize:9,color:dome?'#FCD34D':txtDim,marginLeft:8}}>
            ☼ {dome?'LAMP ON':'lamp off'}
          </span>
        </div>
        {/* Sunroof rocker — vertical spring-return switch, 4 detents:
            outer-top  = CLOSE_AUTO (latches; runs roof closed then shade)
            inner-top  = CLOSE_HOLD (proportional close while held)
            inner-bot  = OPEN_HOLD  (proportional open while held)
            outer-bot  = OPEN_AUTO  (latches; runs shade open then roof)
            Center is the rest position; any press in auto mode cancels.
            Writes `Body.Switches.Sunroof.Detent` (enum).  The
            SunroofControl feature owns the state machine and writes
            both Body.Sunroof.MoveCmd and Body.Sunroof.Shade.MoveCmd
            in the correct sequence. */}
        {(() => {
          const sr = s['Body.Sunroof.Position'] ?? 0;
          const sh = s['Body.Sunroof.Shade.Position'] ?? 0;
          const detent = s['Body.Switches.Sunroof.Detent'] || 'NEUTRAL';
          // Press writes the corresponding detent value; release
          // returns to NEUTRAL (spring action).

            onMouseDown:  () => set('Body.Switches.Sunroof.Detent', v),
            onMouseUp:    () => set('Body.Switches.Sunroof.Detent', 'NEUTRAL'),
